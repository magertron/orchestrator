---
# Namespace for the control plane itself
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-system
  labels:
    app.kubernetes.io/part-of: mcp-orchestrator

---
# Namespace for production MCP servers (managed by orchestrator)
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-prod
  labels:
    app.kubernetes.io/managed-by: mcp-orchestrator

---
# Namespace for staging MCP servers
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-staging
  labels:
    app.kubernetes.io/managed-by: mcp-orchestrator

---
# ServiceAccount for the orchestrator pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-orchestrator
  namespace: mcp-system
  labels:
    app: mcp-orchestrator

---
# ClusterRole: orchestrator needs broad powers to manage workloads across namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-orchestrator
rules:
  - apiGroups: [""]
    resources: ["namespaces", "services", "pods", "pods/log", "configmaps", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # McpRoute CRD — orchestrator C++ creates/updates/deletes via K8sClient
  #                — mcp-sync sidecar watches and reconciles
  - apiGroups: ["mcp.io"]
    resources: ["mcproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["mcp.io"]
    resources: ["mcproutes/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-orchestrator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-orchestrator
subjects:
  - kind: ServiceAccount
    name: mcp-orchestrator
    namespace: mcp-system

---
# Orchestrator configuration (mounted as volume)
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-orchestrator-config
  namespace: mcp-system
data:
  config.yaml: |
    api:
      listen_address: "0.0.0.0"
      http_port: 8080
      grpc_port: 9090
      tls:
        cert_file: /etc/tls/tls.crt
        key_file: /etc/tls/tls.key
      request_timeout: 30

    jwt:
      public_key_pem: |
        -----BEGIN PUBLIC KEY-----
        # Replaced at deploy time via Secret
        -----END PUBLIC KEY-----
      issuer: "https://auth.acme.internal"
      audience: "mcp-orchestrator"
      clock_skew: 30

    k8s:
      in_cluster: true
      default_namespace: "mcp-prod"
      helm_binary: "/usr/local/bin/helm"
      charts_dir: "/opt/mcp/charts"
      watch_resync_period: 300

    envoy:
      xds_listen_address: "0.0.0.0"
      xds_port: 18000
      node_id: "mcp-gateway"
      cluster_name: "mcp-gateway-cluster"

    observability:
      log_level: "info"
      log_format: "json"
      metrics_port: 9091
      audit_log_path: "/var/log/mcp/audit.log"

    postgresql:
      enabled: true
      host: "mcp-postgres.mcp-system.svc.cluster.local"
      port: 5432
      database: "mcp_platform"
      username: "mcp"
      # password injected via MCP_DB_PASSWORD environment variable

---
# Orchestrator Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-orchestrator
  namespace: mcp-system
  labels:
    app: mcp-orchestrator
    version: "1.0.0"
spec:
  replicas: 2    # HA pair
  selector:
    matchLabels:
      app: mcp-orchestrator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mcp-orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
    spec:
      serviceAccountName: mcp-orchestrator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: orchestrator
          image: docker.io/curtismager20/mcp-orchestrator:v1
          imagePullPolicy: Always
          args: ["--config", "/etc/mcp/config.yaml"]
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
            - name: xds
              containerPort: 18000
            - name: metrics
              containerPort: 9091
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MCP_LICENSE_FILE
              value: /etc/mcp-license/license.json
          envFrom:
            - secretRef:
                name: mcp-orchestrator-secrets   # JWT key, DB creds, etc.
          volumeMounts:
            - name: config
              mountPath: /etc/mcp
              readOnly: true
            - name: tls
              mountPath: /etc/tls
              readOnly: true
            - name: audit-log
              mountPath: /var/log/mcp
            - name: license
              mountPath: /etc/mcp-license
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

        # ── mcp-sync sidecar ──────────────────────────────────────────────
        # Watches McpRoute CRDs and syncs state to this orchestrator instance
        # via POST /internal/routes on localhost:8080.
        # Competes for a K8s Lease — only the leader pushes to its paired
        # orchestrator. Follower stays warm and takes over if leader dies.
        - name: mcp-sync
          image: docker.io/curtismager20/mcp-sync:v1
          imagePullPolicy: Always
          env:
            - name: ORCHESTRATOR_URL
              value: "http://127.0.0.1:8080"
            - name: WATCH_NAMESPACE
              value: ""
            - name: LEASE_NAMESPACE
              value: "mcp-system"
            - name: LEASE_NAME
              value: "mcp-sync-leader"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: mcp-orchestrator-config
        - name: tls
          secret:
            secretName: mcp-orchestrator-tls
        - name: audit-log
          emptyDir: {}
        - name: license
          secret:
            secretName: mcp-license
            optional: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: mcp-orchestrator

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-orchestrator
  namespace: mcp-system
  labels:
    app: mcp-orchestrator
spec:
  selector:
    app: mcp-orchestrator
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090
    - name: xds
      port: 18000
      targetPort: 18000
    - name: metrics
      port: 9091
      targetPort: 9091

---
# Headless service for Envoy xDS gRPC ADS — required by bootstrap.yaml.
# clusterIP: None so STRICT_DNS resolves directly to pod IPs (gRPC requirement).
apiVersion: v1
kind: Service
metadata:
  name: mcp-orchestrator-xds-headless
  namespace: mcp-system
  labels:
    app: mcp-orchestrator
spec:
  clusterIP: None
  selector:
    app: mcp-orchestrator
  ports:
    - name: xds
      port: 18000
      targetPort: 18000
      protocol: TCP

---
# Envoy gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-envoy-gateway
  namespace: mcp-system
  labels:
    app: mcp-envoy-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-envoy-gateway
  template:
    metadata:
      labels:
        app: mcp-envoy-gateway
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.28-latest
          args:
            - "-c"
            - "/etc/envoy/bootstrap.yaml"
            - "--service-cluster"
            - "mcp-gateway"
          ports:
            - name: http
              containerPort: 10000
            - name: https
              containerPort: 10443
            - name: admin
              containerPort: 9901
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
          #   subPath: bootstrap.yaml
              readOnly: true
            - name: tls
              mountPath: /etc/envoy/tls
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 9901
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: envoy-config
          configMap:
            name: mcp-envoy-bootstrap
        - name: tls
          secret:
            secretName: mcp-envoy-tls

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-envoy-gateway
  namespace: mcp-system
  labels:
    app: mcp-envoy-gateway
spec:
  type: LoadBalancer
  selector:
    app: mcp-envoy-gateway
  ports:
    - name: https
      port: 443
      targetPort: 10443
    - name: http
      port: 80
      targetPort: 10000

---
# Horizontal Pod Autoscaler for the gateway
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mcp-envoy-gateway
  namespace: mcp-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mcp-envoy-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# NetworkPolicy: MCP servers can only be reached from mcp-system namespace.
# This allows both the Envoy gateway AND the orchestrator (for tool discovery)
# to reach deployed MCP servers. Port is intentionally open to support servers
# running on any port (3000, 8080, etc.).
# Future: per-server governance rules will tighten this based on transport,
# group membership, and declared capabilities.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-server-isolation
  namespace: mcp-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: mcp-orchestrator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mcp-system
      # Allow all pods from mcp-system (Envoy gateway + orchestrator for tool discovery)
      # No port restriction here — servers may run on different ports (3000, 8080, etc.)
  egress:
    - to:
        - namespaceSelector: {}   # Allow DNS
      ports:
        - protocol: UDP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # block metadata service

---
# ─── Standalone PostgreSQL Deployment ─────────────────────────────────────────
# Single-replica Postgres accessible by all orchestrator pods via Service.
# Eliminates PVC contention and split-brain when scaling orchestrator replicas.
#
# Storage class options (on-prem):
#   longhorn          — recommended; replicated across nodes, snapshots, backups
#   rook-ceph-block   — enterprise-grade distributed storage (Ceph)
#   openebs-hostpath  — simple local storage (no replication)
#   nfs-client        — NFS-backed (requires existing NFS server)
#   <empty>           — uses cluster default StorageClass
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mcp-postgres-data
  namespace: mcp-system
  labels:
    app: mcp-postgres
    component: postgresql
spec:
  # storageClassName: longhorn    # ← Uncomment and set for your environment
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-postgres
  namespace: mcp-system
  labels:
    app: mcp-postgres
    component: postgresql
spec:
  replicas: 1
  strategy:
    type: Recreate    # PVC is RWO — can't have two pods mounting it
  selector:
    matchLabels:
      app: mcp-postgres
  template:
    metadata:
      labels:
        app: mcp-postgres
    spec:
      securityContext:
        fsGroup: 999    # postgres group in alpine image
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "mcp_platform"
            - name: POSTGRES_USER
              value: "mcp"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mcp-orchestrator-secrets
                  key: MCP_DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "mcp", "-d", "mcp_platform"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "mcp", "-d", "mcp_platform"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: mcp-postgres-data
        - name: postgres-init
          configMap:
            name: mcp-postgres-init

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-postgres
  namespace: mcp-system
  labels:
    app: mcp-postgres
spec:
  selector:
    app: mcp-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
# PostgreSQL init scripts — run once on first startup by postgres:16-alpine
# Mounted at /docker-entrypoint-initdb.d/ — executed in alphabetical order
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-postgres-init
  namespace: mcp-system
  labels:
    app: mcp-orchestrator
    component: postgresql
data:
  01-schema.sql: |
    -- MCP Platform Database Schema
    -- Created automatically on first PostgreSQL startup

    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    -- ── Users ──────────────────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS users (
        id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        username      VARCHAR(255) UNIQUE NOT NULL,
        password_hash VARCHAR(255) NOT NULL,   -- bcrypt hash
        roles         TEXT[]      NOT NULL DEFAULT '{}',
        enabled       BOOLEAN     NOT NULL DEFAULT TRUE,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        last_login    TIMESTAMPTZ
    );

    -- ── Audit Events ───────────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS audit_events (
        id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        kind          VARCHAR(64) NOT NULL,    -- Deployed, Undeployed, Scaled, etc.
        actor         VARCHAR(255) NOT NULL,   -- JWT subject
        server_name   VARCHAR(255),
        namespace     VARCHAR(255),
        detail        TEXT,
        old_state     JSONB,
        new_state     JSONB,
        ts            TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS audit_events_ts_idx ON audit_events (ts DESC);
    CREATE INDEX IF NOT EXISTS audit_events_actor_idx ON audit_events (actor);
    CREATE INDEX IF NOT EXISTS audit_events_server_idx ON audit_events (server_name, namespace);

    -- ── Deployed Servers ───────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS deployed_servers (
        id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name          VARCHAR(255) NOT NULL,
        namespace     VARCHAR(255) NOT NULL,
        image         VARCHAR(512) NOT NULL,
        image_tag     VARCHAR(128) NOT NULL DEFAULT 'latest',
        replicas      INT         NOT NULL DEFAULT 1,
        mcp_port      INT         NOT NULL DEFAULT 3000,
        transport     VARCHAR(32) NOT NULL DEFAULT 'http',
        cluster_ip    VARCHAR(64),
        cluster_port  INT,
        state         VARCHAR(32) NOT NULL DEFAULT 'Pending',
        deployed_by   VARCHAR(255),
        tools         JSONB       NOT NULL DEFAULT '[]',
        env_vars      JSONB       NOT NULL DEFAULT '{}',
        labels        JSONB       NOT NULL DEFAULT '{}',
        annotations   JSONB       NOT NULL DEFAULT '{}',
        group_name    VARCHAR(255),
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE (name, namespace)
    );

    -- ── RBAC Roles ─────────────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS roles (
        id            VARCHAR(255) PRIMARY KEY,
        name          VARCHAR(255) NOT NULL,
        description   TEXT,
        permissions   JSONB       NOT NULL DEFAULT '[]',
        allowed_namespaces JSONB  NOT NULL DEFAULT '["*"]',
        system_role   BOOLEAN     NOT NULL DEFAULT FALSE,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- ── Governance Policies ─────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS governance_policies (
        id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name          VARCHAR(255) UNIQUE NOT NULL,
        description   TEXT        NOT NULL DEFAULT '',
        rules         JSONB       NOT NULL DEFAULT '[]',
        applies_to_namespaces JSONB NOT NULL DEFAULT '["*"]',
        is_template   BOOLEAN     NOT NULL DEFAULT FALSE,
        enabled       BOOLEAN     NOT NULL DEFAULT TRUE,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS governance_policies_enabled_idx ON governance_policies (enabled);

    -- ── Webhooks ────────────────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS webhooks (
        id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name          VARCHAR(255) NOT NULL,
        url           TEXT        NOT NULL,
        secret        TEXT        NOT NULL DEFAULT '',
        event_types   JSONB       NOT NULL DEFAULT '["*"]',
        namespaces    JSONB       NOT NULL DEFAULT '["*"]',
        enabled       BOOLEAN     NOT NULL DEFAULT TRUE,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

  02-seed.sql: |
    -- Seed data: default admin user (password: admin — CHANGE IN PRODUCTION)
    INSERT INTO users (username, password_hash, roles, enabled)
    VALUES (
        'admin',
        '$2a$12$0OAq9ZVN96/RLKJngYzLIed1TekrTKUbdKjSDfdYCSmsTNrea7VaG',  -- bcrypt of 'admin'
        ARRAY['system:platform-admin'],
        TRUE
    ) ON CONFLICT (username) DO NOTHING;

    -- Seed roles with namespace isolation
    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role)
    VALUES (
        'system:platform-admin',
        'Platform Admin',
        'Full access to all namespaces and operations',
        '["Deploy","Undeploy","Scale","Read","Write","ManageRoles","AuditRead","ViewLogs"]',
        '["*"]',
        TRUE
    ) ON CONFLICT (id) DO NOTHING;

    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role)
    VALUES (
        'system:deploy-manager',
        'Deploy Manager',
        'Deploy and manage servers in production and staging',
        '["Deploy","Undeploy","Scale","Read","Write","ViewLogs","AuditRead"]',
        '["mcp-prod","mcp-staging"]',
        TRUE
    ) ON CONFLICT (id) DO NOTHING;

    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role)
    VALUES (
        'system:operator',
        'Operator',
        'Deploy and manage servers in dev and staging only — no production access',
        '["Deploy","Undeploy","Scale","Read","Write","ViewLogs"]',
        '["mcp-dev","mcp-staging"]',
        TRUE
    ) ON CONFLICT (id) DO NOTHING;

    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role)
    VALUES (
        'system:viewer',
        'Viewer',
        'Read-only access across all namespaces',
        '["Read","AuditRead"]',
        '["*"]',
        TRUE
    ) ON CONFLICT (id) DO NOTHING;

    -- Seed governance policy templates
    INSERT INTO governance_policies (name, description, is_template, enabled, applies_to_namespaces, rules)
    VALUES (
        'enterprise-standard',
        'Default enterprise governance policy — enforces security, resource limits, naming, and transport standards.',
        TRUE,
        TRUE,
        '["mcp-prod","mcp-staging"]',
        '[
          {"category":"security","field":"transport","operator":"in","value":["streamable_http","sse"],"severity":"error","message":"Only Streamable HTTP or SSE transport allowed — stdio is not permitted in production"},
          {"category":"resource_limits","field":"memory_limit_mb","operator":"lte","value":2048,"severity":"error","message":"Memory limit must not exceed 2Gi"},
          {"category":"resource_limits","field":"cpu_limit","operator":"lte","value":2.0,"severity":"error","message":"CPU limit must not exceed 2 cores"},
          {"category":"resource_limits","field":"replicas","operator":"lte","value":10,"severity":"error","message":"Initial replicas must not exceed 10"},
          {"category":"resource_limits","field":"replicas","operator":"gte","value":1,"severity":"error","message":"Must have at least 1 replica"},
          {"category":"naming","field":"labels.team","operator":"exists","value":true,"severity":"error","message":"Label team is required for all MCP servers"},
          {"category":"naming","field":"name","operator":"regex","value":"^[a-z][a-z0-9-]{2,62}$","severity":"error","message":"Server name must be lowercase alphanumeric with hyphens, 3-63 chars"},
          {"category":"tool_safety","field":"tools.*.read_only","operator":"equals","value":true,"severity":"warning","message":"Mutating tools detected — review required before production use"}
        ]'::jsonb
    ) ON CONFLICT (name) DO NOTHING;

    INSERT INTO governance_policies (name, description, is_template, enabled, applies_to_namespaces, rules)
    VALUES (
        'dev-relaxed',
        'Relaxed policy for development environments — minimal restrictions.',
        TRUE,
        TRUE,
