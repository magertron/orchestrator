# ─── RBAC for mcp-sync sidecar ────────────────────────────────────────────────
#
# We bind the mcp-sync permissions to your EXISTING mcp-orchestrator
# ServiceAccount since that's what the Pod already runs as.
# No new ServiceAccount needed.
#
# Apply with: kubectl apply -f deploy/rbac.yaml

---
# ── ClusterRole: permissions the sidecar needs ────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-sync
  labels:
    app: mcp-orchestrator
rules:

  # Watch, list, and read McpRoute CRDs
  - apiGroups: ["mcp.io"]
    resources: ["mcproutes"]
    verbs: ["get", "list", "watch"]

  # Update status subresource (syncedToEnvoy, conditions)
  - apiGroups: ["mcp.io"]
    resources: ["mcproutes/status"]
    verbs: ["get", "update", "patch"]

  # Full CRUD on Lease objects for leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Emit K8s events visible via kubectl describe mcproute
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
# ── ClusterRoleBinding: bind to your existing mcp-orchestrator account ─────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-sync
  labels:
    app: mcp-orchestrator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-sync
subjects:
  - kind: ServiceAccount
    name: mcp-orchestrator        # your existing service account
    namespace: mcp-system
