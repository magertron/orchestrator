<!-- ══ Ask-your-platform typewriter showcase ═══════════════════════════════════
     Rotating demo of the assistant answering live operational questions about a
     governed AI platform. Styled to match Magertron: section-label/title/desc
     framing, feature-card surface treatment, site CSS vars. Scoped .mag-ask-*.
================================================================================ -->
<div class="mag-ask" aria-label="The assistant answering live platform questions">
  <div class="mag-ask-label">Conversational Operations</div>
  <h2 class="mag-ask-heading">Questions your AI platform<br>could never answer before</h2>

  <div class="mag-ask-frame">
    <div class="mag-ask-head">
      <span class="mag-ask-spark">✦</span>
      <span class="mag-ask-title">Assistant</span>
      <span class="mag-ask-tag">Advisory · read-only · grounded in live platform state</span>
    </div>

    <div class="mag-ask-body">
      <div class="mag-ask-row mag-ask-row-user">
        <div class="mag-ask-bubble mag-ask-bubble-user" id="magAskQ">&nbsp;</div>
      </div>
      <div class="mag-ask-row mag-ask-row-bot">
        <div class="mag-ask-bubble mag-ask-bubble-bot">
          <span id="magAskA"></span><span class="mag-ask-caret" id="magAskCaret">▋</span>
        </div>
      </div>
    </div>

    <div class="mag-ask-dots" id="magAskDots" role="tablist" aria-label="Example questions"></div>
  </div>
</div>

<style>
.mag-ask{max-width:640px;margin:44px auto 0;text-align:center;}
.mag-ask-label{
  font-family:var(--mono);font-size:12px;text-transform:uppercase;
  letter-spacing:0.1em;color:var(--accent-text);margin-bottom:16px;
}
.mag-ask-heading{
  font-family:var(--serif);font-size:clamp(26px,3vw,36px);font-weight:700;
  line-height:1.15;letter-spacing:-0.03em;margin:0 0 28px;color:var(--text-primary);
}
.mag-ask-frame{
  background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;text-align:left;
}
.mag-ask-head{
  display:flex;align-items:center;gap:10px;padding:16px 20px;
  border-bottom:1px solid var(--border);
}
.mag-ask-spark{color:var(--accent-text);font-size:14px;}
.mag-ask-title{font-weight:600;font-size:14px;color:var(--text-primary);}
.mag-ask-tag{
  margin-left:auto;font-family:var(--mono);font-size:10.5px;letter-spacing:.02em;
  color:var(--text-tertiary);text-transform:uppercase;
}
.mag-ask-body{padding:24px 20px 20px;min-height:210px;}
.mag-ask-row{display:flex;margin-bottom:8px;}
.mag-ask-row-user{justify-content:flex-end;}
.mag-ask-row-bot{justify-content:flex-start;}
.mag-ask-bubble{
  max-width:86%;padding:12px 16px;border-radius:12px;font-size:14.5px;
  line-height:1.7;white-space:pre-wrap;word-break:break-word;
}
.mag-ask-bubble-user{
  background:var(--accent-glow);border:1px solid var(--border-accent);
  color:var(--text-primary);border-bottom-right-radius:4px;font-weight:500;
}
.mag-ask-bubble-bot{
  background:var(--bg-card-hover);border:1px solid var(--border);
  color:var(--text-secondary);border-bottom-left-radius:4px;min-height:20px;
}
.mag-ask-bubble-bot .mag-tok{
  color:var(--accent-text);font-family:var(--mono);font-size:13px;
  padding:1px 5px;border-radius:6px;background:var(--accent-glow);
}
.mag-ask-bubble-bot .mag-flag{color:#22d3ee;font-weight:600;}
.mag-ask-bubble-bot strong{color:var(--text-primary);font-weight:600;}
.mag-ask-caret{
  color:var(--accent-text);font-weight:400;animation:magBlink 1s steps(1) infinite;
  margin-left:1px;
}
@keyframes magBlink{50%{opacity:0;}}
.mag-ask-caret.mag-hide{display:none;}
.mag-ask-dots{display:flex;gap:7px;justify-content:center;padding:4px 0 18px;}
.mag-ask-dot{
  width:7px;height:7px;border-radius:100px;background:var(--text-tertiary);
  border:none;padding:0;cursor:pointer;transition:all .25s;opacity:.5;
}
.mag-ask-dot.active{background:var(--accent-text);opacity:1;width:22px;}
@media (max-width:640px){
  .mag-ask-tag{display:none;}
  .mag-ask-bubble{max-width:92%;font-size:14px;}
}
@media (prefers-reduced-motion:reduce){
  .mag-ask-caret{animation:none;}
}
</style>

<script>
(function(){
  // Each example: the question, and the answer as HTML (with .mag-tok server
  // names and .mag-flag for the security callout). Invented enterprise data.
  var EX = [
    {
      q: "What's my busiest server?",
      a: 'Based on the live platform snapshot, your busiest server is '
        +'<span class="mag-tok">claude-prod</span> in the '
        +'<span class="mag-tok">ml-platform</span> namespace — '
        +'<strong>1.24M calls</strong> over the last 24 hours, well ahead of anything else.'
    },
    {
      q: "Any agents accessing tools without grants?",
      a: 'Yes — <span class="mag-flag">a security red flag</span>. '
        +'<span class="mag-tok">batch-etl-07</span>, <span class="mag-tok">notebook-sandbox</span>, '
        +'and 3 more service accounts are calling '
        +'<span class="mag-tok">snowflake-connector/run_query</span> with no entitlement granting it. '
        +'5 principals, 1,880 ungranted calls in 24h. Review before it becomes an incident.'
    },
    {
      q: "What's my most expensive server?",
      a: 'Your most expensive server this billing period is '
        +'<span class="mag-tok">openai-gpt4o</span> at <strong>$8,412.90</strong> — '
        +'about 38% of total AI spend. <span class="mag-tok">claude-prod</span> is next at $5,240.15.'
    },
    {
      q: "Anything over or near budget?",
      a: 'Two servers need attention this period: '
        +'<span class="mag-tok">openai-gpt4o</span> is <span class="mag-flag">OVER</span> — '
        +'112% of its $7,500 ceiling — and <span class="mag-tok">exa-search</span> is near, at 86% of $2,000. '
        +'Everything else is comfortably within budget.'
    },
    {
      q: "What's my busiest tenant?",
      a: 'Your busiest namespace is <span class="mag-tok">ml-platform</span> — '
        +'<strong>2.1M operations</strong> in 24h, driven mostly by '
        +'<span class="mag-tok">claude-prod</span> and <span class="mag-tok">openai-gpt4o</span>. '
        +'<span class="mag-tok">payments-prod</span> is a distant second.'
    }
  ];

  var qEl    = document.getElementById('magAskQ');
  var aEl     = document.getElementById('magAskA');
  var caret  = document.getElementById('magAskCaret');
  var dotsEl = document.getElementById('magAskDots');
  if(!qEl||!aEl){return;}

  // build dots
  EX.forEach(function(_,i){
    var d=document.createElement('button');
    d.className='mag-ask-dot'+(i===0?' active':'');
    d.setAttribute('role','tab');
    d.setAttribute('aria-label','Example '+(i+1));
    d.addEventListener('click',function(){ go(i); });
    dotsEl.appendChild(d);
  });
  var dots=Array.prototype.slice.call(dotsEl.children);

  var idx=0, timers=[], reduced=false;
  try{reduced=window.matchMedia('(prefers-reduced-motion:reduce)').matches;}catch(e){}

  function clearTimers(){ timers.forEach(clearTimeout); timers=[]; }
  function setActive(i){ dots.forEach(function(d,j){ d.classList.toggle('active',j===i); }); }

  // Type HTML by walking it: reveal text nodes char-by-char, emit tags whole.
  function typeHTML(html, el, done){
    // tokenize into [{t:'text',v}, {t:'tag',v}]
    var toks=[], re=/(<[^>]+>)/g, last=0, m;
    while((m=re.exec(html))){
      if(m.index>last) toks.push({t:'text',v:html.slice(last,m.index)});
      toks.push({t:'tag',v:m[0]});
      last=re.lastIndex;
    }
    if(last<html.length) toks.push({t:'text',v:html.slice(last)});

    var out='', ti=0, ci=0;
    function step(){
      if(ti>=toks.length){ done&&done(); return; }
      var tok=toks[ti];
      if(tok.t==='tag'){ out+=tok.v; ti++; el.innerHTML=out; timers.push(setTimeout(step, 0)); return; }
      if(ci<tok.v.length){
        out+=tok.v[ci]; ci++; el.innerHTML=out;
        var ch=tok.v[ci-1];
        var d = reduced?0:(ch===' '?14: ch==='.'||ch===','?60: 18+Math.random()*22);
        timers.push(setTimeout(step, d));
      } else { ci=0; ti++; step(); }
    }
    step();
  }

  function go(i){
    clearTimers();
    idx=i; setActive(i);
    var ex=EX[i];
    caret.classList.add('mag-hide');
    qEl.textContent=ex.q;                 // question appears instantly
    aEl.innerHTML='';
    // small beat, then type the answer
    timers.push(setTimeout(function(){
      caret.classList.remove('mag-hide');
      typeHTML(ex.a, aEl, function(){
        // hold, then advance
        var hold = reduced?2600:4200;
        timers.push(setTimeout(function(){ go((idx+1)%EX.length); }, hold));
      });
    }, 420));
  }

  // Kick off when scrolled into view (don't burn the animation above the fold
  // before the visitor sees it). Fallback: start immediately.
  var started=false;
  function start(){ if(started)return; started=true; go(0); }
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(es){
      es.forEach(function(e){ if(e.isIntersecting){ start(); io.disconnect(); } });
    },{threshold:.35});
    io.observe(document.querySelector('.mag-ask'));
  } else { start(); }
})();
</script>
<!-- ══ end ask-your-platform showcase ═════════════════════════════════════════ -->
