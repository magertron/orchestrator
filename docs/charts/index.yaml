        - kind: fixed
          description: "templates/networkpolicy.yaml now uses Helm `lookup` to skip NetworkPolicy generation for tenant namespaces that don't exist at install time. Previously, the same `range .Values.namespaces` fan-out as namespaces.yaml caused install failures (`namespaces \"mcp-prod\" not found`) on fresh clusters where tenant namespaces hadn't been created yet by the orchestrator. With `lookup`, the chart applies the isolation NetworkPolicy to tenant namespaces that exist (e.g. created by a prior orchestrator install or by ops), and quietly skips namespaces that don't yet exist. Known gap: namespaces created later by the orchestrator at server-deploy time will not get the chart-managed NetworkPolicy until a `helm upgrade` rerenders. Closing this gap requires C++ work to apply the policy from the orchestrator's runtime namespace-creation path; tracked as 1.9.x candidate."
