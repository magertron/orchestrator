    description: MCP Orchestrator â€” Kubernetes-native control plane for managing MCP
      servers
    digest: 8c18a0bfd4c6ac5255b7eb3faa20e5e02c3d3bd47e1bac3b6bfe7912de061d3c
    home: https://github.com/mcp-platform/mcp-orchestrator
    keywords:
    - mcp
