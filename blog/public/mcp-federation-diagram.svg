<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" role="img" aria-label="MCP Multi-Source Inventory Aggregation">
  <title>MCP Multi-Source Inventory Aggregation</title>
  <desc>Four federated data sources — MCP host config files, endpoint inspection, egress and proxy logs, and network scanning — feeding into the Magertron control plane, which produces a unified MCP inventory for governance.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#8694a8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .src-fill { fill: #E1F5EE; }
      .src-stroke { stroke: #0F6E56; }
      .src-title { fill: #04342C; font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 14px; }
      .src-sub { fill: #0F6E56; font-family: 'Inter', system-ui, sans-serif; font-weight: 400; font-size: 12px; }

      .gray-fill { fill: #F1EFE8; }
      .gray-stroke { stroke: #5F5E5A; }
      .gray-title { fill: #2C2C2A; font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 14px; }
      .gray-sub { fill: #5F5E5A; font-family: 'Inter', system-ui, sans-serif; font-weight: 400; font-size: 12px; }

      .hub-fill { fill: #EEEDFE; }
      .hub-stroke { stroke: #534AB7; }
      .hub-title { fill: #26215C; font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 14px; }
      .hub-sub { fill: #534AB7; font-family: 'Inter', system-ui, sans-serif; font-weight: 400; font-size: 12px; }

      .out-fill { fill: #E6F1FB; }
      .out-stroke { stroke: #185FA5; }
      .out-title { fill: #042C53; font-family: 'Inter', system-ui, sans-serif; font-weight: 500; font-size: 14px; }
      .out-sub { fill: #185FA5; font-family: 'Inter', system-ui, sans-serif; font-weight: 400; font-size: 12px; }

      .conn { stroke: #8694a8; stroke-width: 1.5; fill: none; }

      @media (prefers-color-scheme: dark) {
        .src-fill { fill: #085041; }
        .src-stroke { stroke: #9FE1CB; }
        .src-title { fill: #E1F5EE; }
        .src-sub { fill: #9FE1CB; }

        .gray-fill { fill: #444441; }
        .gray-stroke { stroke: #D3D1C7; }
        .gray-title { fill: #F1EFE8; }
        .gray-sub { fill: #D3D1C7; }

        .hub-fill { fill: #3C3489; }
        .hub-stroke { stroke: #CECBF6; }
        .hub-title { fill: #EEEDFE; }
        .hub-sub { fill: #CECBF6; }

        .out-fill { fill: #0C447C; }
        .out-stroke { stroke: #B5D4F4; }
        .out-title { fill: #E6F1FB; }
        .out-sub { fill: #B5D4F4; }
      }
    </style>
  </defs>

  <!-- Source 1: Host config files -->
  <rect x="20" y="40" width="220" height="60" rx="8" class="src-fill src-stroke" stroke-width="0.5"/>
  <text x="130" y="64" text-anchor="middle" dominant-baseline="central" class="src-title">MCP host config files</text>
  <text x="130" y="84" text-anchor="middle" dominant-baseline="central" class="src-sub">Cursor, VS Code, Claude</text>

  <!-- Source 2: Endpoint inspection -->
  <rect x="20" y="120" width="220" height="60" rx="8" class="src-fill src-stroke" stroke-width="0.5"/>
  <text x="130" y="144" text-anchor="middle" dominant-baseline="central" class="src-title">Endpoint inspection</text>
  <text x="130" y="164" text-anchor="middle" dominant-baseline="central" class="src-sub">Processes, npm, pip</text>

  <!-- Source 3: Egress and proxy logs -->
  <rect x="20" y="200" width="220" height="60" rx="8" class="src-fill src-stroke" stroke-width="0.5"/>
  <text x="130" y="224" text-anchor="middle" dominant-baseline="central" class="src-title">Egress and proxy logs</text>
  <text x="130" y="244" text-anchor="middle" dominant-baseline="central" class="src-sub">User-Agent fingerprints</text>

  <!-- Source 4: Network scanning (deemphasized in gray) -->
  <rect x="20" y="280" width="220" height="60" rx="8" class="gray-fill gray-stroke" stroke-width="0.5"/>
  <text x="130" y="304" text-anchor="middle" dominant-baseline="central" class="gray-title">Network scanning</text>
  <text x="130" y="324" text-anchor="middle" dominant-baseline="central" class="gray-sub">Last resort, not primary</text>

  <!-- Arrows from sources into Magertron control plane -->
  <line x1="244" y1="70" x2="386" y2="180" class="conn" marker-end="url(#arrow)"/>
  <line x1="244" y1="150" x2="386" y2="190" class="conn" marker-end="url(#arrow)"/>
  <line x1="244" y1="230" x2="386" y2="200" class="conn" marker-end="url(#arrow)"/>
  <line x1="244" y1="310" x2="386" y2="210" class="conn" marker-end="url(#arrow)"/>

  <!-- Center: Magertron control plane -->
  <rect x="390" y="150" width="200" height="100" rx="8" class="hub-fill hub-stroke" stroke-width="0.5"/>
  <text x="490" y="180" text-anchor="middle" dominant-baseline="central" class="hub-title">Magertron</text>
  <text x="490" y="200" text-anchor="middle" dominant-baseline="central" class="hub-title">control plane</text>
  <text x="490" y="222" text-anchor="middle" dominant-baseline="central" class="hub-sub">Dedupe, correlate, alert</text>

  <!-- Arrow down to output -->
  <line x1="490" y1="250" x2="490" y2="336" class="conn" marker-end="url(#arrow)"/>

  <!-- Output: Unified MCP inventory -->
  <rect x="340" y="340" width="300" height="60" rx="8" class="out-fill out-stroke" stroke-width="0.5"/>
  <text x="490" y="364" text-anchor="middle" dominant-baseline="central" class="out-title">Unified MCP inventory</text>
  <text x="490" y="384" text-anchor="middle" dominant-baseline="central" class="out-sub">Managed catalog, governance</text>
</svg>
