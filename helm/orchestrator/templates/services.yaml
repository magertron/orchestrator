apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp.fullname" . }}
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "mcp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.httpPort }}
      targetPort: {{ .Values.api.httpPort }}
    - name: grpc
      port: {{ .Values.api.grpcPort }}
      targetPort: {{ .Values.api.grpcPort }}
    - name: xds
      port: {{ .Values.envoy.xds.port }}
      targetPort: {{ .Values.envoy.xds.port }}
    - name: metrics
      port: {{ .Values.observability.metricsPort }}
      targetPort: {{ .Values.observability.metricsPort }}
    # ext_authz gRPC — routes Envoy :10093 filter Check() calls to orchestrator
    - name: ext-authz
      port: {{ .Values.orchestrator.extAuthzPort | default 9092 }}
      targetPort: {{ .Values.orchestrator.extAuthzPort | default 9092 }}
    # Session 2.13, Step 6b-i: parallel ext_authz for External MCP servers.
    # Receives Check() calls for traffic destined for vendor-hosted (External)
    # MCP server registrations. Step 6d will configure Envoy v3 to route
    # External-path requests here (instead of the port-9092 cluster above).
    # Until then, this port is bound by the orchestrator but no traffic
    # reaches it — safe scaffolding.
    - name: ext-authz-external
      port: {{ .Values.orchestrator.extAuthzExternalPort | default 9093 }}
      targetPort: {{ .Values.orchestrator.extAuthzExternalPort | default 9093 }}

---
# Headless service for xDS gRPC + REST + ext_authz — STRICT_DNS resolves
# to pod IPs, bypassing the ClusterIP/kube-proxy NAT layer.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp.fullname" . }}-xds-headless
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "mcp.selectorLabels" . | nindent 4 }}
    component: orchestrator
  ports:
    - name: xds
      port: {{ .Values.envoy.xds.port }}
      targetPort: {{ .Values.envoy.xds.port }}
    # Bug #3 fix follow-up: REST API on headless so Envoy can resolve to
    # individual pod IPs and load-balance directly. Without this, the
    # mcp_orchestrator cluster in envoy-bootstrap.yaml saw only the
    # ClusterIP VIP and one sick pod produced ~50% failure rates because
    # kube-proxy round-robins blindly. With pod IPs visible to Envoy,
    # connection-pool retries against a different pod work as expected.
    - name: http
      port: {{ .Values.api.httpPort }}
      targetPort: {{ .Values.api.httpPort }}
    # ── Bug E fix (2026-05-09) ──────────────────────────────────────────
    # ext_authz on headless for the same reason as the Bug #3 follow-up
    # above — bypass kube-proxy. With the ClusterIP path, Envoy's
    # mcp_ext_authz cluster saw 37-55% connect_fail rates on cold-start
    # bursts (UAEX flag, upstream=null, destroy_remote in the stats).
    # Diagnosed via per-pod TCP probes (40/40 OK), Envoy admin /stats
    # showing membership_total=1 with cx_connect_fail=11/20 cx_total
    # right after envoy rollout. Per-pod resolution eliminates it.
    # ────────────────────────────────────────────────────────────────────
    - name: ext-authz
      port: {{ .Values.orchestrator.extAuthzPort | default 9092 }}
      targetPort: {{ .Values.orchestrator.extAuthzPort | default 9092 }}
    # Session 2.13, Step 6b-i: parallel ext_authz for External MCP servers
    # also published on headless so Envoy can resolve per-pod IPs and
    # bypass kube-proxy (same rationale as the port-9092 headless entry
    # above — see Bug E note).
    - name: ext-authz-external
      port: {{ .Values.orchestrator.extAuthzExternalPort | default 9093 }}
      targetPort: {{ .Values.orchestrator.extAuthzExternalPort | default 9093 }}

# Slice 6e Option A: v3-ads NodePort service removed. v3 ADS traffic now
# rides the legacy xDS port (18000) and the unified AdsServiceImpl in the
# orchestrator branches on incoming node.id to dispatch v3 vs legacy.

---
# C2: leader-targeted Service. The selector includes role=leader, a label that
# ONLY the pod currently holding the orchestrator Lease carries — it is set at
# runtime by the on_become_leader callback (main.cpp) and removed on
# on_lose_leadership, never baked into the pod template. The Envoy REST cluster
# (mcp_orchestrator in envoy-bootstrap.yaml) targets this Service so admin
# mutations (POST/PUT/DELETE /api/v1/servers*) always land on the leader,
# eliminating the follower 503-bounce and the 504/dup-key it caused under rapid
# registration in the regression suite.
#
# NORMAL ClusterIP (NOT headless): Envoy STRICT_DNS resolves the stable VIP and
# kube-proxy forwards it to whichever pod currently carries role=leader. On
# failover the VIP is unchanged — only the backing endpoint moves — so Envoy
# never needs to re-resolve and there is no stale-address window. During the
# brief election gap the Service simply has no endpoints; mutations get a fast
# connection error that clients retry (bounded, safe).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp.fullname" . }}-leader
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "mcp.selectorLabels" . | nindent 4 }}
    role: leader
  ports:
    - name: http
      port: {{ .Values.api.httpPort }}
      targetPort: {{ .Values.api.httpPort }}
    - name: grpc
      port: {{ .Values.api.grpcPort }}
      targetPort: {{ .Values.api.grpcPort }}
