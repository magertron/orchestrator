{{- if .Values.envoy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp.fullname" . }}-envoy
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
    component: envoy-gateway
spec:
  replicas: {{ .Values.envoy.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "mcp.fullname" . }}-envoy
  template:
    metadata:
      labels:
        app: {{ include "mcp.fullname" . }}-envoy
    spec:
      containers:
        - name: envoy
          image: "{{ .Values.envoy.image.repository }}:{{ .Values.envoy.image.tag }}"
          args: ["-c", "/etc/envoy/bootstrap.yaml", "--service-cluster", "mcp-gateway"]
          ports:
            - name: http
              containerPort: 10080
            - name: https
              containerPort: 10443
            - name: inventory
              containerPort: 10347
            - name: admin
              containerPort: 9901
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
            - name: tls
              mountPath: /etc/envoy/tls
              readOnly: true
          resources:
            {{- toYaml .Values.envoy.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 9901
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: envoy-config
          configMap:
            name: {{ include "mcp.fullname" . }}-envoy-bootstrap
        - name: tls
          secret:
            secretName: {{ .Values.tls.envoySecretName }}

{{- if .Values.envoy.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "mcp.fullname" . }}-envoy
  namespace: {{ include "mcp.namespace" . }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "mcp.fullname" . }}-envoy
  minReplicas: {{ .Values.envoy.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.envoy.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.envoy.autoscaling.targetCPU }}
    {{- if .Values.envoy.autoscaling.targetMemory }}
    # ⚠️ OPTIONAL, AND UNSET BY DEFAULT SINCE 2026-07-17 — lockstep with
    # envoy-v3-hpa.yaml. Read the note there before enabling this.
    #
    # Legacy's memory sits at ~13%, so this metric is not currently firing the
    # way v3's was. It is unset anyway, for the same reason both cpu limits
    # moved together: HPA memory utilisation is measured against `requests`
    # (128Mi here), so one buffer-size change puts legacy on the same
    # arithmetic that pinned v3 to maxReplicas at idle on every install.
    # routing_mode still defaults to "legacy", so this is the data plane most
    # installs actually run.
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.envoy.autoscaling.targetMemory }}
    {{- end }}
{{- end }}
{{- end }}
