{{- if and .Values.probo.enabled .Values.probo.mcpRegistration.enabled }}
{{- /*
  Post-install hook: registers probod's MCP server with Magertron as type:internal
  so the 270+ GRC tools flow through ext_authz / RBAC / rating / audit. Runs after
  probod is up; idempotent (409 "already exists" treated as success).

  Auth: a bootstrap admin token (the registration calls the admin API). The Probo
  MCP bearer token (the credential Magertron injects on proxied calls) is the
  PROBO_MCP_TOKEN key from the shared secret.
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "probo.probodName" . }}-mcp-register
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "probo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "probo.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register
          image: curlimages/curl:8.11.1
          env:
            - name: MAGERTRON_API
              {{- if .Values.probo.mcpRegistration.magertronApi }}
              value: {{ .Values.probo.mcpRegistration.magertronApi | quote }}
              {{- else }}
              # Auto-derive the orchestrator's own admin API in the release namespace.
              value: "http://{{ include "mcp.fullname" . }}.{{ include "mcp.namespace" . }}.svc.cluster.local:{{ .Values.api.httpPort }}/api/v1"
              {{- end }}
            - name: SERVER_NAME
              value: {{ .Values.probo.mcpRegistration.serverName | quote }}
            - name: TARGET_NS
              value: {{ include "mcp.namespace" . | quote }}
            - name: MCP_ENDPOINT
              {{- if .Values.probo.mcpRegistration.mcpEndpoint }}
              value: {{ .Values.probo.mcpRegistration.mcpEndpoint | quote }}
              {{- else }}
              value: "http://{{ include "probo.probodName" . }}.{{ include "mcp.namespace" . }}.svc.cluster.local:{{ .Values.probo.ports.api }}/mcp"
              {{- end }}
            - name: PROBOD_SVC
              value: "{{ include "probo.probodName" . }}.{{ include "mcp.namespace" . }}.svc.cluster.local:{{ .Values.probo.ports.api }}"
            # Bootstrap admin token to call Magertron's admin API.
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "probo.secretsName" . }}
                  key: MAGERTRON_BOOTSTRAP_ADMIN_TOKEN
                  optional: true
          command:
            - sh
            - -c
            - |
              set -e
              echo "Waiting for probod..."
              until curl -sf -o /dev/null "$PROBOD_SVC/"; do
                echo "  probod not ready, retrying..."; sleep 3;
              done
              echo "probod up. Registering MCP server '$SERVER_NAME' in '$TARGET_NS'..."
              HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
                -X POST "$MAGERTRON_API/servers" \
                -H "Authorization: Bearer $ADMIN_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{
                  \"type\": \"internal\",
                  \"name\": \"$SERVER_NAME\",
                  \"namespace\": \"$TARGET_NS\",
                  \"endpoint_url\": \"$MCP_ENDPOINT\",
                  \"auth_type\": \"api-key\",
                  \"credential_secret_ref\": \"{{ include "probo.secretsName" . }}\",
                  \"credential_mode\": \"centralized\",
                  \"routing_mode\": \"v3\"
                }")
              echo "Magertron HTTP $HTTP:"; cat /tmp/resp.json; echo
              if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ] || [ "$HTTP" = "409" ]; then
                echo "Registration OK ($HTTP)."; exit 0
              fi
              echo "Registration FAILED ($HTTP)."; exit 1
{{- end }}
