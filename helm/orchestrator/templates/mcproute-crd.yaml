# ─── McpRoute Custom Resource Definition ─────────────────────────────────────
#
# Apply with: kubectl apply -f crd.yaml
# List with:  kubectl get mcproutes -n mcp-system
# Inspect:    kubectl describe mcproute my-server -n mcp-system

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcproutes.mcp.io
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
  annotations:
    helm.sh/resource-policy: keep
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  group: mcp.io
  scope: Namespaced
  names:
    plural:   mcproutes
    singular: mcproute
    kind:     McpRoute
    shortNames:
      - mcpr

  versions:
    - name: v1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object
          properties:

            spec:
              type: object
              required:
                - serverName
                - prefix
                - clusterName
              properties:
                serverName:
                  type: string
                  description: "Unique name of the MCP server"
                namespace:
                  type: string
                  description: "Kubernetes namespace the MCP server lives in"
                prefix:
                  type: string
                  description: "URL prefix Envoy matches to route to this server"
                clusterName:
                  type: string
                  description: "Envoy cluster name for this server"
                clusterIP:
                  type: string
                  description: "IP address of the MCP server pod/service"
                clusterPort:
                  type: integer
                  minimum: 0
                  maximum: 65535
                  description: "Port the MCP server listens on. Internal servers use 1-65535; external servers route by endpointUrl and pass 0 (the cluster address comes from endpointUrl, not clusterIP/clusterPort)."
                enabled:
                  type: boolean
                  default: true
                  description: "Whether Envoy should actively route to this server"
                upstreamPath:
                  type: string
                  default: "/"
                  pattern: "^/.*"
                  description: "Path on the upstream MCP server. Envoy strips the inbound `prefix` and rewrites to this. Default `/` matches today's behavior; set to e.g. `/v1/mcp` for servers serving their MCP API at non-root paths. Multi-tenant: same server can be exposed via multiple McpRoutes with different upstreamPath values."

                # ── External MCP server fields (Bug D fix) ───────────────────
                # Present only for external (vendor) servers, which route by
                # endpointUrl rather than clusterIP/clusterPort and need the
                # auth/transport selectors so every pod's mcp-sync →
                # /internal/routes can rebuild the full mTLS upstream cluster.
                # Internal McpRoutes omit these entirely.
                isExternal:
                  type: boolean
                  default: false
                  description: "True for external/vendor MCP servers (routed by endpointUrl over (m)TLS) rather than internal in-cluster pods."
                endpointUrl:
                  type: string
                  description: "External server endpoint, e.g. https://vendor.example.com:8766/mcp. Drives the upstream cluster address/SNI for external servers."
                authType:
                  type: string
                  description: "Upstream auth mode for an external server: 'mtls' (present client cert), 'none', etc."
                credentialSecretRef:
                  type: string
                  description: "Name of the k8s Secret (in mcp-system) holding cert.pem/key.pem for mTLS to the external server."
                tlsMinVersion:
                  type: string
                  description: "Minimum upstream TLS version floor: 'tls1_2' (default) or 'tls1_3'."
                upstreamHttpVersion:
                  type: string
                  description: "Upstream HTTP protocol for the external cluster: 'http1' (default), 'http2', or 'auto' (ALPN-negotiated)."

            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                syncedToEnvoy:
                  type: boolean
                  description: "True when this route has been pushed to Envoy"
                lastSyncTime:
                  type: string
                  format: date-time
                  description: "When the route was last pushed to Envoy"
                observedVersion:
                  type: integer
                  description: "xDS version this route was last pushed at"

      subresources:
        status: {}

      additionalPrinterColumns:
        - name: Server
          type: string
          jsonPath: .spec.serverName
        - name: Prefix
          type: string
          jsonPath: .spec.prefix
        - name: ClusterIP
          type: string
          jsonPath: .spec.clusterIP
        - name: Port
          type: integer
          jsonPath: .spec.clusterPort
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: Synced
          type: boolean
          jsonPath: .status.syncedToEnvoy
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
