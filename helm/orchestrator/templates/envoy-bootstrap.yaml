{{- if .Values.envoy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp.fullname" . }}-envoy-bootstrap
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
    component: envoy-gateway
data:
  bootstrap.yaml: |
    node:
      id: {{ .Values.envoy.xds.nodeId }}
      cluster: {{ .Values.envoy.xds.clusterName }}

    # Dynamic resources via gRPC ADS — Aggregated Discovery Service.
    # Envoy opens a persistent bidirectional gRPC stream to the orchestrator
    # and receives CDS + RDS updates pushed in real time when MCP servers
    # are deployed or removed. No polling — push-based, sub-second latency.
    #
    # LDS is NOT used — listeners are defined statically below (envoy
    # re-arch 2026-04-18). HCM uses RDS for route config, which is the
    # only routing surface that needs to change dynamically.
    dynamic_resources:
      ads_config:
        api_type: GRPC
        transport_api_version: V3
        grpc_services:
          - envoy_grpc:
              cluster_name: mcp_orchestrator_xds
      cds_config:
        resource_api_version: V3
        ads: {}

    static_resources:
      clusters:
        # gRPC ADS cluster — connects to orchestrator xDS server
        # Must use HTTP/2 for gRPC — typed_extension_protocol_options required
        - name: mcp_orchestrator_xds
          connect_timeout: 5s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: mcp_orchestrator_xds
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "mcp.fullname" . }}-xds-headless.{{ include "mcp.namespace" . }}.svc.cluster.local
                          port_value: {{ .Values.envoy.xds.port }}

        # Direct cluster to orchestrator REST API (for non-xDS traffic)
        # Bug #3 fix follow-up: point REST cluster at the headless service
        # so Envoy can independently health-check and load-balance across
        # both pod IPs. Previously this used the regular ClusterIP service,
        # which collapsed to a single VIP and ~50% failure rate when one
        # pod was momentarily unhealthy.
        - name: mcp_orchestrator
          connect_timeout: 5s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: mcp_orchestrator
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "mcp.fullname" . }}-xds-headless.{{ include "mcp.namespace" . }}.svc.cluster.local
                          port_value: {{ .Values.api.httpPort }}

        # ext_authz gRPC cluster — the Policy Decision Point.
        # The ext_authz HTTP filter on :10443 calls Check() against this
        # cluster before forwarding any request. HTTP/2 required for gRPC.
        #
        # ── 1.11.x throughput tuning ─────────────────────────────────────
        # At 1000+ rps, the orchestrator's per-Check work is fast (~5ms p50
        # after the 1.10.x cache work) but Envoy was hitting a hard
        # ~500 rps wall regardless of orchestrator capacity. Diagnosis:
        # default circuit_breakers (max_requests=1024, max_pending=1024)
        # + single-connection HTTP/2 multiplexing under default settings
        # was saturating the gRPC stream pool to the orchestrator.
        #
        # Tuning:
        #  - circuit_breakers raised so Envoy doesn't reject in-flight
        #    Check() calls under burst load
        #  - max_concurrent_streams: 1024 lets HTTP/2 multiplex many
        #    Check() calls over the same TCP connection
        #  - max_requests_per_connection: 0 (unlimited) so a hot
        #    connection isn't churned by Envoy
        #  - keepalive params keep connections warm across idle gaps
        #
        # ── Bug E fix (2026-05-09) ───────────────────────────────────────
        # Switched from the ClusterIP service to the headless service —
        # same fix as the mcp_orchestrator cluster above (Bug #3
        # follow-up). With the ClusterIP, kube-proxy NAT'd new SYNs to
        # backend pods, and under burst (cold connection pool, e.g. just
        # after Envoy or orchestrator restart) ~37-55% got RST'd before
        # the gRPC server could accept them. Diagnosis trail: UAEX
        # response_flags + upstream=null in access logs, cx_connect_fail
        # equal to cx_destroy_remote in admin /stats, membership_total=1
        # confirming STRICT_DNS resolved a single ClusterIP. Direct TCP
        # probes to each pod were 40/40 OK — failure was kube-proxy
        # NAT/conntrack under burst, not the orchestrator. Headless
        # gives Envoy direct per-pod endpoints; membership_total goes
        # from 1 → N (one per Ready pod) and the failure mode disappears.
        - name: mcp_ext_authz
          connect_timeout: 1s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          # Circuit breakers — generous defaults for a high-throughput
          # PDP. The numbers are sized for 5000+ rps headroom over our
          # current target of ~2000 rps so the breaker never trips at
          # production loads.
          circuit_breakers:
            thresholds:
              - priority: DEFAULT
                max_connections: 256
                max_pending_requests: 8192
                max_requests: 8192
                max_retries: 32
              - priority: HIGH
                max_connections: 256
                max_pending_requests: 8192
                max_requests: 8192
                max_retries: 32
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              # common_http_protocol_options applies to BOTH http1 and
              # http2 paths; we only do http2 here, but setting these
              # at the common layer is the right place per Envoy docs.
              common_http_protocol_options:
                # idle_timeout: 0s = never close idle connections.
                # The orchestrator side is permanent; we want Envoy to
                # hold its gRPC connections open for the lifetime of
                # the proxy, not churn them.
                idle_timeout: 0s
                # max_requests_per_connection: 0 = unlimited.
                # Envoy default is 0 already but explicit is better.
                max_requests_per_connection: 0
              explicit_http_config:
                http2_protocol_options:
                  # max_concurrent_streams: HTTP/2's per-connection cap on
                  # in-flight streams. Default (per RFC) is unlimited but
                  # Envoy and the orchestrator's gRPC server may negotiate
                  # a much lower SETTINGS value. Setting this explicitly
                  # tells Envoy to advertise a high stream concurrency
                  # in its SETTINGS frame so the orchestrator's gRPC
                  # client pool can multiplex aggressively.
                  max_concurrent_streams: 1024
                  # Initial connection / stream window — bigger windows
                  # mean less back-pressure from flow control. ext_authz
                  # request and response bodies are tiny (<10KB each)
                  # so the standard windows are fine; explicit values
                  # documented for clarity.
                  initial_stream_window_size: 1048576    # 1 MB
                  initial_connection_window_size: 8388608  # 8 MB
          load_assignment:
            cluster_name: mcp_ext_authz
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "mcp.fullname" . }}-xds-headless.{{ include "mcp.namespace" . }}.svc.cluster.local
                          port_value: {{ .Values.orchestrator.extAuthzPort | default 9092 }}

        # mcp-inventory REST cluster — Pass 3 (Option C, static bootstrap).
        # External /inventory/v1/* traffic on the dedicated inventory listener
        # (port 10347 below) is forwarded here. Plain HTTP/1.1 REST upstream,
        # no HTTP/2 protocol options, no ext_authz on the route — the
        # inventory plane verifies its own bearer JWTs (audience
        # mcp-inventory, scope claims, revocation cache w/ 60s refresh).
        #
        # Hardcoded literal port (8090) intentionally — there's exactly one
        # inventory service in the cluster and it's a fixed wire contract
        # with the mcp-inventory image; not worth a values.yaml entry.
        - name: mcp_inventory
          connect_timeout: 5s
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: mcp_inventory
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ include "mcp.fullname" . }}-inventory.{{ include "mcp.namespace" . }}.svc.cluster.local
                          port_value: 8090

      listeners:
        # HTTPS listener on 10443 — TLS-terminated, ext_authz-gated.
        # The ONLY customer-facing entry point. Every request:
        #   1. TLS-terminates here (cert/key from /etc/envoy/tls/)
        #   2. Triggers a gRPC Check() to mcp_ext_authz cluster
        #   3. Routes upstream only if Check returns ALLOW
        # No plain-HTTP path; no ext_authz bypass. Single chokepoint
        # for both encryption and authorization.
        - name: mcp_https_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 10443
          filter_chains:
            - transport_socket:
                name: envoy.transport_sockets.tls
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
                  common_tls_context:
                    tls_certificates:
                      - certificate_chain:
                          filename: /etc/envoy/tls/tls.crt
                        private_key:
                          filename: /etc/envoy/tls/tls.key
              filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: mcp_ingress
                    codec_type: AUTO
                    use_remote_address: true
                    rds:
                      route_config_name: mcp_route
                      config_source:
                        resource_api_version: V3
                        ads: {}
                    http_filters:
                      # ext_authz runs BEFORE router. Every request triggers
                      # a gRPC Check() to the orchestrator's ext_authz service.
                      # failure_mode_allow: false -> fail-closed on PDP outage.
                      # with_request_body captures up to 64KB so the Check()
                      # service can parse JSON-RPC to extract the MCP method
                      # and tool name for policy evaluation.
                      #
                      # ── 1.11.x: timeout raised 0.5s → 2s ─────────────────
                      # The 0.5s default was hit at p99 under 1000+ rps load,
                      # producing 24% spurious 403s even when the orchestrator
                      # was processing fine — Envoy just gave up too early on
                      # tail-latency Check() calls. After the 1.10.x cache
                      # work, Check() p50 is ~5ms but the long tail (cache
                      # cold-start, transient DB blip) can stretch to 100-
                      # 200ms. 2s gives ample headroom for those without
                      # masking real PDP failures (a hung orchestrator still
                      # gets caught by failure_mode_allow=false within 2s).
                      #
                      # ── Body-size foot-gun fix (2026-05-09) ──────────────
                      # Previously: max_request_bytes=8192 with
                      # allow_partial_message=false. If a request body
                      # exceeded 8KB, Envoy refused to call Check() at all
                      # and synthesized a 403 with the EXACT same wire
                      # signature as Bug E (UAEX flag, upstream=null, null
                      # authz_reason). Different root cause, identical
                      # surface symptom — would have caused hours of
                      # confused debugging the first time someone sent a
                      # tools/call payload with a large argument blob.
                      #
                      # Fix:
                      #  - max_request_bytes raised 8192 → 65536 (64KB).
                      #    Realistic MCP JSON-RPC envelopes are <1KB; 64KB
                      #    handles even unusual cases like base64-encoded
                      #    images embedded in tool arguments.
                      #  - allow_partial_message: false → true. For the
                      #    rare case a body exceeds 64KB, Envoy now
                      #    truncates and calls Check() with the prefix
                      #    instead of refusing entirely. The orchestrator's
                      #    auth decision depends on the JSON-RPC method
                      #    name and tool name, both at the start of the
                      #    body, so truncation past 64KB is benign for
                      #    policy evaluation.
                      - name: envoy.filters.http.ext_authz
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                          grpc_service:
                            envoy_grpc:
                              cluster_name: mcp_ext_authz
                            timeout: 2s
                          transport_api_version: V3
                          failure_mode_allow: false
                          with_request_body:
                            max_request_bytes: 65536
                            allow_partial_message: true
                            pack_as_bytes: false
                          include_peer_certificate: false
                          stat_prefix: mcp_ext_authz
                      # Router must come LAST — it terminates the chain.
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            json_format:
                              ts: "%START_TIME%"
                              method: "%REQ(:METHOD)%"
                              path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                              status: "%RESPONSE_CODE%"
                              duration_ms: "%DURATION%"
                              upstream: "%UPSTREAM_HOST%"
                              trace_id: "%REQ(X-REQUEST-ID)%"
                              authz_flags: "%RESPONSE_FLAGS%"
                              authz_reason: "%RESP(x-mcp-authz-denied)%"

        # ─── Inventory plane listener (Pass 3, Option C) ────────────────────────
        # Dedicated HTTPS listener for /inventory/v1/* traffic. Sits on
        # container port 10347, exposed externally via NodePort 30347 on the
        # legacy Envoy Service. Architecturally independent of the main MCP
        # listener (10443) — different port, different filter chain, separate
        # blast radius.
        #
        # Differences from mcp_https_listener:
        #   - NO ext_authz filter. mcp-inventory verifies its own bearer
        #     JWTs (audience mcp-inventory) and the orchestrator's ext_authz
        #     expects a different audience. Skipping ext_authz here is the
        #     entire reason this listener exists as a separate listener.
        #   - INLINE static route_config (no rds:). Routes never change at
        #     runtime, so we don't need the dynamic discovery surface that
        #     bit us in Pass 3 (xDS) iteration 1.
        #   - Catch-all "/" route forwards to mcp_inventory. The customer
        #     URL is .../inventory/v1/stats — no prefix_rewrite needed since
        #     the upstream expects exactly that path.
        - name: mcp_inventory_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 10347
          filter_chains:
            - transport_socket:
                name: envoy.transport_sockets.tls
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
                  common_tls_context:
                    tls_certificates:
                      - certificate_chain:
                          filename: /etc/envoy/tls/tls.crt
                        private_key:
                          filename: /etc/envoy/tls/tls.key
              filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: mcp_inventory_ingress
                    codec_type: AUTO
                    use_remote_address: true
                    route_config:
                      name: mcp_inventory_route
                      virtual_hosts:
                        - name: mcp_inventory_vhost
                          domains: ["*"]
                          routes:
                            - match:
                                prefix: "/"
                              route:
                                cluster: mcp_inventory
                                timeout: 30s
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            json_format:
                              # Distinct from mcp_ingress so log aggregation
                              # can split inventory traffic from MCP traffic.
                              plane: "inventory"
                              method: "%REQ(:METHOD)%"
                              path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                              status: "%RESPONSE_CODE%"
                              duration_ms: "%DURATION%"
                              upstream: "%UPSTREAM_HOST%"
                              trace_id: "%REQ(X-REQUEST-ID)%"

    # Envoy admin API (internal only)
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
      access_log:
        - name: envoy.access_loggers.stdout
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
{{- end }}
