{{/*
Generate self-signed TLS cert and JWT RSA keypair at install time.
Helm's genSelfSignedCert and genPrivateKey functions handle this.
The "lookup" ensures we don't regenerate on upgrade — reuse existing secrets.
*/}}

{{/* ── TLS Certificate ─────────────────────────────────────────────────────── */}}
{{- $tlsSecretName := .Values.tls.orchestratorSecretName }}
{{- $existingTLS := lookup "v1" "Secret" (include "mcp.namespace" .) $tlsSecretName }}
{{- $tlsCert := "" }}
{{- $tlsKey := "" }}
{{- if $existingTLS }}
  {{- $tlsCert = index $existingTLS.data "tls.crt" }}
  {{- $tlsKey = index $existingTLS.data "tls.key" }}
{{- else if and .Values.tls.create .Values.tls.cert .Values.tls.key }}
  {{- $tlsCert = .Values.tls.cert }}
  {{- $tlsKey = .Values.tls.key }}
{{- else }}
  {{- $cn := "mcp-orchestrator" }}
  {{- $altNames := list "mcp-orchestrator" "localhost" "127.0.0.1" }}
  {{- $cert := genSelfSignedCert $cn nil $altNames 3650 }}
  {{- $tlsCert = $cert.Cert | b64enc }}
  {{- $tlsKey = $cert.Key | b64enc }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $tlsSecretName }}
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $tlsCert }}
  tls.key: {{ $tlsKey }}

{{- if .Values.envoy.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.tls.envoySecretName }}
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $tlsCert }}
  tls.key: {{ $tlsKey }}
{{- end }}

{{/* ── JWT Keys ────────────────────────────────────────────────────────────── */}}
{{- $secretsName := printf "%s-secrets" (include "mcp.fullname" .) }}
{{- $existingSecrets := lookup "v1" "Secret" (include "mcp.namespace" .) $secretsName }}
{{- $jwtPriv := "" }}
{{- $jwtPub := "" }}
{{- if and $existingSecrets (index $existingSecrets.data "MCP_JWT_PRIVATE_KEY") }}
  {{- $jwtPriv = index $existingSecrets.data "MCP_JWT_PRIVATE_KEY" | b64dec }}
  {{- $jwtPub = index $existingSecrets.data "MCP_JWT_PUBLIC_KEY" | b64dec }}
{{- else if and .Values.secrets.jwtPrivateKey (ne .Values.secrets.jwtPrivateKey "") }}
  {{- $jwtPriv = .Values.secrets.jwtPrivateKey }}
  {{- $jwtPub = .Values.secrets.jwtPublicKey }}
{{- else }}
  {{- fail "\n\nJWT keys are required. Generate them and pass at install time:\n\n  openssl genpkey -algorithm RSA -out jwt.key -pkeyopt rsa_keygen_bits:2048\n  openssl rsa -in jwt.key -pubout -out jwt.pub\n\n  helm install mcp ./helm/orchestrator -n mcp-system --create-namespace \\\n    --set-file secrets.jwtPrivateKey=jwt.key \\\n    --set-file secrets.jwtPublicKey=jwt.pub\n" }}
{{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretsName }}
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  MCP_DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  MCP_JWT_PRIVATE_KEY: {{ $jwtPriv | quote }}
  MCP_JWT_PUBLIC_KEY: {{ $jwtPub | quote }}
