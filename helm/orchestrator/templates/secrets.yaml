{{/*
Generate self-signed TLS cert and JWT RSA keypair at install time.
Helm's genSelfSignedCert and genPrivateKey functions handle this.
The "lookup" ensures we don't regenerate on upgrade — reuse existing secrets.
*/}}

{{/* ── TLS Certificate ─────────────────────────────────────────────────────── */}}
{{- $tlsSecretName := .Values.tls.orchestratorSecretName }}
{{- $existingTLS := lookup "v1" "Secret" (include "mcp.namespace" .) $tlsSecretName }}
{{- $tlsCert := "" }}
{{- $tlsKey := "" }}
{{- if $existingTLS }}
  {{- $tlsCert = index $existingTLS.data "tls.crt" }}
  {{- $tlsKey = index $existingTLS.data "tls.key" }}
{{- else if and .Values.tls.create .Values.tls.cert .Values.tls.key }}
  {{/* --set-file provides raw PEM; data: expects base64, so encode. */}}
  {{- $tlsCert = .Values.tls.cert | b64enc }}
  {{- $tlsKey = .Values.tls.key | b64enc }}
{{- else }}
  {{- $cn := "mcp-orchestrator" }}
  {{- $altNames := list "mcp-orchestrator" "localhost" "127.0.0.1" }}
  {{- $cert := genSelfSignedCert $cn nil $altNames 3650 }}
  {{- $tlsCert = $cert.Cert | b64enc }}
  {{- $tlsKey = $cert.Key | b64enc }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $tlsSecretName }}
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $tlsCert }}
  tls.key: {{ $tlsKey }}

{{- if .Values.envoy.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.tls.envoySecretName }}
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $tlsCert }}
  tls.key: {{ $tlsKey }}
{{- end }}

{{/* ── JWT Keys ────────────────────────────────────────────────────────────── */}}
{{/*
    Three cases, in priority order:
      1. Existing secret in the cluster  → reuse (reinstall / upgrade safe)
      2. Keys provided via --set-file    → use operator-supplied keys (production)
      3. Neither                          → auto-generate an RSA private key;
                                            orchestrator derives the public key
                                            at startup (Free-tier zero-touch path)
*/}}
{{- $secretsName := printf "%s-secrets" (include "mcp.fullname" .) }}
{{- $existingSecrets := lookup "v1" "Secret" (include "mcp.namespace" .) $secretsName }}
{{- $jwtPriv := "" }}
{{- $jwtPub := "" }}
{{- if and $existingSecrets (index $existingSecrets.data "MCP_JWT_PRIVATE_KEY") }}
  {{- $jwtPriv = index $existingSecrets.data "MCP_JWT_PRIVATE_KEY" | b64dec }}
  {{- $jwtPub = index $existingSecrets.data "MCP_JWT_PUBLIC_KEY" | b64dec }}
{{- else if and .Values.secrets.jwtPrivateKey (ne .Values.secrets.jwtPrivateKey "") }}
  {{- $jwtPriv = .Values.secrets.jwtPrivateKey }}
  {{- $jwtPub = .Values.secrets.jwtPublicKey }}
{{- else }}
  {{- $jwtPriv = genPrivateKey "rsa" }}
  {{- $jwtPub = "" }}
{{- end }}

{{/* ── DB password ────────────────────────────────────────────────────────────
     Same three-tier fallback shape as the JWT key.

     1. Existing secret           → reuse (upgrade-safe; password persists
                                    across `helm upgrade` runs so the
                                    Postgres pod's stored password keeps
                                    matching the Secret).
     2. .Values.secrets.dbPassword → use operator-supplied value
                                    (production / pinned-password mode).
     3. Empty                      → generate 32-char random password.
                                    Persists via #1 on subsequent upgrades.

     Postgres is internal-only (ClusterIP), so auto-generation is the right
     default. Customers who want a known password can --set explicitly.
*/}}
{{- $dbPass := "" }}
{{- if and $existingSecrets (index $existingSecrets.data "MCP_DB_PASSWORD") }}
  {{- $dbPass = index $existingSecrets.data "MCP_DB_PASSWORD" | b64dec }}
{{- else if and .Values.secrets.dbPassword (ne .Values.secrets.dbPassword "") }}
  {{- $dbPass = .Values.secrets.dbPassword }}
{{- else }}
  {{- $dbPass = randAlphaNum 32 }}
{{- end }}

{{/* ── Inventory DB password ──────────────────────────────────────────────────
     Same three-tier pattern as MCP_DB_PASSWORD. Separate from the ops DB
     password because inventory and ops Postgres are physically isolated
     (different Postgres pods, different PVCs). Each can rotate independently.

     1. Existing secret              → reuse (upgrade-safe; password persists
                                       across helm upgrades so the inventory
                                       Postgres pod's stored password keeps
                                       matching the Secret).
     2. .Values.secrets.inventoryDbPassword
                                     → use operator-supplied value.
     3. Empty                        → generate 32-char random password.
*/}}
{{- $invDbPass := "" }}
{{- if and $existingSecrets (index $existingSecrets.data "MCP_INVENTORY_DB_PASSWORD") }}
  {{- $invDbPass = index $existingSecrets.data "MCP_INVENTORY_DB_PASSWORD" | b64dec }}
{{- else if and .Values.secrets.inventoryDbPassword (ne .Values.secrets.inventoryDbPassword "") }}
  {{- $invDbPass = .Values.secrets.inventoryDbPassword }}
{{- else }}
  {{- $invDbPass = randAlphaNum 32 }}
{{- end }}

{{/* ── Admin bootstrap password ───────────────────────────────────────────────
     Same three-tier fallback. The plaintext flows to the orchestrator as
     the MCP_SEED_ADMIN_PASSWORD env var (see deployment.yaml), which the
     seed code reads on first boot, bcrypts in-process, and writes to the
     users table. The plaintext stays in the Secret only — never in the DB.

     1. Existing secret              → reuse (upgrade-safe; the bootstrap
                                       value is preserved across reinstalls
                                       so the seed code's "skip if user
                                       exists" path remains coherent — i.e.,
                                       the bootstrap value never tries to
                                       overwrite a user-changed password).
     2. .Values.seed.adminPassword   → use operator-supplied (dev convenience
                                       or production with explicit pinning).
     3. Empty                        → generate 24-char random password.
                                       Surfaced once in NOTES.txt with
                                       retrieval and rotation guidance.

     Note: this is a *bootstrap* credential. The seed code only runs against
     an empty database — once admin exists in the users table, this value
     is dormant and changing it has no effect on the running admin password.
     Customers should change the password via the UI after first login,
     then rotate this Secret value to invalidate the bootstrap credential.

     The seed.adminPasswordHash field (deprecated in v1.6.2) takes priority
     over plaintext in the orchestrator's seed code, so installs that
     supply a hash continue to work unchanged. Plaintext is the new
     recommended path; hash remains for backward compatibility.
*/}}
{{- $adminPass := "" }}
{{- if and $existingSecrets (index $existingSecrets.data "MCP_SEED_ADMIN_PASSWORD") }}
  {{- $adminPass = index $existingSecrets.data "MCP_SEED_ADMIN_PASSWORD" | b64dec }}
{{- else if and .Values.seed.adminPassword (ne .Values.seed.adminPassword "") }}
  {{- $adminPass = .Values.seed.adminPassword }}
{{- else }}
  {{- $adminPass = randAlphaNum 24 }}
{{- end }}

{{/* Hash is opt-in only and NEVER inherited from existing Secrets.

     Earlier chart versions inherited MCP_SEED_ADMIN_PASSWORD_HASH from
     the cluster's existing Secret on upgrade. That sounded right
     (preserve credentials across upgrades) but in practice was a trap:
     a stale hash from a prior install — even one the operator no longer
     wants — would persist forever, defeating the v1.6.2 plaintext path
     entirely. Login attempts with the auto-generated plaintext password
     would always fail because seed.cpp's hash > plaintext priority chain
     made the stale hash win.

     The fix: hash comes ONLY from operator-supplied
     .Values.seed.adminPasswordHash. If operator stops setting it, it
     disappears from the Secret on the next helm upgrade. The
     MCP_SEED_ADMIN_PASSWORD plaintext path is then unblocked.

     Plaintext (MCP_SEED_ADMIN_PASSWORD) is still inherited from existing
     Secrets per the block above — that's safe because plaintext doesn't
     suffer the same priority-trap problem. */}}
{{- $adminHash := "" }}
{{- if and .Values.seed.adminPasswordHash (ne .Values.seed.adminPasswordHash "") }}
  {{- $adminHash = .Values.seed.adminPasswordHash }}
{{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretsName }}
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  MCP_DB_PASSWORD: {{ $dbPass | quote }}
  MCP_INVENTORY_DB_PASSWORD: {{ $invDbPass | quote }}
  MCP_JWT_PRIVATE_KEY: {{ $jwtPriv | quote }}
  MCP_JWT_PUBLIC_KEY: {{ $jwtPub | quote }}
  MCP_SEED_ADMIN_PASSWORD: {{ $adminPass | quote }}
  {{- if $adminHash }}
  MCP_SEED_ADMIN_PASSWORD_HASH: {{ $adminHash | quote }}
  {{- end }}
