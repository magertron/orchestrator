{{- if and .Values.envoy.v3.enabled .Values.envoy.v3.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "mcp.fullname" . }}-envoy-v3
  namespace: {{ include "mcp.namespace" . }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "mcp.fullname" . }}-envoy-v3
  minReplicas: {{ .Values.envoy.v3.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.envoy.v3.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.envoy.v3.autoscaling.targetCPU }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.envoy.v3.autoscaling.targetMemory }}
{{- end }}
