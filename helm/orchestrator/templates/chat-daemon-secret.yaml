{{- /*
templates/chat-daemon-secret.yaml

A SEPARATE secret for the chat daemon's Anthropic API key — deliberately NOT
mcp-orchestrator-secrets. This is the trust-boundary separation we designed:
the Anthropic key and the daemon's outbound-internet dependency never co-mingle
with the platform's JWT signing key, DB passwords, or RBAC core.

Created only when:
  - chatDaemon.enabled is true, AND
  - an inline key is provided (chatDaemon.anthropicApiKey), AND
  - no external secret is referenced (chatDaemon.externalSecretName empty).

If chatDaemon.externalSecretName is set, the operator manages the key out-of-band
(recommended for prod) and this template is skipped entirely.

Upgrade-safe: if the secret already exists, its value is reused (so the key
persists across helm upgrades that don't re-specify it), matching the lookup
pattern used by the DB-password secret.
*/ -}}
{{- if and .Values.chatDaemon.enabled (not .Values.chatDaemon.externalSecretName) .Values.chatDaemon.anthropicApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp.fullname" . }}-chat-daemon
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: chat-daemon
type: Opaque
data:
  {{- /* reuse existing value on upgrade if present */ -}}
  {{- $existing := lookup "v1" "Secret" (include "mcp.namespace" .) (printf "%s-chat-daemon" (include "mcp.fullname" .)) }}
  {{- if and $existing $existing.data (index $existing.data "ANTHROPIC_API_KEY") }}
  ANTHROPIC_API_KEY: {{ index $existing.data "ANTHROPIC_API_KEY" }}
  {{- else }}
  ANTHROPIC_API_KEY: {{ .Values.chatDaemon.anthropicApiKey | b64enc | quote }}
  {{- end }}
{{- end }}
