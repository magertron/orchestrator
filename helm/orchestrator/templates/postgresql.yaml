{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mcp.fullname" . }}-postgres-data
  namespace: {{ include "mcp.namespace" . }}
  annotations:
    # CRITICAL: keep the PVC across helm uninstall. Without this,
    # `helm uninstall mcp` deletes the ops Postgres PVC and all
    # data is lost — deployed servers table, users, audit log, RBAC
    # assignments. With this annotation Helm leaves the PVC alone
    # and it re-binds on the next `helm install`.
    #
    # Mirrors the same pattern on the inventory Postgres PVC
    # (templates/inventory-postgres.yaml) — together they guarantee
    # data preservation across reinstall.sh MODE=upgrade runs.
    #
    # To genuinely delete the PVC (intentional reset), an operator can:
    #     kubectl delete pvc -n mcp-system -l component=postgresql
    helm.sh/resource-policy: keep
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
    component: postgresql
spec:
  {{- if .Values.postgresql.storage.storageClassName }}
  storageClassName: {{ .Values.postgresql.storage.storageClassName }}
  {{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgresql.storage.size }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp.fullname" . }}-postgres
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
    component: postgresql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "mcp.fullname" . }}-postgres
  template:
    metadata:
      labels:
        app: {{ include "mcp.fullname" . }}-postgres
    spec:
      securityContext:
        fsGroup: 999
      {{- with .Values.postgresql.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgresql.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgresql.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp.fullname" . }}-secrets
                  key: MCP_DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | quote }}, "-d", {{ .Values.postgresql.database | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | quote }}, "-d", {{ .Values.postgresql.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "mcp.fullname" . }}-postgres-data
        - name: postgres-init
          configMap:
            name: {{ include "mcp.fullname" . }}-postgres-init

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp.fullname" . }}-postgres
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
    component: postgresql
spec:
  selector:
    app: {{ include "mcp.fullname" . }}-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
{{- end }}
