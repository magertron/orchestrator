{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp.fullname" . }}-postgres-init
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
    component: postgresql
data:
  01-schema.sql: |
    -- MCP Orchestrator canonical schema (v1.2.0 — adds SSO + SCIM)
    -- Applied automatically by the postgres container on first start
    -- (anything in /docker-entrypoint-initdb.d/ runs in alphabetical order).
    -- All statements are idempotent so reinstalls / upgrades are safe.

    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    -- ── Users ──────────────────────────────────────────────────────────────────
    -- password_hash = "SSO_ONLY" sentinel for SSO/SCIM-provisioned users
    -- (defeats any accidental password-login path since no bcrypt produces that).
    CREATE TABLE IF NOT EXISTS users (
        id              UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        username        VARCHAR(255) UNIQUE NOT NULL,
        password_hash   VARCHAR(255) NOT NULL,
        roles           TEXT[]      NOT NULL DEFAULT '{}',
        enabled         BOOLEAN     NOT NULL DEFAULT TRUE,
        sso_email       TEXT,                     -- binds user to IdP-provided email for SSO
        -- SCIM: external_id is the IdP's stable identifier (SCIM externalId).
        -- Nullable; only populated for SCIM-provisioned users.
        external_id     TEXT,
        -- How this user came into the system. Used by the admin UI to show a
        -- provenance badge and to enforce read-only on SCIM-managed fields.
        -- Values: 'password' | 'sso_jit' | 'scim' | NULL
        provisioned_via TEXT,
        created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        last_login      TIMESTAMPTZ,
        -- Primary contact email. Separate from sso_email so a user can have
        -- a stable contact address that's distinct from their IdP-resolved
        -- email (e.g. for expiry reminders, audit attribution). Set via
        -- `mcpctl users update-email` or the admin UI. Lowercased for
        -- case-insensitive lookup via users_email_lower_idx.
        email           TEXT
    );
    -- For existing installs (upgrade path from pre-SSO / pre-SCIM schema):
    ALTER TABLE users ADD COLUMN IF NOT EXISTS sso_email       TEXT;
    ALTER TABLE users ADD COLUMN IF NOT EXISTS external_id     TEXT;
    ALTER TABLE users ADD COLUMN IF NOT EXISTS provisioned_via TEXT;
    ALTER TABLE users ADD COLUMN IF NOT EXISTS updated_at      TIMESTAMPTZ NOT NULL DEFAULT NOW();
    ALTER TABLE users ADD COLUMN IF NOT EXISTS email           TEXT;
    -- Each sso_email / external_id can map to at most one user; NULLs exempt.
    CREATE UNIQUE INDEX IF NOT EXISTS users_sso_email_unique_idx
        ON users (sso_email) WHERE sso_email IS NOT NULL;
    CREATE UNIQUE INDEX IF NOT EXISTS users_external_id_unique_idx
        ON users (external_id) WHERE external_id IS NOT NULL;
    -- Case-insensitive lookup on the primary contact email.
    -- Non-unique on purpose: a user's contact email and sso_email could be
    -- the same string; uniqueness across users is enforced on sso_email above.
    CREATE INDEX IF NOT EXISTS users_email_lower_idx
        ON users (lower(email)) WHERE email IS NOT NULL;

    -- ── Audit Events ───────────────────────────────────────────────────────────
    -- OCSF-aligned shape (Phase F.1, 2026-04-25). 22 columns supporting:
    --  classification (class_uid, activity_id, severity_id, status_id),
    --  actor metadata (email, session, idp, roles snapshot),
    --  network context (src_ip, user_agent),
    --  correlation (request_id, tenant, cluster_uid),
    --  state diffs (old_state, new_state) and OCSF overflow (unmapped).
    CREATE TABLE IF NOT EXISTS audit_events (
        -- ── Core identity ───────────────────────────────────────────────────
        id                UUID         PRIMARY KEY DEFAULT gen_random_uuid(),
        event_uid         UUID         NOT NULL UNIQUE DEFAULT gen_random_uuid(),
        -- event_uid is the OCSF-equivalent globally-unique id, exported as
        -- metadata.uid in OCSF payloads. Distinct from `id` so we can later
        -- migrate to externally-issued ids without breaking primary key refs.

        -- ── Plane (Phase F.3) ───────────────────────────────────────────────
        -- Separates events emitted by the orchestrator (admin plane: REST,
        -- deployments, role changes) from events emitted by ext_authz (caller
        -- plane: per-tool-invocation decisions). Two pipelines write to this
        -- one table; SIEM filtering happens by 'plane'.
        plane             VARCHAR(8)   NOT NULL DEFAULT 'admin'
                                       CHECK (plane IN ('admin', 'caller')),

        -- ── Classification (OCSF-aligned) ───────────────────────────────────
        kind              VARCHAR(64)  NOT NULL,                  -- domain string, e.g. "Deployed"
        class_uid         INT          NOT NULL DEFAULT 6003,     -- OCSF class (6003=API Activity)
        activity_id       INT          NOT NULL DEFAULT 0,        -- 0=Unknown,1=Create,2=Read,3=Update,4=Delete
        severity_id       INT          NOT NULL DEFAULT 1,        -- 1=Info,2=Low,3=Medium,4=High,5=Critical,6=Fatal
        status_id         INT          NOT NULL DEFAULT 1,        -- 1=Success,2=Failure
        status_detail     TEXT,                                   -- failure reason if any

        -- ── Actor (the user/agent/system that did the thing) ────────────────
        actor             VARCHAR(255) NOT NULL,                  -- subject / username
        actor_email       VARCHAR(255),                           -- from JWT 'email' claim
        actor_session_id  VARCHAR(128),                           -- from JWT 'sid' / 'jti'
        actor_idp         VARCHAR(128),                           -- from JWT 'iss'
        actor_roles       JSONB        NOT NULL DEFAULT '[]',     -- snapshot of role IDs at event time

        -- ── Source endpoint (network context) ───────────────────────────────
        src_ip            INET,                                   -- client IP from XFF or socket
        src_user_agent    TEXT,                                   -- HTTP UA string

        -- ── Target ──────────────────────────────────────────────────────────
        server_name       VARCHAR(255),
        namespace         VARCHAR(255),

        -- ── Correlation & multi-tenancy ─────────────────────────────────────
        request_id        VARCHAR(128),                           -- correlate with Envoy access logs
        tenant            VARCHAR(64),                            -- multi-tenant hook (NULL=default)
        cluster_uid       VARCHAR(64),                            -- which Magertron instance

        -- ── Detail & state ──────────────────────────────────────────────────
        detail            TEXT,                                   -- human-readable description
        old_state         JSONB,                                  -- pre-change snapshot
        new_state         JSONB,                                  -- post-change snapshot
        unmapped          JSONB        NOT NULL DEFAULT '{}',     -- OCSF overflow

        -- ── Timestamps ──────────────────────────────────────────────────────
        ts                TIMESTAMPTZ  NOT NULL DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS audit_events_ts_idx        ON audit_events (ts DESC);
    CREATE INDEX IF NOT EXISTS audit_events_actor_idx     ON audit_events (actor);
    CREATE INDEX IF NOT EXISTS audit_events_server_idx    ON audit_events (server_name, namespace);
    CREATE INDEX IF NOT EXISTS audit_events_event_uid_idx ON audit_events (event_uid);
    CREATE INDEX IF NOT EXISTS audit_events_class_idx     ON audit_events (class_uid, activity_id);
    CREATE INDEX IF NOT EXISTS audit_events_request_idx   ON audit_events (request_id) WHERE request_id IS NOT NULL;
    CREATE INDEX IF NOT EXISTS audit_events_tenant_idx    ON audit_events (tenant)     WHERE tenant     IS NOT NULL;
    CREATE INDEX IF NOT EXISTS audit_events_plane_ts_idx  ON audit_events (plane, ts DESC);

    -- ── Deployed Servers ───────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS deployed_servers (
        id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name          VARCHAR(255) NOT NULL,
        namespace     VARCHAR(255) NOT NULL,
        -- ── Server type discriminator ────────────────────────────────────────
        -- 'internal' = MCP server runs as a pod in this cluster (default).
        -- 'hybrid'   = same as internal at the registration layer; outbound
        --              egress policies applied separately at runtime.
        -- 'external' = MCP server runs at a vendor SaaS endpoint; this row
        --              represents a proxy registration, not a deployable pod.
        --              endpoint_url, auth_type, credential_secret_ref required;
        --              image / image_tag / mcp_port columns are NULL for these.
        server_type   VARCHAR(32) NOT NULL DEFAULT 'internal'
                      CHECK (server_type IN ('internal', 'hybrid', 'external')),
        -- ── Internal/Hybrid columns (NULL for external) ──────────────────────
        -- image-related fields are NULL when server_type='external' because no
        -- pod is deployed. The composite CHECK constraint below enforces this.
        image         VARCHAR(512),
        image_tag     VARCHAR(128) DEFAULT 'latest',
        replicas      INT         NOT NULL DEFAULT 1,
        mcp_port      INT,
        transport     VARCHAR(32) NOT NULL DEFAULT 'http',
        cluster_ip    VARCHAR(64),
        cluster_port  INT,
        -- ── External-only columns (NULL for internal/hybrid) ─────────────────
        -- Where the vendor MCP server lives (HTTPS URL).
        endpoint_url  TEXT,
        -- How magertron authenticates to the vendor endpoint.
        -- 'none' is a valid choice (public endpoint, no auth).
        auth_type     VARCHAR(32)
                      CONSTRAINT deployed_servers_auth_type_check
                      CHECK (auth_type IS NULL OR auth_type IN
                            ('none', 'bearer', 'api-key',
                             'oauth2-client-credentials',
                             'oauth2-authorization-code', 'mtls')),
        -- Name of the K8s Secret holding credentials. NULL allowed even when
        -- auth_type IS NOT NULL if auth_type='none' (no secret needed).
        credential_secret_ref VARCHAR(255),
        -- credential_mode: WHO authenticates to the External endpoint.
        --   'centralized' = Magertron holds one credential and presents it for
        --                   all agent traffic (SEP-1046 client-credentials / M2M).
        --                   The External provider sees a single tenant (Magertron);
        --                   per-agent cost attribution is tracked internally via
        --                   the email anchor on each account.
        --   'delegated'   = per-user token exchange; each agent authenticates as
        --                   themselves (SEP-990 cross-app-access). The operator is
        --                   simply the first such user at probe time.
        -- Only meaningful for External rows. Internal/Hybrid rows carry the
        -- harmless default. Cross-field rule (delegated REQUIRES an OAuth-family
        -- auth_type) is enforced in handle_register_external_server, not here,
        -- so the API can return a clean 400 instead of an opaque CHECK error.
        credential_mode VARCHAR(16) NOT NULL DEFAULT 'centralized'
                        CHECK (credential_mode IN ('centralized', 'delegated')),
        -- ── Common columns ───────────────────────────────────────────────────
        state         VARCHAR(32) NOT NULL DEFAULT 'Pending',
        deployed_by   VARCHAR(255),
        tools         JSONB       NOT NULL DEFAULT '[]',
        env_vars      JSONB       NOT NULL DEFAULT '{}',
        labels        JSONB       NOT NULL DEFAULT '{}',
        annotations   JSONB       NOT NULL DEFAULT '{}',
        -- Container entrypoint override. Both default to empty array '[]'
        -- meaning "use the image's default ENTRYPOINT/CMD" — backward-
        -- compatible with deploys made before this column existed. When
        -- non-empty, command flows to the K8s container.command field
        -- (overrides image ENTRYPOINT) and args flows to container.args
        -- (overrides image CMD). Common case: forcing stdio-default MCP
        -- server images (mcp/everything, tzolov/mcp-everything-server)
        -- into HTTP mode via args=["node","dist/index.js","streamableHttp"].
        command       JSONB       NOT NULL DEFAULT '[]',
        args          JSONB       NOT NULL DEFAULT '[]',
        group_name    VARCHAR(255),
        -- Slice 6f: data plane selector. "legacy" routes through the legacy
        -- xDS push handler (existing behavior); "v3" routes through the v3
        -- ADS pull-driven handler (slice 6e Option A). The v3 ADS subscriber
        -- in src/gateway/v3/ads_subscriber.cpp filters on this field —
        -- only servers with routing_mode='v3' are exposed to v3 Envoy.
        routing_mode  VARCHAR(16) NOT NULL DEFAULT 'v3',
        upstream_path VARCHAR(255) NOT NULL DEFAULT '/',
        upstream_http_version VARCHAR(8) NOT NULL DEFAULT 'http1',
        tls_min_version VARCHAR(8) NOT NULL DEFAULT 'tls1_2',
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE (name, namespace),
        -- ── Per-type data invariants ─────────────────────────────────────────
        -- The load-bearing invariant: Internal/Hybrid rows REQUIRE an image
        -- (because Magertron deploys a pod for them); External rows REQUIRE
        -- an endpoint_url + auth_type (because Magertron proxies to a vendor
        -- endpoint, no pod involved). Image absence is the signal of
        -- "external", image presence is the signal of "internal/hybrid".
        --
        -- We do NOT enforce that image_tag/mcp_port/replicas/transport are
        -- NULL on External rows. Postgres column DEFAULTS (image_tag='latest',
        -- transport='http', replicas=1) fire automatically on INSERT before
        -- the CHECK constraint runs, and overriding them per-type would
        -- require either dropping the defaults (breaks every Internal INSERT)
        -- or special-cased default suppression in every code path. C++ already
        -- type-switches on server_type and ignores irrelevant fields for
        -- External rows, so harmless default values riding along do no damage.
        CONSTRAINT deployed_servers_type_invariant CHECK (
            (server_type IN ('internal', 'hybrid')
             AND image IS NOT NULL
             AND endpoint_url IS NULL
             AND auth_type IS NULL
             AND credential_secret_ref IS NULL)
            OR
            (server_type = 'external'
             AND image IS NULL
             AND endpoint_url IS NOT NULL
             AND auth_type IS NOT NULL)
        )
    );
    -- For existing installs (upgrade path from pre-1.15 schema):
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS command JSONB NOT NULL DEFAULT '[]';
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS args    JSONB NOT NULL DEFAULT '[]';
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS routing_mode VARCHAR(16) NOT NULL DEFAULT 'v3';
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS upstream_path VARCHAR(255) NOT NULL DEFAULT '/';
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS upstream_http_version VARCHAR(8) NOT NULL DEFAULT 'http1';
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS tls_min_version VARCHAR(8) NOT NULL DEFAULT 'tls1_2';
    -- Default-flip migration (legacy → v3): on clusters created BEFORE the flip,
    -- the routing_mode column already exists with DEFAULT 'legacy', so the
    -- ADD COLUMN IF NOT EXISTS above is a no-op and would NOT change the default.
    -- This explicit SET DEFAULT ensures upgrading customers also default new
    -- servers to v3 — no manual ALTER required. Idempotent (safe every deploy).
    -- NOTE: only changes the column DEFAULT for future inserts; it does NOT
    -- rewrite existing rows (those keep their stored routing_mode).
    ALTER TABLE deployed_servers ALTER COLUMN routing_mode SET DEFAULT 'v3';
    -- ── External MCP server support (session 2.13) ───────────────────────────
    -- server_type discriminator. Default 'internal' for any pre-existing rows.
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS server_type VARCHAR(32) NOT NULL DEFAULT 'internal';
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS endpoint_url TEXT;
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS auth_type    VARCHAR(32);
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS credential_secret_ref VARCHAR(255);
    -- Session 2.14: credential_mode discriminator for the External auth model.
    -- Default 'centralized' so any pre-existing External rows get a sane value
    -- with no data migration. See the inline column comment above for semantics.
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS credential_mode VARCHAR(16) NOT NULL DEFAULT 'centralized';

    -- Slice C: widen the auth_type CHECK to allow 'oauth2-authorization-code'
    -- (delegated authorization-code flow). The original inline constraint was
    -- anonymous and auto-named deployed_servers_auth_type_check; drop + re-add
    -- idempotently so existing DBs pick up the new value.
    ALTER TABLE deployed_servers DROP CONSTRAINT IF EXISTS deployed_servers_auth_type_check;
    ALTER TABLE deployed_servers ADD CONSTRAINT deployed_servers_auth_type_check
        CHECK (auth_type IS NULL OR auth_type IN
            ('none', 'bearer', 'api-key',
             'oauth2-client-credentials', 'oauth2-authorization-code', 'mtls'));
    -- Session 2.13 fix: the original (chart 2.4.24) version of
    -- deployed_servers_type_invariant required image_tag/mcp_port to be NULL
    -- on External rows. That conflicted with Postgres column DEFAULTS firing
    -- on INSERT (image_tag DEFAULT 'latest', etc), making External INSERTs
    -- impossible. Drop and recreate with the relaxed version that only
    -- enforces the load-bearing invariants (image presence/absence).
    -- Idempotent: drop only if present, then recreate.
    ALTER TABLE deployed_servers DROP CONSTRAINT IF EXISTS deployed_servers_type_invariant;
    ALTER TABLE deployed_servers ADD CONSTRAINT deployed_servers_type_invariant CHECK (
        (server_type IN ('internal', 'hybrid')
         AND image IS NOT NULL
         AND endpoint_url IS NULL
         AND auth_type IS NULL
         AND credential_secret_ref IS NULL)
        OR
        (server_type = 'external'
         AND image IS NULL
         AND endpoint_url IS NOT NULL
         AND auth_type IS NOT NULL)
    );
    -- Fast filtering by type when listing servers per tenant or rendering
    -- type-specific UI sections. Most queries scope by namespace + server_type.
    CREATE INDEX IF NOT EXISTS deployed_servers_type_idx
        ON deployed_servers (namespace, server_type);
    -- Prevent duplicate External-server registrations against the same vendor
    -- endpoint within a tenant namespace. Two operators registering "Nitro"
    -- twice with different credentials would create ambiguous routing and
    -- billing. Partial index (WHERE server_type = 'external') so Internal/
    -- Hybrid rows with NULL endpoint_url don't conflict with each other.
    CREATE UNIQUE INDEX IF NOT EXISTS deployed_servers_external_endpoint_unique_idx
        ON deployed_servers (namespace, endpoint_url)
        WHERE server_type = 'external';

    -- ── External MCP server architecture (session 2.13) ──────────────────────
    -- The deployed_servers table holds rows for all three deployment patterns:
    --
    --   server_type='internal'  → MCP server runs as a pod in this cluster.
    --                             Magertron manages full lifecycle. image and
    --                             image_tag specify what to deploy.
    --
    --   server_type='hybrid'    → Same as internal at registration; the
    --                             distinction is operational (the server's
    --                             tools reach external APIs at runtime,
    --                             governed by NetworkPolicy egress rules).
    --
    --   server_type='external'  → MCP server runs at a vendor SaaS endpoint
    --                             (e.g. Nitro Cloud). This row represents a
    --                             proxy registration, not a deployable pod.
    --                             endpoint_url + auth_type + credential_secret_ref
    --                             tell Magertron's proxy where to forward
    --                             traffic and how to authenticate. image is
    --                             NULL because no in-cluster pod exists.
    --
    -- The deployed_servers_type_invariant CHECK constraint above enforces
    -- per-type data integrity at the DB layer. Any code path that tries to
    -- insert a malformed row (e.g. type='external' with NULL endpoint_url)
    -- is rejected by Postgres regardless of whether the C++ or UI validator
    -- ran correctly.
    --
    -- External-server rows are ONLY ever written by the admin API
    -- (mcpctl / UI authenticated by an operator with the appropriate RBAC
    -- permission). The inventory-plane ingestion path NEVER auto-registers
    -- External servers — the security blast radius of an auto-discovered
    -- external endpoint (DNS spoofing, vendor identity confusion) is too
    -- large to permit. See design/external-mcp-servers.md (internal).

    -- ── RBAC Roles ─────────────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS roles (
        id            VARCHAR(255) PRIMARY KEY,
        name          VARCHAR(255) NOT NULL,
        description   TEXT,
        permissions   JSONB       NOT NULL DEFAULT '[]',
        allowed_namespaces JSONB  NOT NULL DEFAULT '["*"]',
        system_role   BOOLEAN     NOT NULL DEFAULT FALSE,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- ── Governance Policies ────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS governance_policies (
        id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name          VARCHAR(255) UNIQUE NOT NULL,
        description   TEXT        NOT NULL DEFAULT '',
        rules         JSONB       NOT NULL DEFAULT '[]',
        applies_to_namespaces JSONB NOT NULL DEFAULT '["*"]',
        is_template   BOOLEAN     NOT NULL DEFAULT FALSE,
        enabled       BOOLEAN     NOT NULL DEFAULT TRUE,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS governance_policies_enabled_idx ON governance_policies (enabled);

    -- ── Webhooks ───────────────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS webhooks (
        id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name          VARCHAR(255) NOT NULL,
        url           TEXT        NOT NULL,
        secret        TEXT        NOT NULL DEFAULT '',
        event_types   JSONB       NOT NULL DEFAULT '["*"]',
        namespaces    JSONB       NOT NULL DEFAULT '["*"]',
        enabled       BOOLEAN     NOT NULL DEFAULT TRUE,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- ── SSO Providers (Enterprise tier) ────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS sso_providers (
        id              TEXT        PRIMARY KEY,
        name            TEXT        NOT NULL,
        type            TEXT        NOT NULL CHECK (type IN ('oidc', 'saml')),
        -- OIDC fields
        client_id       TEXT        NOT NULL DEFAULT '',
        client_secret   TEXT        NOT NULL DEFAULT '',
        discovery_url   TEXT        NOT NULL DEFAULT '',
        redirect_uri    TEXT        NOT NULL DEFAULT '',
        -- SAML fields
        entity_id       TEXT        NOT NULL DEFAULT '',
        sso_url         TEXT        NOT NULL DEFAULT '',
        idp_certificate TEXT        NOT NULL DEFAULT '',
        sp_certificate  TEXT        NOT NULL DEFAULT '',
        sp_private_key  TEXT        NOT NULL DEFAULT '',
        -- Which IdP attribute to use as the email when resolving to a platform user
        email_attribute TEXT        NOT NULL DEFAULT 'email',
        enabled         BOOLEAN     NOT NULL DEFAULT TRUE,
        created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    ALTER TABLE sso_providers ADD COLUMN IF NOT EXISTS updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW();
    CREATE INDEX IF NOT EXISTS sso_providers_enabled_idx
        ON sso_providers (enabled) WHERE enabled = TRUE;

    -- ── SCIM Bearer Tokens (Enterprise tier) ───────────────────────────────────
    -- Long-lived tokens used by SCIM clients (Okta, Azure AD) to authenticate
    -- against /scim/v2/*. Raw token values are NEVER stored — only SHA-256
    -- hashes. The prefix (first ~8 chars of the raw token) is retained so
    -- operators can distinguish tokens in the admin UI. Soft-delete via
    -- revoked_at so historical audit references to a revoked token resolve.
    CREATE TABLE IF NOT EXISTS scim_tokens (
        id             UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name           TEXT        NOT NULL,
        token_hash     TEXT        NOT NULL UNIQUE,
        token_prefix   TEXT        NOT NULL,
        created_by     TEXT        NOT NULL,
        created_at     TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        last_used_at   TIMESTAMPTZ,
        revoked_at     TIMESTAMPTZ
    );
    CREATE INDEX IF NOT EXISTS scim_tokens_hash_idx    ON scim_tokens (token_hash);
    CREATE INDEX IF NOT EXISTS scim_tokens_revoked_idx ON scim_tokens (revoked_at);

    -- ═══════════════════════════════════════════════════════════════════════
    -- Phase E: L8 Tool-Level RBAC
    -- Design decisions: EXACT > REGEX > WILDCARD precedence, role_id required,
    -- time-bound via valid_from/valid_until, server-scoped only.
    -- ═══════════════════════════════════════════════════════════════════════

    -- Tools discovered via tools/list probing on each deployed MCP server.
    CREATE TABLE IF NOT EXISTS mcp_tools (
        id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        server_id       UUID NOT NULL REFERENCES deployed_servers(id) ON DELETE CASCADE,
        tool_name       TEXT NOT NULL,
        description     TEXT,
        input_schema    JSONB,
        first_seen_at   TIMESTAMPTZ NOT NULL DEFAULT now(),
        last_seen_at    TIMESTAMPTZ NOT NULL DEFAULT now(),
        UNIQUE (server_id, tool_name)
    );
    CREATE INDEX IF NOT EXISTS idx_mcp_tools_server ON mcp_tools (server_id);

    -- Per-server governance knobs.
    CREATE TABLE IF NOT EXISTS mcp_server_tool_governance (
        server_id               UUID PRIMARY KEY REFERENCES deployed_servers(id) ON DELETE CASCADE,
        enforcement_enabled     BOOLEAN NOT NULL DEFAULT true,
        log_tool_discovery      BOOLEAN NOT NULL DEFAULT true,
        require_tool_discovery  BOOLEAN NOT NULL DEFAULT false,
        updated_at              TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_by              TEXT
    );

    -- Tool-level RBAC policies.
    CREATE TABLE IF NOT EXISTS mcp_tool_permissions (
        id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        role_id         VARCHAR(255) NOT NULL REFERENCES roles(id) ON DELETE CASCADE,
        server_id       UUID NOT NULL REFERENCES deployed_servers(id) ON DELETE CASCADE,
        pattern_type    TEXT NOT NULL CHECK (pattern_type IN ('EXACT','WILDCARD','REGEX')),
        tool_pattern    TEXT NOT NULL,
        effect          TEXT NOT NULL CHECK (effect IN ('ALLOW','DENY')),
        valid_from      TIMESTAMPTZ,
        valid_until     TIMESTAMPTZ,
        CHECK (valid_from IS NULL OR valid_until IS NULL OR valid_from < valid_until),
        reason          TEXT,
        created_at      TIMESTAMPTZ NOT NULL DEFAULT now(),
        created_by      TEXT,
        updated_at      TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_by      TEXT,
        UNIQUE (role_id, server_id, pattern_type, tool_pattern, effect)
    );
    CREATE INDEX IF NOT EXISTS idx_tool_perms_lookup ON mcp_tool_permissions (role_id, server_id);
    CREATE INDEX IF NOT EXISTS idx_tool_perms_server ON mcp_tool_permissions (server_id);
    -- Note: a partial-index variant (idx_tool_perms_active WHERE valid_until
    -- IS NULL OR valid_until > now()) was previously defined here but
    -- removed because Postgres requires partial-index predicates to use
    -- IMMUTABLE functions, and now() is STABLE. The base composite index
    -- idx_tool_perms_lookup already covers (role_id, server_id) lookups.
    -- Time-window filtering happens at query level via WHERE clauses.

    -- Flattened view for admin UI (avoids N+1 joins in the frontend).
    CREATE OR REPLACE VIEW v_tool_permission_summary AS
    SELECT
        p.id, p.role_id, r.name AS role_name,
        p.server_id, s.name AS server_name,
        p.pattern_type, p.tool_pattern, p.effect,
        p.valid_from, p.valid_until,
        CASE
            WHEN p.valid_until IS NOT NULL AND p.valid_until < now() THEN 'expired'
            WHEN p.valid_from  IS NOT NULL AND p.valid_from  > now() THEN 'scheduled'
            ELSE 'active'
        END AS status,
        p.reason, p.created_at, p.created_by, p.updated_at, p.updated_by
    FROM mcp_tool_permissions p
    JOIN roles r            ON r.id = p.role_id
    JOIN deployed_servers s ON s.id = p.server_id
    ORDER BY s.name, r.name, p.pattern_type, p.tool_pattern;

    -- ═══════════════════════════════════════════════════════════════════════
    -- v1.7+ Multi-Replica HA — xDS snapshots
    -- ═══════════════════════════════════════════════════════════════════════
    -- Append-only log of xDS routes table snapshots. The leader pod writes
    -- here on every route mutation; followers SELECT the latest row to
    -- converge their in-memory state. Each row is a complete snapshot of
    -- the routes table at write time (not a delta) so followers can
    -- bootstrap from a single SELECT.
    --
    -- Volume profile: one row per route mutation. v1.7 has no retention,
    -- so the table grows over time. v1.8 adds retention policy. See
    -- HA-DEPLOYMENT.md "Known limitations" for operator guidance.
    --
    -- Used by: src/gateway/envoy_xds.cpp (write_snapshot_to_db,
    --          polling_loop, listener_loop) via DbClient methods
    --          insert_xds_snapshot / get_latest_xds_snapshot.
    --
    -- v1.8 LISTEN/NOTIFY adds a 'xds_snapshots_changed' channel on this
    -- table; the NOTIFY is issued in the same transaction as INSERT so
    -- followers' listener threads are guaranteed to see the row when
    -- they receive the notification.
    CREATE TABLE IF NOT EXISTS xds_snapshots (
        id              BIGSERIAL    PRIMARY KEY,
        routes          JSONB        NOT NULL,
        schema_version  INTEGER      NOT NULL DEFAULT 1,
        written_by      VARCHAR(253) NOT NULL,
        created_at      TIMESTAMPTZ  NOT NULL DEFAULT NOW()
    );
    -- Followers always read MAX(id) on every poll, so a descending index
    -- makes that lookup O(1).
    CREATE INDEX IF NOT EXISTS idx_xds_snapshots_id_desc
        ON xds_snapshots (id DESC);

    -- ── Slice C: delegated OAuth (SEP-990 authorization-code) ────────────────
    -- Short-lived correlation between START AUTH and the OAuth callback. The
    -- random `state` token ties a browser redirect back to the originating
    -- registration + user + PKCE verifier. Rows are one-shot (deleted on
    -- callback) and swept on expiry. server_id FK matches mcp_tools (UUID).
    CREATE TABLE IF NOT EXISTS oauth_pending_flows (
        state             VARCHAR(64)  PRIMARY KEY,
        server_id         UUID         NOT NULL REFERENCES deployed_servers(id) ON DELETE CASCADE,
        requesting_email  VARCHAR(320) NOT NULL,
        code_verifier     VARCHAR(128) NOT NULL,
        redirect_uri      TEXT         NOT NULL,
        created_at        TIMESTAMPTZ  NOT NULL DEFAULT now(),
        expires_at        TIMESTAMPTZ  NOT NULL
    );
    CREATE INDEX IF NOT EXISTS idx_oauth_pending_flows_expiry
        ON oauth_pending_flows (expires_at);

    -- Per-user delegated tokens. The operator's probe token is simply the
    -- first row for a given server. Keyed (email, server_id). refresh_token is
    -- nullable (some authorization servers don't issue one).
    CREATE TABLE IF NOT EXISTS external_user_tokens (
        requesting_email  VARCHAR(320) NOT NULL,
        server_id         UUID         NOT NULL REFERENCES deployed_servers(id) ON DELETE CASCADE,
        access_token      TEXT         NOT NULL,
        refresh_token     TEXT,
        expires_at        TIMESTAMPTZ  NOT NULL,
        obtained_at       TIMESTAMPTZ  NOT NULL DEFAULT now(),
        PRIMARY KEY (requesting_email, server_id)
    );
    CREATE INDEX IF NOT EXISTS idx_external_user_tokens_server
        ON external_user_tokens (server_id);

    -- ─── Slice C6b: polymorphic principal (user_email | service_account) ────
    -- The (email, server_id) cache key only fit human users. Service accounts
    -- have no email — they identify by subject. Migration: add a kind+id pair
    -- to BOTH tables, backfill from requesting_email, swap the
    -- external_user_tokens PK to use the new key. oauth_pending_flows PK stays
    -- on `state` (already-unique correlator); the new columns are just
    -- denormalized identity attached to the pending row.
    -- requesting_email is KEPT (back-compat / audit) — populated alongside
    -- principal_id when principal_kind='user_email', NULL/empty for SA rows.

    ALTER TABLE oauth_pending_flows
        ADD COLUMN IF NOT EXISTS principal_kind VARCHAR(32) NOT NULL DEFAULT 'user_email';
    ALTER TABLE oauth_pending_flows
        ADD COLUMN IF NOT EXISTS principal_id   TEXT        NOT NULL DEFAULT '';

    ALTER TABLE external_user_tokens
        ADD COLUMN IF NOT EXISTS principal_kind VARCHAR(32) NOT NULL DEFAULT 'user_email';
    ALTER TABLE external_user_tokens
        ADD COLUMN IF NOT EXISTS principal_id   TEXT        NOT NULL DEFAULT '';

    -- Backfill existing rows. Only touches rows that haven't been migrated
    -- (principal_id is still the default empty string) AND have a non-empty
    -- requesting_email. Idempotent on re-run.
    UPDATE oauth_pending_flows
       SET principal_id = requesting_email
     WHERE principal_id = '' AND requesting_email IS NOT NULL AND requesting_email <> '';

    UPDATE external_user_tokens
       SET principal_id = requesting_email
     WHERE principal_id = '' AND requesting_email IS NOT NULL AND requesting_email <> '';

    -- Enforce principal kind values. Strict allow-list.
    ALTER TABLE oauth_pending_flows DROP CONSTRAINT IF EXISTS oauth_pending_flows_principal_kind_check;
    ALTER TABLE oauth_pending_flows ADD CONSTRAINT oauth_pending_flows_principal_kind_check
        CHECK (principal_kind IN ('user_email', 'service_account'));

    ALTER TABLE external_user_tokens DROP CONSTRAINT IF EXISTS external_user_tokens_principal_kind_check;
    ALTER TABLE external_user_tokens ADD CONSTRAINT external_user_tokens_principal_kind_check
        CHECK (principal_kind IN ('user_email', 'service_account'));

    -- Refuse blank principal_id. The default '' was only to make the
    -- ADD COLUMN safe on existing rows; backfill above populates it, and
    -- new INSERTs must supply it.
    ALTER TABLE oauth_pending_flows DROP CONSTRAINT IF EXISTS oauth_pending_flows_principal_id_nonempty;
    ALTER TABLE oauth_pending_flows ADD CONSTRAINT oauth_pending_flows_principal_id_nonempty
        CHECK (principal_id <> '');

    ALTER TABLE external_user_tokens DROP CONSTRAINT IF EXISTS external_user_tokens_principal_id_nonempty;
    ALTER TABLE external_user_tokens ADD CONSTRAINT external_user_tokens_principal_id_nonempty
        CHECK (principal_id <> '');

    -- Swap the external_user_tokens PK from (requesting_email, server_id) to
    -- (principal_kind, principal_id, server_id). The pkey is auto-named
    -- external_user_tokens_pkey. Idempotent: drop if it has the old shape,
    -- then add the new. We probe shape by looking at the index columns; if
    -- the PK already includes principal_id, we leave it alone.
    DO $$
    BEGIN
        IF EXISTS (
            SELECT 1
            FROM pg_index i
            JOIN pg_attribute a ON a.attrelid = i.indrelid AND a.attnum = ANY(i.indkey)
            WHERE i.indrelid = 'external_user_tokens'::regclass
              AND i.indisprimary
              AND a.attname = 'requesting_email'
        ) AND NOT EXISTS (
            SELECT 1
            FROM pg_index i
            JOIN pg_attribute a ON a.attrelid = i.indrelid AND a.attnum = ANY(i.indkey)
            WHERE i.indrelid = 'external_user_tokens'::regclass
              AND i.indisprimary
              AND a.attname = 'principal_id'
        ) THEN
            ALTER TABLE external_user_tokens DROP CONSTRAINT external_user_tokens_pkey;
            ALTER TABLE external_user_tokens
                ADD CONSTRAINT external_user_tokens_pkey
                PRIMARY KEY (principal_kind, principal_id, server_id);
        END IF;
    END
    $$;

    -- Index for the new lookup pattern (kind, id, server) — the PK already
    -- provides this, but explicit index on (principal_kind, principal_id)
    -- helps "all tokens for this user across servers" queries (audit/UI).
    CREATE INDEX IF NOT EXISTS idx_external_user_tokens_principal
        ON external_user_tokens (principal_kind, principal_id);

  02-cost-metering.sql: |
    -- ════════════════════════════════════════════════════════════════════════
    -- Magertron Cost Metering & Contract Rating (v1)
    -- USD-only · credit-based · 1:1 operation→credit (tool-call-group ready)
    -- Layering:  meter_event (dumb) → cost_contract/rate_schedule → rated_cost
    -- All statements idempotent so reinstalls / upgrades are safe.
    -- FKs target deployed_servers(id) which is UUID. caller_user_id is the JWT
    -- subject (TEXT, no FK — agents are not necessarily rows in users).
    -- ════════════════════════════════════════════════════════════════════════

    -- ── Departments / cost centers (allocation dimension) ───────────────────────
    CREATE TABLE IF NOT EXISTS departments (
        id           UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name         VARCHAR(255) NOT NULL UNIQUE,
        cost_center  TEXT,                              -- finance GL / cost-center code
        created_at   TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Effective-dated user→department membership (SCD type 2). Lets us resolve a
    -- user's department AS OF any incurred_at so org moves never restate history.
    CREATE TABLE IF NOT EXISTS user_departments (
        id             UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        user_id        TEXT        NOT NULL,            -- identity subject (JWT sub)
        dept_id        UUID        NOT NULL REFERENCES departments(id),
        effective_from TIMESTAMPTZ NOT NULL,
        effective_to   TIMESTAMPTZ,                     -- NULL = current
        CONSTRAINT user_dept_range_ck
            CHECK (effective_to IS NULL OR effective_to > effective_from)
    );
    CREATE INDEX IF NOT EXISTS user_departments_lookup_idx
        ON user_departments (user_id, effective_from DESC);

    -- ── METER (append-only, immutable, PRICELESS — Magertron is a dumb meter) ───
    CREATE TABLE IF NOT EXISTS meter_events (
        event_id          UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        incurred_at       TIMESTAMPTZ NOT NULL,         -- when the call happened (period attribution)
        recorded_at       TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        caller_user_id    TEXT        NOT NULL,
        caller_dept_id    UUID        REFERENCES departments(id),  -- snapshot at incurred_at
        server_id         UUID        NOT NULL REFERENCES deployed_servers(id),
        tool_id           TEXT        NOT NULL,
        method            TEXT        NOT NULL,          -- the billable atom
        billing_group_id  UUID,                          -- v1: = event_id; future: batch group
        quantity          NUMERIC(20,6) NOT NULL CHECK (quantity >= 0),
        unit              TEXT        NOT NULL DEFAULT 'credit'
                            CHECK (unit IN ('credit','call','token','byte')),
        status            TEXT        NOT NULL DEFAULT 'success'
                            CHECK (status IN ('success','error')),
        session_id        TEXT,
        idempotency_key   TEXT        UNIQUE             -- retries must not double-count
    );
    -- Default a row to its own billing group (v1 behavior).
    CREATE OR REPLACE FUNCTION meter_events_default_group() RETURNS TRIGGER AS $$
    BEGIN
        IF NEW.billing_group_id IS NULL THEN
            NEW.billing_group_id := NEW.event_id;
        END IF;
        RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;
    DROP TRIGGER IF EXISTS meter_events_group_trg ON meter_events;
    CREATE TRIGGER meter_events_group_trg
        BEFORE INSERT ON meter_events
        FOR EACH ROW EXECUTE FUNCTION meter_events_default_group();

    CREATE INDEX IF NOT EXISTS meter_events_incurred_idx ON meter_events (incurred_at);
    CREATE INDEX IF NOT EXISTS meter_events_server_idx   ON meter_events (server_id, incurred_at);
    CREATE INDEX IF NOT EXISTS meter_events_dept_idx     ON meter_events (caller_dept_id, incurred_at);
    CREATE INDEX IF NOT EXISTS meter_events_method_idx   ON meter_events (server_id, tool_id, method, incurred_at);
    CREATE INDEX IF NOT EXISTS meter_events_group_idx    ON meter_events (billing_group_id);

    -- ── CONTRACT (digital twin of the vendor agreement) ─────────────────────────
    CREATE TABLE IF NOT EXISTS cost_contracts (
        id                  UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        server_id           UUID        NOT NULL REFERENCES deployed_servers(id),
        vendor_name         TEXT        NOT NULL,
        currency            TEXT        NOT NULL DEFAULT 'USD',   -- dormant in v1
        term_start          DATE        NOT NULL,
        term_end            DATE        NOT NULL,
        commitment_credits  NUMERIC(20,6),               -- committed/prepaid, in CREDITS
        minimum_amount_usd  NUMERIC(20,2),               -- true-up floor
        billing_period      TEXT        NOT NULL DEFAULT 'monthly'
                              CHECK (billing_period IN ('monthly','quarterly','annual')),
        period_anchor       TEXT        NOT NULL DEFAULT 'calendar'  -- Move 4: period boundary
                              CHECK (period_anchor IN ('calendar','anniversary')),
        status              TEXT        NOT NULL DEFAULT 'active'
                              CHECK (status IN ('active','expired','suspended')),
        created_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        CONSTRAINT cost_contract_term_ck CHECK (term_end > term_start)
    );
    -- At most one ACTIVE contract per server.
    CREATE UNIQUE INDEX IF NOT EXISTS cost_contracts_active_uq
        ON cost_contracts (server_id) WHERE status = 'active';

    -- ── CREDIT BALANCE (prepaid credit packs → burn-down) ───────────────────────
    CREATE TABLE IF NOT EXISTS credit_purchases (
        id                 UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        contract_id        UUID        NOT NULL REFERENCES cost_contracts(id),
        credits_purchased  NUMERIC(20,6) NOT NULL CHECK (credits_purchased > 0),
        usd_paid           NUMERIC(20,2) NOT NULL CHECK (usd_paid >= 0),
        purchased_at       TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        note               TEXT
    );
    CREATE INDEX IF NOT EXISTS credit_purchases_contract_idx
        ON credit_purchases (contract_id, purchased_at);

    -- ── RATE SCHEDULE + TIERS (per-method pricing, versioned, tiered) ───────────
    CREATE TABLE IF NOT EXISTS rate_schedules (
        id                UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        contract_id       UUID        NOT NULL REFERENCES cost_contracts(id),
        tool_id           TEXT        NOT NULL,
        method            TEXT        NOT NULL,          -- the billable atom
        pricing_model     TEXT        NOT NULL DEFAULT 'flat'
                            CHECK (pricing_model IN ('flat','tiered','bundled')),
        included_credits  NUMERIC(20,6) DEFAULT 0,       -- bundle free before charges
        bill_errors       BOOLEAN     NOT NULL DEFAULT FALSE,
        effective_from    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        effective_to      TIMESTAMPTZ,                   -- NULL = current version
        CONSTRAINT rate_sched_range_ck
            CHECK (effective_to IS NULL OR effective_to > effective_from)
    );
    CREATE INDEX IF NOT EXISTS rate_schedules_lookup_idx
        ON rate_schedules (contract_id, tool_id, method, effective_from DESC);

    CREATE TABLE IF NOT EXISTS rate_tiers (
        id              UUID         PRIMARY KEY DEFAULT gen_random_uuid(),
        rate_id         UUID         NOT NULL REFERENCES rate_schedules(id) ON DELETE CASCADE,
        tier_seq        INT          NOT NULL,           -- 1,2,3...
        up_to_credits   NUMERIC(20,6),                   -- NULL = unbounded top tier
        usd_per_credit  NUMERIC(20,8) NOT NULL CHECK (usd_per_credit >= 0),
        CONSTRAINT rate_tier_seq_uq UNIQUE (rate_id, tier_seq)
    );

    -- ── RATED COST (rating-engine output: ESTIMATED → FINAL) ────────────────────
    CREATE TABLE IF NOT EXISTS rated_costs (
        id                     UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        billing_group_id       UUID        NOT NULL,     -- what was priced (v1: one event)
        contract_id            UUID        NOT NULL REFERENCES cost_contracts(id),
        rate_id                UUID        NOT NULL REFERENCES rate_schedules(id),
        period                 DATE        NOT NULL,      -- first day of accounting period
        credits                NUMERIC(20,6) NOT NULL,
        usd_per_credit_applied NUMERIC(20,8) NOT NULL,
        amount_usd             NUMERIC(20,6) NOT NULL,
        tier_applied           INT,                       -- explainability
        cost_state             TEXT        NOT NULL DEFAULT 'ESTIMATED'
                                 CHECK (cost_state IN ('ESTIMATED','FINAL')),
        rated_at               TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    -- One ESTIMATED and/or one FINAL per group keeps re-rating idempotent.
    CREATE UNIQUE INDEX IF NOT EXISTS rated_costs_group_state_uq
        ON rated_costs (billing_group_id, cost_state);
    CREATE INDEX IF NOT EXISTS rated_costs_period_idx
        ON rated_costs (contract_id, period, cost_state);

    -- ── VIEW: credit balance & commitment burn-down ─────────────────────────────
    CREATE OR REPLACE VIEW contract_balances AS
    SELECT
        c.id            AS contract_id,
        c.server_id,
        c.vendor_name,
        c.commitment_credits,
        COALESCE(p.credits_purchased, 0)                       AS credits_purchased,
        COALESCE(u.credits_consumed, 0)                        AS credits_consumed,
        COALESCE(p.credits_purchased, 0)
          - COALESCE(u.credits_consumed, 0)                    AS credits_remaining,
        CASE WHEN COALESCE(p.usd_paid,0) > 0 AND COALESCE(p.credits_purchased,0) > 0
             THEN p.usd_paid / p.credits_purchased END         AS implied_usd_per_credit
    FROM cost_contracts c
    LEFT JOIN (
        SELECT contract_id,
               SUM(credits_purchased) AS credits_purchased,
               SUM(usd_paid)          AS usd_paid
        FROM credit_purchases GROUP BY contract_id
    ) p ON p.contract_id = c.id
    LEFT JOIN (
        SELECT contract_id, SUM(credits) AS credits_consumed
        FROM rated_costs
        WHERE cost_state = 'FINAL'      -- settled credits; include ESTIMATED for live view
        GROUP BY contract_id
    ) u ON u.contract_id = c.id;
  03-seed.sql: |
    -- Seed data: default admin user. Password hash from .Values.seed.adminPasswordHash
    -- (default: bcrypt of "admin" — CHANGE for production).
    -- provisioned_via='password' ensures no provenance badge appears next to admin
    -- in the Users tab. The ON CONFLICT clause back-fills the column on upgrades
    -- where admin was seeded before provisioned_via existed.
    INSERT INTO users (username, password_hash, roles, enabled, provisioned_via)
    VALUES (
        'admin',
        {{ .Values.seed.adminPasswordHash | quote }},
        ARRAY['system:platform-admin'],
        TRUE,
        'password'
    )
    ON CONFLICT (username) DO UPDATE
        SET provisioned_via = COALESCE(users.provisioned_via, 'password');

    -- ── System roles ───────────────────────────────────────────────────────────
    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role) VALUES
    ('system:platform-admin', 'Platform Admin', 'Full access to all namespaces and operations',
     '["Deploy","Undeploy","Scale","Read","Write","ManageRoles","AuditRead","ViewLogs"]',
     '["*"]', TRUE)
    ON CONFLICT (id) DO NOTHING;

    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role) VALUES
    ('system:deploy-manager', 'Deploy Manager', 'Deploy and manage servers in production and staging',
     '["Deploy","Undeploy","Scale","Read","Write","ViewLogs","AuditRead"]',
     '["mcp-prod","mcp-staging"]', TRUE)
    ON CONFLICT (id) DO NOTHING;

    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role) VALUES
    ('system:operator', 'Operator', 'Deploy and manage servers in dev and staging only — no production access',
     '["Deploy","Undeploy","Scale","Read","Write","ViewLogs"]',
     '["mcp-dev","mcp-staging"]', TRUE)
    ON CONFLICT (id) DO NOTHING;

    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role) VALUES
    ('system:viewer', 'Viewer', 'Read-only access across all namespaces',
     '["Read","AuditRead"]',
     '["*"]', TRUE)
    ON CONFLICT (id) DO NOTHING;

    -- ── Governance policy templates ────────────────────────────────────────────
    INSERT INTO governance_policies (name, description, is_template, enabled, applies_to_namespaces, rules)
    VALUES (
        'enterprise-standard',
        'Default enterprise governance policy — enforces security, resource limits, naming, and transport standards.',
        TRUE, TRUE, '["mcp-prod","mcp-staging"]',
        '[
          {"category":"security","field":"transport","operator":"in","value":["streamable_http","sse"],"severity":"error","message":"Only Streamable HTTP or SSE transport allowed — stdio is not permitted in production"},
          {"category":"resource_limits","field":"memory_limit_mb","operator":"lte","value":2048,"severity":"error","message":"Memory limit must not exceed 2Gi"},
          {"category":"resource_limits","field":"cpu_limit","operator":"lte","value":2.0,"severity":"error","message":"CPU limit must not exceed 2 cores"},
          {"category":"resource_limits","field":"replicas","operator":"lte","value":10,"severity":"error","message":"Initial replicas must not exceed 10"},
          {"category":"resource_limits","field":"replicas","operator":"gte","value":1,"severity":"error","message":"Must have at least 1 replica"},
          {"category":"naming","field":"labels.team","operator":"exists","value":true,"severity":"error","message":"Label team is required for all MCP servers"},
          {"category":"naming","field":"name","operator":"regex","value":"^[a-z][a-z0-9-]{2,62}$","severity":"error","message":"Server name must be lowercase alphanumeric with hyphens, 3-63 chars"},
          {"category":"tool_safety","field":"tools.*.read_only","operator":"equals","value":true,"severity":"warning","message":"Mutating tools detected — review required before production use"}
        ]'::jsonb
    ) ON CONFLICT (name) DO NOTHING;

    INSERT INTO governance_policies (name, description, is_template, enabled, applies_to_namespaces, rules)
    VALUES (
        'dev-relaxed',
        'Relaxed policy for development environments — minimal restrictions.',
        TRUE, TRUE, '["mcp-dev"]',
        '[
          {"category":"resource_limits","field":"memory_limit_mb","operator":"lte","value":4096,"severity":"error","message":"Memory limit must not exceed 4Gi even in dev"},
          {"category":"resource_limits","field":"replicas","operator":"lte","value":5,"severity":"warning","message":"Consider keeping dev replicas under 5"},
          {"category":"naming","field":"name","operator":"regex","value":"^[a-z][a-z0-9-]{2,62}$","severity":"error","message":"Server name must be lowercase alphanumeric with hyphens, 3-63 chars"}
        ]'::jsonb
    ) ON CONFLICT (name) DO NOTHING;
