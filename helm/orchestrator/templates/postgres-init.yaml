{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp.fullname" . }}-postgres-init
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
    component: postgresql
data:
  01-schema.sql: |
    -- MCP Orchestrator canonical schema (v1.2.0 — adds SSO + SCIM)
    -- Applied automatically by the postgres container on first start
    -- (anything in /docker-entrypoint-initdb.d/ runs in alphabetical order).
    -- All statements are idempotent so reinstalls / upgrades are safe.

    CREATE EXTENSION IF NOT EXISTS "pgcrypto";

    -- ── Users ──────────────────────────────────────────────────────────────────
    -- password_hash = "SSO_ONLY" sentinel for SSO/SCIM-provisioned users
    -- (defeats any accidental password-login path since no bcrypt produces that).
    CREATE TABLE IF NOT EXISTS users (
        id              UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        username        VARCHAR(255) UNIQUE NOT NULL,
        password_hash   VARCHAR(255) NOT NULL,
        roles           TEXT[]      NOT NULL DEFAULT '{}',
        enabled         BOOLEAN     NOT NULL DEFAULT TRUE,
        sso_email       TEXT,                     -- binds user to IdP-provided email for SSO
        -- SCIM: external_id is the IdP's stable identifier (SCIM externalId).
        -- Nullable; only populated for SCIM-provisioned users.
        external_id     TEXT,
        -- How this user came into the system. Used by the admin UI to show a
        -- provenance badge and to enforce read-only on SCIM-managed fields.
        -- Values: 'password' | 'sso_jit' | 'scim' | NULL
        provisioned_via TEXT,
        created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        last_login      TIMESTAMPTZ,
        -- Primary contact email. Separate from sso_email so a user can have
        -- a stable contact address that's distinct from their IdP-resolved
        -- email (e.g. for expiry reminders, audit attribution). Set via
        -- `mcpctl users update-email` or the admin UI. Lowercased for
        -- case-insensitive lookup via users_email_lower_idx.
        email           TEXT
    );
    -- For existing installs (upgrade path from pre-SSO / pre-SCIM schema):
    ALTER TABLE users ADD COLUMN IF NOT EXISTS sso_email       TEXT;
    ALTER TABLE users ADD COLUMN IF NOT EXISTS external_id     TEXT;
    ALTER TABLE users ADD COLUMN IF NOT EXISTS provisioned_via TEXT;
    ALTER TABLE users ADD COLUMN IF NOT EXISTS updated_at      TIMESTAMPTZ NOT NULL DEFAULT NOW();
    ALTER TABLE users ADD COLUMN IF NOT EXISTS email           TEXT;
    -- Each sso_email / external_id can map to at most one user; NULLs exempt.
    CREATE UNIQUE INDEX IF NOT EXISTS users_sso_email_unique_idx
        ON users (sso_email) WHERE sso_email IS NOT NULL;
    CREATE UNIQUE INDEX IF NOT EXISTS users_external_id_unique_idx
        ON users (external_id) WHERE external_id IS NOT NULL;
    -- Case-insensitive lookup on the primary contact email.
    -- Non-unique on purpose: a user's contact email and sso_email could be
    -- the same string; uniqueness across users is enforced on sso_email above.
    CREATE INDEX IF NOT EXISTS users_email_lower_idx
        ON users (lower(email)) WHERE email IS NOT NULL;

    -- ── Audit Events ───────────────────────────────────────────────────────────
    -- OCSF-aligned shape (Phase F.1, 2026-04-25). 22 columns supporting:
    --  classification (class_uid, activity_id, severity_id, status_id),
    --  actor metadata (email, session, idp, roles snapshot),
    --  network context (src_ip, user_agent),
    --  correlation (request_id, tenant, cluster_uid),
    --  state diffs (old_state, new_state) and OCSF overflow (unmapped).
    CREATE TABLE IF NOT EXISTS audit_events (
        -- ── Core identity ───────────────────────────────────────────────────
        id                UUID         PRIMARY KEY DEFAULT gen_random_uuid(),
        event_uid         UUID         NOT NULL UNIQUE DEFAULT gen_random_uuid(),
        -- event_uid is the OCSF-equivalent globally-unique id, exported as
        -- metadata.uid in OCSF payloads. Distinct from `id` so we can later
        -- migrate to externally-issued ids without breaking primary key refs.

        -- ── Plane (Phase F.3) ───────────────────────────────────────────────
        -- Separates events emitted by the orchestrator (admin plane: REST,
        -- deployments, role changes) from events emitted by ext_authz (caller
        -- plane: per-tool-invocation decisions). Two pipelines write to this
        -- one table; SIEM filtering happens by 'plane'.
        plane             VARCHAR(8)   NOT NULL DEFAULT 'admin'
                                       CHECK (plane IN ('admin', 'caller')),

        -- ── Classification (OCSF-aligned) ───────────────────────────────────
        kind              VARCHAR(64)  NOT NULL,                  -- domain string, e.g. "Deployed"
        class_uid         INT          NOT NULL DEFAULT 6003,     -- OCSF class (6003=API Activity)
        activity_id       INT          NOT NULL DEFAULT 0,        -- 0=Unknown,1=Create,2=Read,3=Update,4=Delete
        severity_id       INT          NOT NULL DEFAULT 1,        -- 1=Info,2=Low,3=Medium,4=High,5=Critical,6=Fatal
        status_id         INT          NOT NULL DEFAULT 1,        -- 1=Success,2=Failure
        status_detail     TEXT,                                   -- failure reason if any

        -- ── Actor (the user/agent/system that did the thing) ────────────────
        actor             VARCHAR(255) NOT NULL,                  -- subject / username
        actor_email       VARCHAR(255),                           -- from JWT 'email' claim
        actor_session_id  VARCHAR(128),                           -- from JWT 'sid' / 'jti'
        actor_idp         VARCHAR(128),                           -- from JWT 'iss'
        actor_roles       JSONB        NOT NULL DEFAULT '[]',     -- snapshot of role IDs at event time

        -- ── Source endpoint (network context) ───────────────────────────────
        src_ip            INET,                                   -- client IP from XFF or socket
        src_user_agent    TEXT,                                   -- HTTP UA string

        -- ── Target ──────────────────────────────────────────────────────────
        server_name       VARCHAR(255),
        namespace         VARCHAR(255),

        -- ── Correlation & multi-tenancy ─────────────────────────────────────
        request_id        VARCHAR(128),                           -- correlate with Envoy access logs
        tenant            VARCHAR(64),                            -- multi-tenant hook (NULL=default)
        cluster_uid       VARCHAR(64),                            -- which Magertron instance

        -- ── Detail & state ──────────────────────────────────────────────────
        detail            TEXT,                                   -- human-readable description
        old_state         JSONB,                                  -- pre-change snapshot
        new_state         JSONB,                                  -- post-change snapshot
        unmapped          JSONB        NOT NULL DEFAULT '{}',     -- OCSF overflow

        -- ── Timestamps ──────────────────────────────────────────────────────
        ts                TIMESTAMPTZ  NOT NULL DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS audit_events_ts_idx        ON audit_events (ts DESC);
    CREATE INDEX IF NOT EXISTS audit_events_actor_idx     ON audit_events (actor);
    CREATE INDEX IF NOT EXISTS audit_events_server_idx    ON audit_events (server_name, namespace);
    CREATE INDEX IF NOT EXISTS audit_events_event_uid_idx ON audit_events (event_uid);
    CREATE INDEX IF NOT EXISTS audit_events_class_idx     ON audit_events (class_uid, activity_id);
    CREATE INDEX IF NOT EXISTS audit_events_request_idx   ON audit_events (request_id) WHERE request_id IS NOT NULL;
    CREATE INDEX IF NOT EXISTS audit_events_tenant_idx    ON audit_events (tenant)     WHERE tenant     IS NOT NULL;
    CREATE INDEX IF NOT EXISTS audit_events_plane_ts_idx  ON audit_events (plane, ts DESC);

    -- ── Deployed Servers ───────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS deployed_servers (
        id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name          VARCHAR(255) NOT NULL,
        namespace     VARCHAR(255) NOT NULL,
        -- ── Server type discriminator ────────────────────────────────────────
        -- 'internal' = MCP server runs as a pod in this cluster (default).
        -- 'hybrid'   = same as internal at the registration layer; outbound
        --              egress policies applied separately at runtime.
        -- 'external' = MCP server runs at a vendor SaaS endpoint; this row
        --              represents a proxy registration, not a deployable pod.
        --              endpoint_url, auth_type, credential_secret_ref required;
        --              image / image_tag / mcp_port columns are NULL for these.
        server_type   VARCHAR(32) NOT NULL DEFAULT 'internal'
                      CHECK (server_type IN ('internal', 'hybrid', 'external')),
        -- ── Internal/Hybrid columns (NULL for external) ──────────────────────
        -- image-related fields are NULL when server_type='external' because no
        -- pod is deployed. The composite CHECK constraint below enforces this.
        image         VARCHAR(512),
        image_tag     VARCHAR(128) DEFAULT 'latest',
        replicas      INT         NOT NULL DEFAULT 1,
        mcp_port      INT,
        transport     VARCHAR(32) NOT NULL DEFAULT 'http',
        cluster_ip    VARCHAR(64),
        cluster_port  INT,
        -- ── External-only columns (NULL for internal/hybrid) ─────────────────
        -- Where the vendor MCP server lives (HTTPS URL).
        endpoint_url  TEXT,
        -- How magertron authenticates to the vendor endpoint.
        -- 'none' is a valid choice (public endpoint, no auth).
        auth_type     VARCHAR(32)
                      CHECK (auth_type IS NULL OR auth_type IN
                            ('none', 'bearer', 'api-key',
                             'oauth2-client-credentials', 'mtls')),
        -- Name of the K8s Secret holding credentials. NULL allowed even when
        -- auth_type IS NOT NULL if auth_type='none' (no secret needed).
        credential_secret_ref VARCHAR(255),
        -- ── Common columns ───────────────────────────────────────────────────
        state         VARCHAR(32) NOT NULL DEFAULT 'Pending',
        deployed_by   VARCHAR(255),
        tools         JSONB       NOT NULL DEFAULT '[]',
        env_vars      JSONB       NOT NULL DEFAULT '{}',
        labels        JSONB       NOT NULL DEFAULT '{}',
        annotations   JSONB       NOT NULL DEFAULT '{}',
        -- Container entrypoint override. Both default to empty array '[]'
        -- meaning "use the image's default ENTRYPOINT/CMD" — backward-
        -- compatible with deploys made before this column existed. When
        -- non-empty, command flows to the K8s container.command field
        -- (overrides image ENTRYPOINT) and args flows to container.args
        -- (overrides image CMD). Common case: forcing stdio-default MCP
        -- server images (mcp/everything, tzolov/mcp-everything-server)
        -- into HTTP mode via args=["node","dist/index.js","streamableHttp"].
        command       JSONB       NOT NULL DEFAULT '[]',
        args          JSONB       NOT NULL DEFAULT '[]',
        group_name    VARCHAR(255),
        -- Slice 6f: data plane selector. "legacy" routes through the legacy
        -- xDS push handler (existing behavior); "v3" routes through the v3
        -- ADS pull-driven handler (slice 6e Option A). The v3 ADS subscriber
        -- in src/gateway/v3/ads_subscriber.cpp filters on this field —
        -- only servers with routing_mode='v3' are exposed to v3 Envoy.
        routing_mode  VARCHAR(16) NOT NULL DEFAULT 'legacy',
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        UNIQUE (name, namespace),
        -- ── Per-type data invariants ─────────────────────────────────────────
        -- Internal and Hybrid require an image; External requires an endpoint.
        -- This constraint catches any malformed row at insert/update time
        -- regardless of whether the C++ or UI layer validates correctly.
        CONSTRAINT deployed_servers_type_invariant CHECK (
            (server_type IN ('internal', 'hybrid')
             AND image IS NOT NULL
             AND endpoint_url IS NULL
             AND auth_type IS NULL
             AND credential_secret_ref IS NULL)
            OR
            (server_type = 'external'
             AND image IS NULL
             AND image_tag IS NULL
             AND mcp_port IS NULL
             AND endpoint_url IS NOT NULL
             AND auth_type IS NOT NULL)
        )
    );
    -- For existing installs (upgrade path from pre-1.15 schema):
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS command JSONB NOT NULL DEFAULT '[]';
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS args    JSONB NOT NULL DEFAULT '[]';
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS routing_mode VARCHAR(16) NOT NULL DEFAULT 'legacy';
    -- ── External MCP server support (session 2.13) ───────────────────────────
    -- server_type discriminator. Default 'internal' for any pre-existing rows.
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS server_type VARCHAR(32) NOT NULL DEFAULT 'internal';
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS endpoint_url TEXT;
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS auth_type    VARCHAR(32);
    ALTER TABLE deployed_servers ADD COLUMN IF NOT EXISTS credential_secret_ref VARCHAR(255);
    -- Fast filtering by type when listing servers per tenant or rendering
    -- type-specific UI sections. Most queries scope by namespace + server_type.
    CREATE INDEX IF NOT EXISTS deployed_servers_type_idx
        ON deployed_servers (namespace, server_type);
    -- Prevent duplicate External-server registrations against the same vendor
    -- endpoint within a tenant namespace. Two operators registering "Nitro"
    -- twice with different credentials would create ambiguous routing and
    -- billing. Partial index (WHERE server_type = 'external') so Internal/
    -- Hybrid rows with NULL endpoint_url don't conflict with each other.
    CREATE UNIQUE INDEX IF NOT EXISTS deployed_servers_external_endpoint_unique_idx
        ON deployed_servers (namespace, endpoint_url)
        WHERE server_type = 'external';

    -- ── External MCP server architecture (session 2.13) ──────────────────────
    -- The deployed_servers table holds rows for all three deployment patterns:
    --
    --   server_type='internal'  → MCP server runs as a pod in this cluster.
    --                             Magertron manages full lifecycle. image and
    --                             image_tag specify what to deploy.
    --
    --   server_type='hybrid'    → Same as internal at registration; the
    --                             distinction is operational (the server's
    --                             tools reach external APIs at runtime,
    --                             governed by NetworkPolicy egress rules).
    --
    --   server_type='external'  → MCP server runs at a vendor SaaS endpoint
    --                             (e.g. Nitro Cloud). This row represents a
    --                             proxy registration, not a deployable pod.
    --                             endpoint_url + auth_type + credential_secret_ref
    --                             tell Magertron's proxy where to forward
    --                             traffic and how to authenticate. image is
    --                             NULL because no in-cluster pod exists.
    --
    -- The deployed_servers_type_invariant CHECK constraint above enforces
    -- per-type data integrity at the DB layer. Any code path that tries to
    -- insert a malformed row (e.g. type='external' with NULL endpoint_url)
    -- is rejected by Postgres regardless of whether the C++ or UI validator
    -- ran correctly.
    --
    -- External-server rows are ONLY ever written by the admin API
    -- (mcpctl / UI authenticated by an operator with the appropriate RBAC
    -- permission). The inventory-plane ingestion path NEVER auto-registers
    -- External servers — the security blast radius of an auto-discovered
    -- external endpoint (DNS spoofing, vendor identity confusion) is too
    -- large to permit. See design/external-mcp-servers.md (internal).

    -- ── RBAC Roles ─────────────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS roles (
        id            VARCHAR(255) PRIMARY KEY,
        name          VARCHAR(255) NOT NULL,
        description   TEXT,
        permissions   JSONB       NOT NULL DEFAULT '[]',
        allowed_namespaces JSONB  NOT NULL DEFAULT '["*"]',
        system_role   BOOLEAN     NOT NULL DEFAULT FALSE,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- ── Governance Policies ────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS governance_policies (
        id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name          VARCHAR(255) UNIQUE NOT NULL,
        description   TEXT        NOT NULL DEFAULT '',
        rules         JSONB       NOT NULL DEFAULT '[]',
        applies_to_namespaces JSONB NOT NULL DEFAULT '["*"]',
        is_template   BOOLEAN     NOT NULL DEFAULT FALSE,
        enabled       BOOLEAN     NOT NULL DEFAULT TRUE,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE INDEX IF NOT EXISTS governance_policies_enabled_idx ON governance_policies (enabled);

    -- ── Webhooks ───────────────────────────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS webhooks (
        id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name          VARCHAR(255) NOT NULL,
        url           TEXT        NOT NULL,
        secret        TEXT        NOT NULL DEFAULT '',
        event_types   JSONB       NOT NULL DEFAULT '["*"]',
        namespaces    JSONB       NOT NULL DEFAULT '["*"]',
        enabled       BOOLEAN     NOT NULL DEFAULT TRUE,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- ── SSO Providers (Enterprise tier) ────────────────────────────────────────
    CREATE TABLE IF NOT EXISTS sso_providers (
        id              TEXT        PRIMARY KEY,
        name            TEXT        NOT NULL,
        type            TEXT        NOT NULL CHECK (type IN ('oidc', 'saml')),
        -- OIDC fields
        client_id       TEXT        NOT NULL DEFAULT '',
        client_secret   TEXT        NOT NULL DEFAULT '',
        discovery_url   TEXT        NOT NULL DEFAULT '',
        redirect_uri    TEXT        NOT NULL DEFAULT '',
        -- SAML fields
        entity_id       TEXT        NOT NULL DEFAULT '',
        sso_url         TEXT        NOT NULL DEFAULT '',
        idp_certificate TEXT        NOT NULL DEFAULT '',
        sp_certificate  TEXT        NOT NULL DEFAULT '',
        sp_private_key  TEXT        NOT NULL DEFAULT '',
        -- Which IdP attribute to use as the email when resolving to a platform user
        email_attribute TEXT        NOT NULL DEFAULT 'email',
        enabled         BOOLEAN     NOT NULL DEFAULT TRUE,
        created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at      TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    ALTER TABLE sso_providers ADD COLUMN IF NOT EXISTS updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW();
    CREATE INDEX IF NOT EXISTS sso_providers_enabled_idx
        ON sso_providers (enabled) WHERE enabled = TRUE;

    -- ── SCIM Bearer Tokens (Enterprise tier) ───────────────────────────────────
    -- Long-lived tokens used by SCIM clients (Okta, Azure AD) to authenticate
    -- against /scim/v2/*. Raw token values are NEVER stored — only SHA-256
    -- hashes. The prefix (first ~8 chars of the raw token) is retained so
    -- operators can distinguish tokens in the admin UI. Soft-delete via
    -- revoked_at so historical audit references to a revoked token resolve.
    CREATE TABLE IF NOT EXISTS scim_tokens (
        id             UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
        name           TEXT        NOT NULL,
        token_hash     TEXT        NOT NULL UNIQUE,
        token_prefix   TEXT        NOT NULL,
        created_by     TEXT        NOT NULL,
        created_at     TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        last_used_at   TIMESTAMPTZ,
        revoked_at     TIMESTAMPTZ
    );
    CREATE INDEX IF NOT EXISTS scim_tokens_hash_idx    ON scim_tokens (token_hash);
    CREATE INDEX IF NOT EXISTS scim_tokens_revoked_idx ON scim_tokens (revoked_at);

    -- ═══════════════════════════════════════════════════════════════════════
    -- Phase E: L8 Tool-Level RBAC
    -- Design decisions: EXACT > REGEX > WILDCARD precedence, role_id required,
    -- time-bound via valid_from/valid_until, server-scoped only.
    -- ═══════════════════════════════════════════════════════════════════════

    -- Tools discovered via tools/list probing on each deployed MCP server.
    CREATE TABLE IF NOT EXISTS mcp_tools (
        id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        server_id       UUID NOT NULL REFERENCES deployed_servers(id) ON DELETE CASCADE,
        tool_name       TEXT NOT NULL,
        description     TEXT,
        input_schema    JSONB,
        first_seen_at   TIMESTAMPTZ NOT NULL DEFAULT now(),
        last_seen_at    TIMESTAMPTZ NOT NULL DEFAULT now(),
        UNIQUE (server_id, tool_name)
    );
    CREATE INDEX IF NOT EXISTS idx_mcp_tools_server ON mcp_tools (server_id);

    -- Per-server governance knobs.
    CREATE TABLE IF NOT EXISTS mcp_server_tool_governance (
        server_id               UUID PRIMARY KEY REFERENCES deployed_servers(id) ON DELETE CASCADE,
        enforcement_enabled     BOOLEAN NOT NULL DEFAULT true,
        log_tool_discovery      BOOLEAN NOT NULL DEFAULT true,
        require_tool_discovery  BOOLEAN NOT NULL DEFAULT false,
        updated_at              TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_by              TEXT
    );

    -- Tool-level RBAC policies.
    CREATE TABLE IF NOT EXISTS mcp_tool_permissions (
        id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        role_id         VARCHAR(255) NOT NULL REFERENCES roles(id) ON DELETE CASCADE,
        server_id       UUID NOT NULL REFERENCES deployed_servers(id) ON DELETE CASCADE,
        pattern_type    TEXT NOT NULL CHECK (pattern_type IN ('EXACT','WILDCARD','REGEX')),
        tool_pattern    TEXT NOT NULL,
        effect          TEXT NOT NULL CHECK (effect IN ('ALLOW','DENY')),
        valid_from      TIMESTAMPTZ,
        valid_until     TIMESTAMPTZ,
        CHECK (valid_from IS NULL OR valid_until IS NULL OR valid_from < valid_until),
        reason          TEXT,
        created_at      TIMESTAMPTZ NOT NULL DEFAULT now(),
        created_by      TEXT,
        updated_at      TIMESTAMPTZ NOT NULL DEFAULT now(),
        updated_by      TEXT,
        UNIQUE (role_id, server_id, pattern_type, tool_pattern, effect)
    );
    CREATE INDEX IF NOT EXISTS idx_tool_perms_lookup ON mcp_tool_permissions (role_id, server_id);
    CREATE INDEX IF NOT EXISTS idx_tool_perms_server ON mcp_tool_permissions (server_id);
    -- Note: a partial-index variant (idx_tool_perms_active WHERE valid_until
    -- IS NULL OR valid_until > now()) was previously defined here but
    -- removed because Postgres requires partial-index predicates to use
    -- IMMUTABLE functions, and now() is STABLE. The base composite index
    -- idx_tool_perms_lookup already covers (role_id, server_id) lookups.
    -- Time-window filtering happens at query level via WHERE clauses.

    -- Flattened view for admin UI (avoids N+1 joins in the frontend).
    CREATE OR REPLACE VIEW v_tool_permission_summary AS
    SELECT
        p.id, p.role_id, r.name AS role_name,
        p.server_id, s.name AS server_name,
        p.pattern_type, p.tool_pattern, p.effect,
        p.valid_from, p.valid_until,
        CASE
            WHEN p.valid_until IS NOT NULL AND p.valid_until < now() THEN 'expired'
            WHEN p.valid_from  IS NOT NULL AND p.valid_from  > now() THEN 'scheduled'
            ELSE 'active'
        END AS status,
        p.reason, p.created_at, p.created_by, p.updated_at, p.updated_by
    FROM mcp_tool_permissions p
    JOIN roles r            ON r.id = p.role_id
    JOIN deployed_servers s ON s.id = p.server_id
    ORDER BY s.name, r.name, p.pattern_type, p.tool_pattern;

    -- ═══════════════════════════════════════════════════════════════════════
    -- v1.7+ Multi-Replica HA — xDS snapshots
    -- ═══════════════════════════════════════════════════════════════════════
    -- Append-only log of xDS routes table snapshots. The leader pod writes
    -- here on every route mutation; followers SELECT the latest row to
    -- converge their in-memory state. Each row is a complete snapshot of
    -- the routes table at write time (not a delta) so followers can
    -- bootstrap from a single SELECT.
    --
    -- Volume profile: one row per route mutation. v1.7 has no retention,
    -- so the table grows over time. v1.8 adds retention policy. See
    -- HA-DEPLOYMENT.md "Known limitations" for operator guidance.
    --
    -- Used by: src/gateway/envoy_xds.cpp (write_snapshot_to_db,
    --          polling_loop, listener_loop) via DbClient methods
    --          insert_xds_snapshot / get_latest_xds_snapshot.
    --
    -- v1.8 LISTEN/NOTIFY adds a 'xds_snapshots_changed' channel on this
    -- table; the NOTIFY is issued in the same transaction as INSERT so
    -- followers' listener threads are guaranteed to see the row when
    -- they receive the notification.
    CREATE TABLE IF NOT EXISTS xds_snapshots (
        id              BIGSERIAL    PRIMARY KEY,
        routes          JSONB        NOT NULL,
        schema_version  INTEGER      NOT NULL DEFAULT 1,
        written_by      VARCHAR(253) NOT NULL,
        created_at      TIMESTAMPTZ  NOT NULL DEFAULT NOW()
    );
    -- Followers always read MAX(id) on every poll, so a descending index
    -- makes that lookup O(1).
    CREATE INDEX IF NOT EXISTS idx_xds_snapshots_id_desc
        ON xds_snapshots (id DESC);

  02-seed.sql: |
    -- Seed data: default admin user. Password hash from .Values.seed.adminPasswordHash
    -- (default: bcrypt of "admin" — CHANGE for production).
    -- provisioned_via='password' ensures no provenance badge appears next to admin
    -- in the Users tab. The ON CONFLICT clause back-fills the column on upgrades
    -- where admin was seeded before provisioned_via existed.
    INSERT INTO users (username, password_hash, roles, enabled, provisioned_via)
    VALUES (
        'admin',
        {{ .Values.seed.adminPasswordHash | quote }},
        ARRAY['system:platform-admin'],
        TRUE,
        'password'
    )
    ON CONFLICT (username) DO UPDATE
        SET provisioned_via = COALESCE(users.provisioned_via, 'password');

    -- ── System roles ───────────────────────────────────────────────────────────
    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role) VALUES
    ('system:platform-admin', 'Platform Admin', 'Full access to all namespaces and operations',
     '["Deploy","Undeploy","Scale","Read","Write","ManageRoles","AuditRead","ViewLogs"]',
     '["*"]', TRUE)
    ON CONFLICT (id) DO NOTHING;

    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role) VALUES
    ('system:deploy-manager', 'Deploy Manager', 'Deploy and manage servers in production and staging',
     '["Deploy","Undeploy","Scale","Read","Write","ViewLogs","AuditRead"]',
     '["mcp-prod","mcp-staging"]', TRUE)
    ON CONFLICT (id) DO NOTHING;

    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role) VALUES
    ('system:operator', 'Operator', 'Deploy and manage servers in dev and staging only — no production access',
     '["Deploy","Undeploy","Scale","Read","Write","ViewLogs"]',
     '["mcp-dev","mcp-staging"]', TRUE)
    ON CONFLICT (id) DO NOTHING;

    INSERT INTO roles (id, name, description, permissions, allowed_namespaces, system_role) VALUES
    ('system:viewer', 'Viewer', 'Read-only access across all namespaces',
     '["Read","AuditRead"]',
     '["*"]', TRUE)
    ON CONFLICT (id) DO NOTHING;

