{{- /*
  templates/externalsecrets.yaml

  Renders one ExternalSecret per configured endpoint credential when
  .Values.externalSecrets.enabled is true. Does nothing otherwise.

  This template emits ONLY ExternalSecret resources. It does NOT install the
  External Secrets Operator and does NOT create a SecretStore/ClusterSecretStore
  — those are customer-owned (they name their backend + auth). The chart merely
  declares "materialize these contract-shaped Secrets from the store you named."

  Invariant enforced here: the target Kubernetes Secret name == item.secretName
  == the server's credential_secret_ref. That is the Magertron Secret Contract.
*/ -}}
{{- if .Values.externalSecrets.enabled }}
{{- $es := .Values.externalSecrets }}
{{- if not $es.storeRef.name }}
{{-   fail "externalSecrets.enabled=true but externalSecrets.storeRef.name is empty — set it to the customer's SecretStore/ClusterSecretStore name." }}
{{- end }}
{{- $prefix := $es.remoteKeyPrefix | default "" }}
{{- range $item := $es.items }}
{{-   if not $item.secretName }}{{ fail "each externalSecrets.items entry requires secretName" }}{{ end }}
{{-   if not $item.namespace }}{{ fail (printf "externalSecrets item %s requires namespace" $item.secretName) }}{{ end }}
{{-   if not $item.properties }}{{ fail (printf "externalSecrets item %s requires a non-empty properties list" $item.secretName) }}{{ end }}
{{-   $remoteKey := $item.remoteKey | default (printf "%s/%s" $item.namespace $item.secretName) }}
{{-   $fullKey := printf "%s%s" $prefix $remoteKey }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $item.secretName }}
  namespace: {{ $item.namespace }}
  labels:
    {{- include "mcp.labels" $ | nindent 4 }}
    app.kubernetes.io/component: endpoint-credential
  annotations:
    magertron.com/credential-secret-ref: {{ $item.secretName | quote }}
spec:
  refreshInterval: {{ $es.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    kind: {{ $es.storeRef.kind | default "ClusterSecretStore" }}
    name: {{ $es.storeRef.name }}
  target:
    # MUST equal the server's credential_secret_ref (Secret Contract invariant).
    name: {{ $item.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- range $prop := $item.properties }}
    - secretKey: {{ $prop }}
      remoteRef:
        key: {{ $fullKey | quote }}
        property: {{ $prop | quote }}
    {{- end }}
{{- end }}
{{- end }}
