apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp.fullname" . }}
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.orchestrator.replicaCount }}
  selector:
    matchLabels:
      {{- include "mcp.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "mcp.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.observability.metricsPort | quote }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: mcp-orchestrator
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: orchestrator
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag }}"
          imagePullPolicy: {{ .Values.orchestrator.image.pullPolicy }}
          args: ["--config", "/etc/mcp/config.yaml"]
          ports:
            - name: http
              containerPort: {{ .Values.api.httpPort }}
            - name: grpc
              containerPort: {{ .Values.api.grpcPort }}
            - name: xds
              containerPort: {{ .Values.envoy.xds.port }}
            - name: metrics
              containerPort: {{ .Values.observability.metricsPort }}
            # ext_authz gRPC endpoint — Envoy's ext_authz filter calls this
            # port for the Check RPC. Bound to 0.0.0.0:9092 inside the
            # orchestrator process; must be declared here so the port is
            # routable via the Service (see services.yaml).
            - name: ext-authz
              containerPort: {{ .Values.orchestrator.extAuthzPort | default 9092 }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # ── SSO JIT provisioning allowlist ──────────────────────────────
            # Comma-separated list of email domains. If a user logs in via
            # SSO with an email domain matching, they're provisioned on the
            # fly into the local users table. Empty string = JIT disabled.
            - name: MCP_SSO_AUTO_PROVISION_DOMAINS
              value: {{ .Values.orchestrator.env.ssoAutoProvisionDomains | quote }}
            # ── Public URL ──────────────────────────────────────────────────
            # Used to populate meta.location in SCIM responses and to build
            # SSO redirect URIs. Should match the URL customers/IdPs use to
            # reach this orchestrator externally. Leave empty to use
            # request-relative URLs.
            - name: MCP_API_PUBLIC_URL
              value: {{ .Values.orchestrator.env.apiPublicUrl | quote }}
            # ── License file path ──────────────────────────────────────────
            # Path to the license JSON inside the pod. Free tier if missing.
            - name: MCP_LICENSE_FILE
              value: /etc/mcp-license/license.json
            # ── Platform version ───────────────────────────────────────────
            # Sourced from Chart.AppVersion at chart-render time. The
            # orchestrator surfaces this via /api/v1/about (About modal)
            # and the MCP initialize handshake's clientInfo (downstream
            # MCP servers see exactly which orchestrator version probed
            # them). Bumping Chart.yaml's appVersion is the only place
            # the version needs to change at release time — no code edits.
            - name: MCP_VERSION
              value: {{ .Chart.AppVersion | quote }}
            # ── HealthMonitor poll interval ────────────────────────────────
            # How often the orchestrator polls Kubernetes for pod state and
            # MCP server health. Drives UI responsiveness for state
            # transitions (Deploying → Probing → Running). See values.yaml
            # `orchestrator.healthMonitor.pollIntervalSeconds` for guidance
            # on tuning per cluster size.
            - name: MCP_K8S_POLL_INTERVAL
              value: {{ .Values.orchestrator.healthMonitor.pollIntervalSeconds | default 5 | quote }}
            # ── v1.7 close-out: SchemaGuard schema source ──────────────────
            # SchemaGuard reads this file at orchestrator startup and applies
            # every statement idempotently. This is the upgrade-safe path for
            # schema additions: the same canonical SQL drives both fresh
            # Postgres init (via the postgres-init ConfigMap) AND ongoing
            # orchestrator-driven schema migration (via SchemaGuard).
            #
            # Mounted at /etc/mcp-schema/01-schema.sql (see volumeMounts).
            # Only set when bundled Postgres is enabled — external-Postgres
            # operators manage schema themselves.
            {{- if .Values.postgresql.enabled }}
            - name: MCP_SCHEMA_FILE
              value: "/etc/mcp-schema/01-schema.sql"
            {{- end }}
            # ── Leader election (v1.7+ multi-replica HA) ───────────────────
            # Auto-enabled when replicaCount > 1. The LeaderLock acquires
            # a Kubernetes Lease named "mcp-orchestrator-leader" in the
            # orchestrator's namespace; the holder is the active writer
            # for HealthMonitor mutations, xDS snapshot writes, and
            # registry-table mutations. Followers reject mutations and
            # converge on leader's state via DB polling.
            #
            # Single-replica (replicaCount=1): set to false; LeaderLock
            # is a no-op. Behavior matches v1.6 single-replica mode.
            #
            # Override possible via .Values.orchestrator.env.leaderElectionEnabled
            # (string "true"/"false") if an operator wants to force the
            # setting independent of replicaCount.
            - name: MCP_LEADER_ELECTION_ENABLED
              value: {{ if .Values.orchestrator.env.leaderElectionEnabled }}{{ .Values.orchestrator.env.leaderElectionEnabled | quote }}{{ else if gt (int .Values.orchestrator.replicaCount) 1 }}"true"{{ else }}"false"{{ end }}
            # ── v1.8 NOTIFY-based xDS fanout (experimental) ────────────────
            # When true, the xDS server runs an additional listener thread
            # holding a Postgres LISTEN connection on xds_snapshots_changed.
            # NOTIFY-based fanout achieves sub-100ms latency vs polling's
            # 0-1s. Polling continues to run as fallback.
            #
            # Default: false (v1.7 polling-only behavior). Opt in via
            # .Values.orchestrator.env.useNotifyFanout = "true" once you
            # want to test the v1.8 path. See HA-DEPLOYMENT.md for the
            # operational implications and fallback semantics.
            - name: MCP_USE_NOTIFY_FANOUT
              value: {{ .Values.orchestrator.env.useNotifyFanout | default "false" | quote }}
            # ── Deploy timeout (v1.8) ────────────────────────────────────
            # Max seconds a server can be stuck in "Deploying" before
            # HealthMonitor transitions it to Failed. See values.yaml
            # for tuning guidance. Default 300s (5 min). 0 = disabled.
            - name: MCP_DEPLOY_TIMEOUT_SECONDS
              value: {{ .Values.orchestrator.env.deployTimeoutSeconds | default "300" | quote }}
          envFrom:
            - secretRef:
                name: {{ include "mcp.fullname" . }}-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/mcp
              readOnly: true
            # ── v1.7 close-out: SchemaGuard belt-and-suspenders ──────────
            # Mounts the chart's postgres-init ConfigMap into the orchestrator
            # pod so SchemaGuard::ensure_schema() can read it on every startup.
            # This is the architectural fix for the "Postgres skipped init
            # scripts because PGDATA wasn't empty" class of bug — SchemaGuard's
            # idempotent re-application of the canonical schema closes the
            # upgrade-safety gap.
            #
            # Mounted at /etc/mcp-schema/ (not /etc/mcp/) because /etc/mcp is
            # already a ConfigMap mount and Kubernetes refuses nested-file
            # mounts inside an existing ConfigMap directory mount.
            #
            # SchemaGuard reads MCP_SCHEMA_FILE env var to find the file
            # (set in the env: section above).
            #
            # Only mount if postgresql.enabled — operators using external
            # Postgres are responsible for their own schema management.
            {{- if .Values.postgresql.enabled }}
            - name: schema
              mountPath: /etc/mcp-schema
              readOnly: true
            {{- end }}
            - name: tls
              mountPath: /etc/tls
              readOnly: true
            - name: audit-log
              mountPath: /var/log/mcp
            - name: license
              mountPath: /etc/mcp-license
              readOnly: true
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.httpPort }}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.httpPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

        # ── mcp-sync sidecar ──────────────────────────────────────────────
        - name: mcp-sync
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.mcpSync.image.repository }}:{{ .Values.mcpSync.image.tag }}"
          imagePullPolicy: {{ .Values.mcpSync.image.pullPolicy }}
          env:
            - name: ORCHESTRATOR_URL
              value: "http://127.0.0.1:{{ .Values.api.httpPort }}"
            - name: WATCH_NAMESPACE
              value: ""
            - name: LEASE_NAMESPACE
              value: {{ include "mcp.namespace" . | quote }}
            - name: LEASE_NAME
              value: "mcp-sync-leader"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mcpSync.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: {{ include "mcp.fullname" . }}-config
        # ── v1.7 close-out: SchemaGuard schema source ──────────────────
        # Reuses the postgres-init ConfigMap (which already has the
        # canonical schema for first-install Postgres bootstrap). Mounting
        # the same ConfigMap here ensures schema-as-code: a single source
        # of truth for both fresh-install (Postgres init scripts) and
        # ongoing-upgrade (SchemaGuard re-application) paths.
        {{- if .Values.postgresql.enabled }}
        - name: schema
          configMap:
            name: {{ include "mcp.fullname" . }}-postgres-init
            items:
              - key: 01-schema.sql
                path: 01-schema.sql
        {{- end }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.orchestratorSecretName }}
        - name: audit-log
          emptyDir: {}
        # License volume — always mounted, orchestrator handles missing
        # license file gracefully by falling back to Free tier. The Secret
        # is either created by the chart (via license.yaml when license.file
        # is set at install time) OR pre-created by the customer via kubectl.
        # optional: true means the pod starts even if the Secret doesn't
        # exist yet — allows upgrading from Free to Enterprise without
        # reinstall by just creating the Secret and restarting.
        - name: license
          secret:
            secretName: {{ .Values.license.secretName }}
            optional: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "mcp.selectorLabels" . | nindent 14 }}
