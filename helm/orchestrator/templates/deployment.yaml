apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp.fullname" . }}
  namespace: {{ include "mcp.namespace" . }}
  labels:
    {{- include "mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.orchestrator.replicaCount }}
  selector:
    matchLabels:
      {{- include "mcp.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "mcp.selectorLabels" . | nindent 8 }}
        component: orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.observability.metricsPort | quote }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: mcp-orchestrator
      {{- with .Values.orchestrator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: orchestrator
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.orchestrator.image.pullPolicy }}
          args: ["--config", "/etc/mcp/config.yaml"]
          ports:
            - name: http
              containerPort: {{ .Values.api.httpPort }}
            - name: grpc
              containerPort: {{ .Values.api.grpcPort }}
            - name: xds
              containerPort: {{ .Values.envoy.xds.port }}
            - name: metrics
              containerPort: {{ .Values.observability.metricsPort }}
            # ext_authz gRPC endpoint — Envoy's ext_authz filter calls this
            # port for the Check RPC. Bound to 0.0.0.0:9092 inside the
            # orchestrator process; must be declared here so the port is
            # routable via the Service (see services.yaml).
            - name: ext-authz
              containerPort: {{ .Values.orchestrator.extAuthzPort | default 9092 }}
            {{- if .Values.envoy.v3ads.enabled }}
            # V3 ADS gRPC port — experimental v3 xDS path (slice 3-5).
            # Only exposed when the v3 ADS server is enabled.
            - name: v3-ads
              containerPort: {{ .Values.envoy.v3ads.port }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # POD_IP is exposed via Downward API so the LeaderLock can publish
            # it as a lease annotation when this pod becomes leader. Followers
            # then read the annotation and use it as the proxy_to_leader
            # endpoint, eliminating most "not the current leader" 503s.
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # ── SSO JIT provisioning allowlist ──────────────────────────────
            # Comma-separated list of email domains. If a user logs in via
            # SSO with an email domain matching, they're provisioned on the
            # fly into the local users table. Empty string = JIT disabled.
            - name: MCP_SSO_AUTO_PROVISION_DOMAINS
              value: {{ .Values.orchestrator.env.ssoAutoProvisionDomains | quote }}
            # ── Public URL ──────────────────────────────────────────────────
            # Used to populate meta.location in SCIM responses and to build
            # SSO redirect URIs. Should match the URL customers/IdPs use to
            # reach this orchestrator externally. Leave empty to use
            # request-relative URLs.
            - name: MCP_API_PUBLIC_URL
              value: {{ .Values.orchestrator.env.apiPublicUrl | quote }}
            - name: MCP_CORS_EXTRA_ORIGINS
              value: {{ .Values.orchestrator.env.corsExtraOrigins | quote }}
            # ── Rating worker cadence ───────────────────────────────────────
            # Interval between rating passes and the settle window (min event
            # age before rating, so ALS true-up has flipped failed calls to
            # 'error' first). The binary defaults to 600s/60s if unset;
            # values.yaml restates them so prod boots with a valid integer.
            - name: MCP_RATING_INTERVAL_SECONDS
              value: {{ .Values.orchestrator.env.ratingIntervalSeconds | quote }}
            - name: MCP_RATING_SETTLE_SECONDS
              value: {{ .Values.orchestrator.env.ratingSettleSeconds | quote }}
            # ── Deploy-time image scanner endpoint ─────────────────────────
            # Resolves to: (1) scanning.scannerUrlOverride (bring-your-own
            # scanner), else (2) the bundled scanner-adapter service (if
            # scanning.enabled), else (3) "" — scanning off; TrivyScanner
            # fail-opens (no scan, deploy proceeds).
            - name: MCP_SCANNER_URL
            {{- if .Values.scanning.scannerUrlOverride }}
              value: {{ .Values.scanning.scannerUrlOverride | quote }}
            {{- else if .Values.scanning.enabled }}
              value: "http://{{ include "mcp.fullname" . }}-scanner-adapter.{{ include "mcp.namespace" . }}.svc.cluster.local/"
            {{- else }}
              value: ""
            {{- end }}
            # ── License file path ──────────────────────────────────────────
            # Path to the license JSON inside the pod. Free tier if missing.
            - name: MCP_LICENSE_FILE
              value: /etc/mcp-license/license.json
            # ── Platform version ───────────────────────────────────────────
            # Sourced from Chart.AppVersion at chart-render time. The
            # orchestrator surfaces this via /api/v1/about (About modal)
            # and the MCP initialize handshake's clientInfo (downstream
            # MCP servers see exactly which orchestrator version probed
            # them). Bumping Chart.yaml's appVersion is the only place
            # the version needs to change at release time — no code edits.
            - name: MCP_VERSION
              value: {{ .Chart.AppVersion | quote }}
            # ── V3 ADS gRPC server (experimental) ──────────────────────────
            # Default disabled. When enabled, starts a parallel xDS gRPC
            # server on a separate port for the new v3 path. See
            # src/gateway/v3/ads_server.cpp for behavior.
            - name: MCP_V3_ADS_ENABLED
              value: {{ .Values.envoy.v3ads.enabled | quote }}
            - name: MCP_V3_ADS_PORT
              value: {{ .Values.envoy.v3ads.port | quote }}
            # ── HealthMonitor poll interval ────────────────────────────────
            # How often the orchestrator polls Kubernetes for pod state and
            # MCP server health. Drives UI responsiveness for state
            # transitions (Deploying → Probing → Running). See values.yaml
            # `orchestrator.healthMonitor.pollIntervalSeconds` for guidance
            # on tuning per cluster size.
            - name: MCP_K8S_POLL_INTERVAL
              value: {{ .Values.orchestrator.healthMonitor.pollIntervalSeconds | default 5 | quote }}
            # ── v1.7 close-out: SchemaGuard schema source ──────────────────
            # SchemaGuard reads this file at orchestrator startup and applies
            # every statement idempotently. This is the upgrade-safe path for
            # schema additions: the same canonical SQL drives both fresh
            # Postgres init (via the postgres-init ConfigMap) AND ongoing
            # orchestrator-driven schema migration (via SchemaGuard).
            #
            # Mounted at /etc/mcp-schema/01-schema.sql (see volumeMounts).
            # Only set when bundled Postgres is enabled — external-Postgres
            # operators manage schema themselves.
            {{- if .Values.postgresql.enabled }}
            - name: MCP_SCHEMA_FILE
              value: "/etc/mcp-schema/01-schema.sql"
            {{- end }}
            # ── Leader election (v1.7+ multi-replica HA) ───────────────────
            # Auto-enabled when replicaCount > 1. The LeaderLock acquires
            # a Kubernetes Lease named "mcp-orchestrator-leader" in the
            # orchestrator's namespace; the holder is the active writer
            # for HealthMonitor mutations, xDS snapshot writes, and
            # registry-table mutations. Followers reject mutations and
            # converge on leader's state via DB polling.
            #
            # Single-replica (replicaCount=1): set to false; LeaderLock
            # is a no-op. Behavior matches v1.6 single-replica mode.
            #
            # Override possible via .Values.orchestrator.env.leaderElectionEnabled
            # (string "true"/"false") if an operator wants to force the
            # setting independent of replicaCount.
            - name: MCP_LEADER_ELECTION_ENABLED
              value: {{ if .Values.orchestrator.env.leaderElectionEnabled }}{{ .Values.orchestrator.env.leaderElectionEnabled | quote }}{{ else if gt (int .Values.orchestrator.replicaCount) 1 }}"true"{{ else }}"false"{{ end }}
            # ── v1.8 NOTIFY-based xDS fanout (experimental) ────────────────
            # When true, the xDS server runs an additional listener thread
            # holding a Postgres LISTEN connection on xds_snapshots_changed.
            # NOTIFY-based fanout achieves sub-100ms latency vs polling's
            # 0-1s. Polling continues to run as fallback.
            #
            # Default: false (v1.7 polling-only behavior). Opt in via
            # .Values.orchestrator.env.useNotifyFanout = "true" once you
            # want to test the v1.8 path. See HA-DEPLOYMENT.md for the
            # operational implications and fallback semantics.
            - name: MCP_USE_NOTIFY_FANOUT
              value: {{ .Values.orchestrator.env.useNotifyFanout | default "false" | quote }}
            # ── Deploy timeout (v1.8) ────────────────────────────────────
            # Max seconds a server can be stuck in "Deploying" before
            # HealthMonitor transitions it to Failed. See values.yaml
            # for tuning guidance. Default 300s (5 min). 0 = disabled.
            - name: MCP_DEPLOY_TIMEOUT_SECONDS
              value: {{ .Values.orchestrator.env.deployTimeoutSeconds | default "300" | quote }}
            # ── 3.1.01: DB hot-path tuning ────────────────────────────────
            # Both of these existed as C++ env reads but were NOT in the
            # chart, so every helm upgrade silently reverted them to their
            # compiled defaults (pool=4, TTL=5) and load-test tuning
            # evaporated on deploy. See orchestrator.env in values.yaml.
            - name: MCP_DB_POOL_SIZE
              value: {{ .Values.orchestrator.env.dbPoolSize | default "8" | quote }}
            - name: MCP_HOT_PATH_CACHE_TTL_SEC
              value: {{ .Values.orchestrator.env.hotPathCacheTtlSeconds | default "5" | quote }}
            # ── 3.1.03: ext_authz queue sizing ───────────────────────────
            # Defaults here MUST match the compiled defaults in
            # ext_authz/auditor.cpp (env_size fallbacks) so an unset value
            # behaves identically whether it comes from the chart or the
            # binary. Out-of-range values warn and fall back; they don't
            # fail startup. See orchestrator.env in values.yaml for sizing.
            - name: MCP_AUDIT_QUEUE_CAPACITY
              value: {{ .Values.orchestrator.env.auditQueueCapacity | default "10000" | quote }}
            - name: MCP_METER_QUEUE_CAPACITY
              value: {{ .Values.orchestrator.env.meterQueueCapacity | default "10000" | quote }}
            - name: MCP_DRAIN_BATCH_MAX
              value: {{ .Values.orchestrator.env.drainBatchMax | default "5000" | quote }}
            # gRPC worker thread cap for the ext_authz Check() pool. Default
            # here is 1024 (the compiled clamp ceiling), NOT the compiled
            # default of 256 — 256 is a documented throughput wall at 9000 rps
            # and there is no reason to ship it. Out-of-range values fall back
            # to 256 with a warning; they do not fail startup.
            - name: MCP_GRPC_MAX_THREADS
              value: {{ .Values.orchestrator.env.grpcMaxThreads | default "1024" | quote }}
            # ALS true-up queue. Its own knob rather than sharing
            # meterQueueCapacity — MeterUpdater sees one entry per request,
            # MeterEmitter one per billable call. Drops here corrupt the bill.
            - name: MCP_ALS_QUEUE_CAPACITY
              value: {{ .Values.orchestrator.env.alsQueueCapacity | default "20000" | quote }}
            # Admission control. Default "0" = OFF, matching the compiled
            # default — this is the one knob where shipping a number would be
            # worse than shipping nothing, because the right value is a
            # property of the operator's hardware and a wrong one rejects good
            # traffic. See values.yaml for how to measure yours.
            - name: MCP_MAX_IN_FLIGHT
              value: {{ .Values.orchestrator.env.maxInFlight | default "0" | quote }}
            # ── 1.9.0: tenant namespace isolation policy toggle ──────────
            # When the orchestrator creates a tenant namespace at runtime
            # (because someone deploys an MCP server into a not-yet-
            # existing namespace), it also applies an mcp-server-isolation
            # NetworkPolicy to that namespace — same shape as the chart's
            # templates/networkpolicy.yaml. Setting this to "false"
            # disables the runtime application, matching how
            # .Values.networkPolicy.enabled disables the chart-side
            # template. Default: respects .Values.networkPolicy.enabled.
            #
            # The two paths (chart at install + orchestrator at runtime)
            # are designed to produce byte-identical NetworkPolicies, so
            # disabling one without the other generally isn't useful;
            # this env var exists to keep the pair in sync via a single
            # values flag.
            - name: MCP_NETWORK_POLICY_ENABLED
              value: {{ .Values.networkPolicy.enabled | default true | quote }}
            # ── Pass 2: inventory admin client wiring ──────────────────────
            # The orchestrator's inventory token mint/list/revoke handlers
            # proxy to mcp-inventory's /inventory/v1/_admin/* endpoints
            # using the bootstrap admin token minted by the post-install
            # Helm hook (templates/inventory-admin-token-hook.yaml).
            #
            # MCP_INVENTORY_URL — in-cluster DNS for the inventory service.
            # Hardcoded to the standard port 8090 (matches inventory-service.yaml
            # template). If you ever need to change the port, update both the
            # service template and this env var together.
            - name: MCP_INVENTORY_URL
              value: "http://{{ include "mcp.fullname" . }}-inventory:8090"
            # MCP_INVENTORY_ADMIN_TOKEN — long-lived JWT (10y TTL, scope
            # inventory:admin) minted by the post-install hook into a
            # Secret. `optional: true` lets the pod start on FIRST install
            # before the hook has run; the orchestrator's
            # InventoryAdminClient handles the empty-token case by
            # returning a clear "not configured" error on mint attempts.
            # After the hook completes, restart the orchestrator pod to
            # pick up the token.
            - name: MCP_INVENTORY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp.fullname" . }}-inventory-admin-token
                  key:  MCP_INVENTORY_ADMIN_TOKEN
                  optional: true
            # Server Editor Assistant — advisory bot needs the Anthropic key to
            # call the Messages API. Same key/secret the chat-daemon uses (see
            # the chat-daemon container below): honors chatDaemon.externalSecretName
            # (prod: pre-existing "chat-daemon-key", key out of Helm history),
            # else the chart-created secret. optional:true so the orchestrator
            # still starts if unset — the endpoint returns "not configured".
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.chatDaemon.externalSecretName }}
                  name: {{ .Values.chatDaemon.externalSecretName }}
                  {{- else }}
                  name: {{ include "mcp.fullname" . }}-chat-daemon
                  {{- end }}
                  key: ANTHROPIC_API_KEY
                  optional: true
            # Advisory assistant provider selection. Default "local" → the
            # bundled Ollama model (no API key, no per-token cost, no data
            # leaves the cluster — the data-residency default). Set to
            # "anthropic" to use the Anthropic API instead (needs the key
            # above). The handler reads ASSISTANT_PROVIDER / OLLAMA_BASE_URL /
            # OLLAMA_MODEL; OLLAMA_BASE_URL points at the bundled Ollama service
            # and is only used on the local path.
            - name: ASSISTANT_PROVIDER
              value: {{ .Values.assistant.provider | quote }}
            {{- if .Values.ollama.enabled }}
            - name: OLLAMA_BASE_URL
              value: "http://{{ include "mcp.fullname" . }}-ollama.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.ollama.service.port | default 11434 }}"
            {{- else if .Values.assistant.ollamaUrl }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.assistant.ollamaUrl | quote }}
            {{- end }}
            - name: OLLAMA_MODEL
              value: {{ .Values.assistant.localModel | quote }}
          envFrom:
            - secretRef:
                name: {{ include "mcp.fullname" . }}-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/mcp
              readOnly: true
            # ── v1.7 close-out: SchemaGuard belt-and-suspenders ──────────
            # Mounts the chart's postgres-init ConfigMap into the orchestrator
            # pod so SchemaGuard::ensure_schema() can read it on every startup.
            # This is the architectural fix for the "Postgres skipped init
            # scripts because PGDATA wasn't empty" class of bug — SchemaGuard's
            # idempotent re-application of the canonical schema closes the
            # upgrade-safety gap.
            #
            # Mounted at /etc/mcp-schema/ (not /etc/mcp/) because /etc/mcp is
            # already a ConfigMap mount and Kubernetes refuses nested-file
            # mounts inside an existing ConfigMap directory mount.
            #
            # SchemaGuard reads MCP_SCHEMA_FILE env var to find the file
            # (set in the env: section above).
            #
            # Only mount if postgresql.enabled — operators using external
            # Postgres are responsible for their own schema management.
            {{- if .Values.postgresql.enabled }}
            - name: schema
              mountPath: /etc/mcp-schema
              readOnly: true
            {{- end }}
            - name: tls
              mountPath: /etc/tls
              readOnly: true
            - name: audit-log
              mountPath: /var/log/mcp
            - name: license
              mountPath: /etc/mcp-license
              readOnly: true
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.httpPort }}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.httpPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

        # ── mcp-sync sidecar ──────────────────────────────────────────────
        - name: mcp-sync
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.mcpSync.image.repository }}:{{ .Values.mcpSync.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.mcpSync.image.pullPolicy }}
          env:
            - name: ORCHESTRATOR_URL
              value: "http://127.0.0.1:{{ .Values.api.httpPort }}"
            - name: WATCH_NAMESPACE
              value: ""
            - name: LEASE_NAMESPACE
              value: {{ include "mcp.namespace" . | quote }}
            - name: LEASE_NAME
              value: "mcp-sync-leader"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mcpSync.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        {{- if .Values.chatDaemon.enabled }}
        # ── chat-daemon sidecar (intelligent Dev Portal agent backend) ─────
        # Claude decides which MCP tool to call; this daemon executes each call
        # AS THE LOGGED-IN USER. Two planes:
        #   • control (login, catalog) → orchestrator REST over in-pod loopback
        #   • data (tool calls /mcp/*) → the v3 Envoy gateway service, so
        #     ext_authz governs every call (no privileged shortcut).
        # The orchestrator reverse-proxies /chat/* to this sidecar on
        # 127.0.0.1:8088. The Anthropic key comes from the daemon's OWN secret,
        # never mcp-...-secrets (trust-boundary separation).
        - name: chat-daemon
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.chatDaemon.image.repository }}:{{ .Values.chatDaemon.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.chatDaemon.image.pullPolicy }}
          ports:
            - name: chat
              containerPort: 8088
          env:
            - name: CHAT_LISTEN_ADDR
              value: {{ .Values.chatDaemon.listenAddr | quote }}
            # CONTROL plane (login, portal catalog) — the orchestrator REST API
            # over in-pod loopback, exactly the hop mcp-sync uses. NOT governed
            # by ext_authz; it's the control/admin API.
            - name: MAG_CONTROL_URL
              value: "http://127.0.0.1:{{ .Values.api.httpPort }}"
            # DATA plane (tool calls /mcp/<ns>/<server>/) — MUST go through the
            # v3 Envoy gateway so the orchestrator's ext_authz fires (RBAC,
            # metering, vendor-cred injection). Pointed at the in-cluster Envoy
            # v3 service on its TLS listener port. The agent has NO privileged
            # shortcut around enforcement — its calls traverse the same path as
            # any external client.
            - name: MAG_GATEWAY_URL
              value: "https://{{ include "mcp.fullname" . }}-envoy-v3.{{ include "mcp.namespace" . }}.svc.cluster.local:{{ .Values.envoy.v3.listenerPort }}"
            - name: ANTHROPIC_MODEL
              value: {{ .Values.chatDaemon.anthropicModel | quote }}
            # Gateway TLS is the self-signed cluster cert; skip-verify unless a
            # real cert is in place (controls the Envoy hop; control plane is
            # plain HTTP loopback).
            - name: MAG_VERIFY_TLS
              value: {{ ternary "1" "0" .Values.chatDaemon.verifyTls | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.chatDaemon.externalSecretName }}
                  name: {{ .Values.chatDaemon.externalSecretName }}
                  {{- else }}
                  name: {{ include "mcp.fullname" . }}-chat-daemon
                  {{- end }}
                  key: ANTHROPIC_API_KEY
                  optional: true
          # Probes run the daemon binary's own --health-check, which dials
          # 127.0.0.1/chat/health from INSIDE the container. The daemon binds
          # loopback only, so a kubelet httpGet (which targets the pod IP) can't
          # reach it; and the distroless image has no shell/curl for an exec
          # shell-out — so the check lives in the binary itself.
          livenessProbe:
            exec:
              command: ["/usr/local/bin/mcp-chat-daemon", "--health-check"]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["/usr/local/bin/mcp-chat-daemon", "--health-check"]
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            {{- toYaml .Values.chatDaemon.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "mcp.fullname" . }}-config
        # ── v1.7 close-out: SchemaGuard schema source ──────────────────
        # Reuses the postgres-init ConfigMap (which already has the
        # canonical schema for first-install Postgres bootstrap). Mounting
        # the same ConfigMap here ensures schema-as-code: a single source
        # of truth for both fresh-install (Postgres init scripts) and
        # ongoing-upgrade (SchemaGuard re-application) paths.
        {{- if .Values.postgresql.enabled }}
        - name: schema
          configMap:
            name: {{ include "mcp.fullname" . }}-postgres-init
            items:
              - key: 01-schema.sql
                path: 01-schema.sql
        {{- end }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.orchestratorSecretName }}
        - name: audit-log
          emptyDir: {}
        # License volume — always mounted, orchestrator handles missing
        # license file gracefully by falling back to Free tier. The Secret
        # is either created by the chart (via license.yaml when license.file
        # is set at install time) OR pre-created by the customer via kubectl.
        # optional: true means the pod starts even if the Secret doesn't
        # exist yet — allows upgrading from Free to Enterprise without
        # reinstall by just creating the Secret and restarting.
        - name: license
          secret:
            secretName: {{ .Values.license.secretName }}
            optional: true
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "mcp.selectorLabels" . | nindent 14 }}
