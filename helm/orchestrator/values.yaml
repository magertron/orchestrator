# ─── MCP Orchestrator Helm Values ─────────────────────────────────────────────

# Global settings
global:
  imageRegistry: docker.io

# ─── Orchestrator ─────────────────────────────────────────────────────────────
orchestrator:
  # v1.6: Single replica only.
  #
  # The orchestrator is HA-shaped at the infrastructure layer (headless
  # service for xDS, stateless image, Postgres of record, mcp-sync sidecar
  # uses Lease-based leader election), but multi-replica orchestrator
  # coordination — leader-elected HealthMonitor, single-writer xDS push,
  # cross-pod registry sync — is v1.7+ work. Running >1 replica today
  # produces state-machine flapping, divergent xDS pushes, and
  # ghost-server reconcile loops (verified empirically).
  #
  # Will move to 2+ once v1.7 leader election ships.
  replicaCount: 1
  image:
    repository: curtismager20/mcp-orchestrator
    tag: v1
    pullPolicy: Always

  # Port for the ext_authz gRPC Policy Decision Point.
  # Envoy's ext_authz HTTP filter on :10093 calls Check() on this port.
  # Do not change unless you also update the envoy-bootstrap ConfigMap's
  # grpc_service.envoy_grpc.cluster_name endpoint — they must agree.
  extAuthzPort: 9092
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # ── Health monitoring ─────────────────────────────────────────────────────
  # How often the orchestrator polls Kubernetes for pod state changes and
  # MCP server health. This drives how quickly the UI sees state transitions
  # (Deploying → Probing → Running, or Probing → ProbeFailed). Lower values
  # = snappier feedback but more API server load.
  #
  #   5s  — recommended for development and clusters with under ~100 servers
  #   15s — balanced for clusters with 100-500 servers
  #   30s — recommended for clusters with 500+ servers (reduces api-server load)
  healthMonitor:
    pollIntervalSeconds: 5

  # Environment variables that configure SSO JIT and SCIM meta.location.
  # Empty strings disable the respective feature (safe defaults).
  env:
    # Comma-separated allowlist of email domains for JIT provisioning via
    # SSO login. A user logging in via SSO whose email domain is in this
    # list gets auto-provisioned as a local user with role 'system:viewer'.
    # Example: "example.com,partner.com"
    # Empty string = SSO JIT disabled; users must be created manually.
    ssoAutoProvisionDomains: ""

    # Public HTTPS URL where external systems (IdPs, SCIM clients,
    # browsers) reach this orchestrator. Used to construct:
    #   - SCIM meta.location URLs in response bodies
    #   - OIDC redirect_uri when building provider login URLs
    # Example: "https://mcp.example.com"
    # Empty string = orchestrator uses request-relative URLs.
    apiPublicUrl: ""

# ─── MCP Sync Sidecar ────────────────────────────────────────────────────────
mcpSync:
  image:
    repository: curtismager20/mcp-sync
    tag: v1
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ─── Envoy Gateway ───────────────────────────────────────────────────────────
envoy:
  enabled: true
  # v1.6: Single replica until orchestrator's xDS push is single-writer.
  # See the same note under orchestrator.replicaCount above. The HPA below
  # is capped at 1 in v1.6 for the same reason — Envoy fanout is fine at 1
  # but produces flapping config at >1 with current orchestrator architecture.
  replicaCount: 1
  image:
    repository: envoyproxy/envoy
    tag: v1.28-latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Service ports — these are the PORT numbers exposed on the Envoy
  # Service resource. The Service TYPE is determined by loadBalancer.provider
  # (below), not here. For NodePort mode, also see loadBalancer.nodeport.
  service:
    httpPort: 80
    httpsPort: 443
    # ext_authz-enforced MCP listener (see helm-envoy-service.yaml).
    # Default 93 avoids the 80/443 well-known ports. Override only if
    # it conflicts with your environment.
    httpAuthzPort: 93
  autoscaling:
    enabled: true
    # v1.6: Capped at 1. Bump alongside orchestrator.replicaCount when
    # leader-elected xDS push lands in v1.7.
    minReplicas: 1
    maxReplicas: 1
    targetCPU: 70
    targetMemory: 80
  xds:
    listenAddress: "0.0.0.0"
    port: 18000
    nodeId: mcp-gateway
    clusterName: mcp-gateway-cluster

# ─── Load Balancer ────────────────────────────────────────────────────────────
# Controls how the Envoy gateway is exposed outside the cluster.
#
# provider options:
#   cloud     — AWS ELB / GCP LB / Azure LB (default for cloud deployments)
#               No extra config needed — your cloud controller handles it.
#
#   metallb   — Bare-metal / private DC / kind dev clusters.
#               Installs MetalLB and assigns IPs from the given pool.
#               Use create-cluster.sh for dev — it handles this automatically.
#
#   nodeport  — Expose via NodePort only. No external IP assigned.
#               Access via <node-ip>:<nodePort>. Useful for air-gapped clusters
#               or when an upstream hardware LB handles external routing.
#
#   existing  — You already have an Ingress controller or LB in the cluster
#               (nginx-ingress, Traefik, F5 CIS, etc). MCP will create the
#               Service but NOT install any LB controller. Set annotations
#               below to integrate with your existing infrastructure.
#
loadBalancer:
  provider: cloud       # cloud | metallb | nodeport | existing

  # ── MetalLB (provider: metallb) ───────────────────────────────────────────
  metallb:
    install: true                                   # set false if already installed
    version: v0.14.5
    ipRange: "172.18.0.200-172.18.0.250"            # adjust to your network
    # bgp: false                                    # set true for BGP mode (advanced)

  # ── NodePort (provider: nodeport) ─────────────────────────────────────────
  nodeport:
    httpPort: 30080      # customize to avoid conflicts
    httpsPort: 30443
    httpAuthzPort: 30093 # ext_authz-enforced MCP listener

  # ── Existing LB / Ingress (provider: existing) ────────────────────────────
  existing:
    # Annotations added to the Envoy Service — use to integrate with your LB.
    # Examples:
    #   AWS NLB:      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    #   F5 BIG-IP:    cis.f5.com/ip-type: "cluster"
    #   MetalLB pool: metallb.universe.tf/address-pool: "production-pool"
    serviceAnnotations: {}
    #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

    # Optional: pre-assigned static IP for the LoadBalancer service
    loadBalancerIP: ""

    # Optional: create an Ingress resource instead of relying on LoadBalancer
    ingress:
      enabled: false
      className: nginx          # nginx | traefik | haproxy | istio | etc.
      host: mcp.example.com
      tls: true
      tlsSecretName: mcp-envoy-tls

# ─── PostgreSQL ──────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 5Gi
    # storageClassName: longhorn    # Set for your environment
  database: mcp_platform
  username: mcp
  # Password is read from the secret (key: MCP_DB_PASSWORD)

# ─── API Configuration ──────────────────────────────────────────────────────
api:
  httpPort: 8080
  grpcPort: 9090
  requestTimeout: 30

# ─── JWT Configuration ──────────────────────────────────────────────────────
jwt:
  issuer: "https://auth.acme.internal"
  audience: "mcp-orchestrator"
  clockSkew: 30
  tokenTTL: 3600

# ─── Observability ───────────────────────────────────────────────────────────
observability:
  logLevel: info
  logFormat: json
  metricsPort: 9091
  auditLogPath: /var/log/mcp/audit.log

# ─── Namespaces ──────────────────────────────────────────────────────────────
# Additional namespaces to create for MCP server deployments
namespaces:
  - mcp-prod
  - mcp-staging
  - mcp-dev

# ─── Network Policy ─────────────────────────────────────────────────────────
networkPolicy:
  enabled: true

# ─── Secrets ─────────────────────────────────────────────────────────────────
# If createSecrets is true, the chart creates a Secret from these values.
# For production, set createSecrets=false and create the Secret externally.
secrets:
  create: true
  dbPassword: changeme
  # JWT keys — PEM-encoded RSA private and public keys.
  #
  # Leave both empty to have the chart auto-generate a private key at install
  # time. The orchestrator will derive the public key from it at startup.
  # This is the Free-tier / evaluation path.
  #
  # For production (Pro / Enterprise), generate and pass both explicitly so
  # keys survive reinstalls and can be rotated on your schedule:
  #   openssl genpkey -algorithm RSA -out jwt.key -pkeyopt rsa_keygen_bits:2048
  #   openssl rsa -in jwt.key -pubout -out jwt.pub
  #   helm install ... --set-file secrets.jwtPrivateKey=jwt.key \
  #                    --set-file secrets.jwtPublicKey=jwt.pub
  jwtPrivateKey: ""   # PEM-encoded RSA private key (leave empty for auto-gen)
  jwtPublicKey: ""    # PEM-encoded RSA public key (derived from private if empty)

# ─── License ─────────────────────────────────────────────────────────────────
# License file for Enterprise tier features (SSO, SCIM, custom RBAC,
# governance policies). Free tier does not require a license.
#
# Two ways to apply a license:
#
# 1. At install time:
#    helm install mcp ./chart ... --set-file license.file=license.json
#    (Chart creates the Secret.)
#
# 2. Pre-created externally:
#    kubectl create secret generic mcp-license \
#      --from-file=license.json=license.json -n mcp-system
#    (Chart skips Secret creation; the orchestrator mounts the existing one.)
#
# In either case, the orchestrator reads /etc/mcp-license/license.json at
# startup. Missing file = Free tier.
license:
  # Set at install time via --set-file to make the chart create the Secret.
  # Must be empty in the default values — don't commit license content here.
  file: ""

  # Name of the Secret that contains the license. Both modes above use this
  # same name. Override only if you already have a Secret named differently.
  secretName: mcp-license

# ─── TLS ─────────────────────────────────────────────────────────────────────
tls:
  create: true
  # If you provide cert/key, they'll be used. Otherwise auto-generated.
  cert: ""
  key: ""
  orchestratorSecretName: mcp-orchestrator-tls
  envoySecretName: mcp-envoy-tls

# ─── Seed Data ───────────────────────────────────────────────────────────────
seed:
  # Default admin user (password: admin — CHANGE IN PRODUCTION)
  adminPassword: admin
  adminPasswordHash: "$2a$12$0OAq9ZVN96/RLKJngYzLIed1TekrTKUbdKjSDfdYCSmsTNrea7VaG"
