# ─── MCP Orchestrator Helm Values ─────────────────────────────────────────────

# Global settings
global:
  imageRegistry: docker.io

# ─── Orchestrator ─────────────────────────────────────────────────────────────
orchestrator:
  # ── Multi-replica HA (shipped in v1.13.0-dev) ─────────────────────────────
  # Default 2 replicas. The orchestrator runs Lease-based leader election
  # for the singleton work (HealthMonitor polling, xDS push to Envoy,
  # deploy state-machine ticks) while every replica serves the read-heavy
  # ext_authz Check() hot path in parallel. Verified empirically:
  # 2-replica configuration sustains ~3000 rps end-to-end with 100%
  # success vs ~1500 rps for a single replica — near-linear scaling.
  #
  # Bumping to 3+ replicas continues to scale Check() throughput; the
  # singleton work stays on whichever replica holds the Lease so
  # additional replicas are pure capacity (no fanout overhead).
  #
  # Set to 1 only for resource-constrained dev clusters or if you want
  # to verify single-replica behavior. Production should run 2 or more.
  replicaCount: 2

  # Control-plane placement. The orchestrator is part of the CONTROL PLANE and
  # pins to the control-plane node, co-located with its postgres. The
  # node-role.kubernetes.io/control-plane label is applied automatically by
  # k3s/kubeadm to the master, so this works on any cluster with no manual
  # labeling. HA is provided by the DATA PLANE — deployed MCP servers scaling
  # across worker nodes — NOT by spreading the orchestrator. Both replicas land
  # on the control-plane node: leader election + parallel Check() still work;
  # node-failure HA is intentionally traded away (if the control-plane node is
  # down, postgres is too, so the plane is down regardless).
  #
  # NOTE: assumes the control-plane node is schedulable (k3s default — no
  # NoSchedule taint). On a tainted control plane, add a matching toleration.
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"

  image:
    repository: curtismager20/mcp-orchestrator
    # Image tag. Empty string ("") = use .Chart.AppVersion (recommended).
    # Pin to a specific tag (e.g. "1.8.2-dev", "v1") only when overriding
    # the chart-version-implied default — for example, to roll back to a
    # known-good image while staying on the current chart, or to test a
    # pre-release image without bumping the chart.
    tag: ""
    # IfNotPresent is correct once tags are versioned (every release tag
    # is immutable, so re-pulling on every restart is wasted work).
    # Use Always only with mutable tags like :latest or :v1.
    pullPolicy: IfNotPresent

  # Port for the ext_authz gRPC Policy Decision Point.
  # Envoy's ext_authz HTTP filter on :10093 calls Check() on this port.
  # Do not change unless you also update the envoy-bootstrap ConfigMap's
  # grpc_service.envoy_grpc.cluster_name endpoint — they must agree.
  extAuthzPort: 9092

  # Session 2.13, Step 6b-i / 6e: parallel ext_authz port for External
  # (vendor-hosted) MCP server proxy traffic. The orchestrator binary
  # serves a SEPARATE gRPC server on this port for routes that target
  # External servers — completely isolated code path from extAuthzPort
  # above. See ext_authz/external_server.cpp and the
  # mcp_ext_authz_external cluster in envoy-v3-bootstrap.yaml.
  #
  # The Service template (services.yaml) exposes this port on both the
  # main ClusterIP and headless services. Envoy v3 references it via
  # the mcp_ext_authz_external upstream cluster; per-route ext_authz
  # overrides (Step 6d) bind External-path routes to that cluster.
  #
  # Internal/Hybrid traffic continues to use extAuthzPort (9092)
  # unchanged. Both ports must agree between this value and the
  # bootstrap ConfigMap.
  extAuthzExternalPort: 9093

  # Brick 3 (ALS cost-meter true-up): port the orchestrator's ALS sink binds.
  # Envoy's mcp_https_listener_v3 streams access logs to the als_sink cluster
  # at this port (over the headless service, like extAuthzPort). Must agree
  # between this value and the bootstrap ConfigMap's als_sink cluster.
  alsPort: 9094
  # ── Diagnostics (DIAGNOSTIC ONLY — leave off in production) ─────────────────
  debug:
    # Add CAP_SYS_PTRACE to the orchestrator container so gdb can attach to
    # PID 1 from inside the pod. Off by default and it belongs off: a process
    # with SYS_PTRACE can read and write the memory of anything in the same PID
    # namespace, which is precisely the isolation the container is supposed to
    # provide.
    #
    # Only useful alongside an image built with MCP_DEBUG_BUILD=1
    # (MCP_DEBUG_BUILD=1 ./bootstrap.sh ...), which adds gdb and debug symbols.
    # The capability without the image gets you nothing; the image without the
    # capability gets you "Operation not permitted".
    #
    # Why it exists: the shipping image has no profiler, so every performance
    # question gets answered by turning a knob and watching a number — which
    # finds correlations, not causes. When threads are waiting while CPU sits
    # idle, the only thing that answers "waiting on WHAT" is a stack dump.
    ptrace: false

  # ── Resources ──────────────────────────────────────────────────────────────
  # ── 3.1.01: limits.cpu raised 1 → 8 ────────────────────────────────────────
  # This single line was the product's throughput ceiling. At limits.cpu: 1 the
  # orchestrator is throttled to ONE core regardless of node size (foxygirl has
  # 12). ext_authz Check() runs on gRPC worker threads (MCP_GRPC_MAX_THREADS,
  # default 256) — hundreds of threads sharing one core's CFS quota. Once the
  # quota is exhausted each 100ms period, EVERY thread freezes until the next.
  #
  # Symptoms this produced (2026-07-14/15 load testing), all of which read as
  # application bugs and are not:
  #   - `kubectl top` showing ~27m CPU — "nothing is busy". Throttled, not idle.
  #     top cannot distinguish the two; /sys/fs/cgroup/cpu.stat (nr_throttled,
  #     throttled_usec) can.
  #   - Every Check() phase "slow but trivial" — e.g. reglist=58ms to copy 14
  #     structs. Threads descheduled mid-function, not doing slow work.
  #   - A hard CLIFF at 1750 rps rather than a slope — quota exhaustion is binary.
  #   - Everything piling on exactly 2.000s = Envoy's ext_authz timeout, reached
  #     by accumulated throttle stalls.
  #   - Raising MCP_GRPC_MAX_THREADS 256→1024 barely helped (45%→61%): more
  #     threads on one core is worse thrashing, not more capacity.
  #     ⚠️ THAT CONCLUSION DID NOT SURVIVE THE FIX. It was measured UNDER the
  #     1-core cap, where it is trivially true — no thread count helps when
  #     there is no CPU to run on. Re-tested 2026-07-16 at 8 cores: the same
  #     256→1024 change took 9000 rps from 77.4% to 100% and p99 from 888ms
  #     to 83ms. See orchestrator.env.grpcMaxThreads below. A finding from a
  #     broken environment is a finding ABOUT the broken environment; re-test
  #     every conclusion drawn before the constraint was removed.
  #
  # Little's Law: 1750 rps x ~1ms real CPU per Check = 1.75 cores MINIMUM. The
  # budget was 1. No amount of code optimization could have fixed it.
  #
  # Measured after raising to 8, single pod: 1500 rps -> 3500 rps at 100%
  # (p99 524ms), drawing ~6.4 cores at the ceiling. 4000 rps is congestion
  # collapse. A second replica adds HA, not throughput — the node runs out
  # first (2 pods drew 8509m of 12 cores at 4000 rps, with postgres at 77m).
  #
  # SIZING: limits is a CEILING, not a reservation — 8 costs nothing when idle.
  # Size the control-plane NODE for the target rate, not this number. Do not
  # raise requests to match: requests are what the scheduler reserves, and
  # requests.cpu=2 x 2 replicas leaves pods Pending on a 12-core node that also
  # hosts postgres.
  # ⚠️ MEMORY IS COUPLED TO orchestrator.env.grpcMaxThreads. RAISE BOTH OR
  #    NEITHER. (2026-07-17 — found the hard way.)
  #
  # Each gRPC worker thread reserves ~8MB of stack. Reservation is lazy, so a
  # high thread cap looks free at idle and in `kubectl top` — 170Mi with 2048
  # threads configured. Under sustained load the threads touch their stacks,
  # the reservation becomes resident, and the pod is OOMKilled (exit 137).
  #
  # The failure does NOT look like an OOM. It looks like a latency tail:
  #   - pod dies, taking every Envoy→PDP connection with it
  #   - Envoy reconnects; reconnects cost up to 1.8s (measured
  #     upstream_cx_connect_ms P99 = 1864ms against a 2s ext_authz deadline)
  #   - every request in that window blows the deadline and 503s
  #   - the pod comes back in seconds and the next 10k requests are fine
  # Measured at 2Gi/2048: upstream_cx_total 9,208 and connect_fail 9,136 for a
  # cluster that should hold ~6 connections. At 8Gi/2048: 40 and 0.
  #
  # Worse, it corrupts the thread-cap tuning itself. A ladder of 1024 → 2048 →
  # 4096 read as 94.4% → 98.1% → 98.8% success, which looks like "more threads
  # help." It was really measuring how quickly each config reached the memory
  # cliff. Every number in that ladder is void.
  #
  # Rule of thumb: memory limit >= grpcMaxThreads x 8MB x 2 (two gRPC servers,
  # internal 9092 + external 9093), plus ~1Gi for the process. 2048 threads →
  # 8Gi. If you lower grpcMaxThreads you may lower this; if you raise it you
  # MUST raise this first.
  #
  # SIZING: limits is a CEILING, not a reservation — 8Gi costs nothing when the
  # threads are idle. Size the control-plane NODE for the target rate. Do not
  # raise requests to match: requests are what the scheduler reserves, and
  # requests.memory=8Gi x 2 replicas leaves pods Pending on a modest node.
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "8"
      memory: 8Gi

  # ── Health monitoring ─────────────────────────────────────────────────────
  # How often the orchestrator polls Kubernetes for pod state changes and
  # MCP server health. This drives how quickly the UI sees state transitions
  # (Deploying → Probing → Running, or Probing → ProbeFailed). Lower values
  # = snappier feedback but more API server load.
  #
  #   5s  — recommended for development and clusters with under ~100 servers
  #   15s — balanced for clusters with 100-500 servers
  #   30s — recommended for clusters with 500+ servers (reduces api-server load)
  healthMonitor:
    pollIntervalSeconds: 5

  # Environment variables that configure SSO JIT and SCIM meta.location.
  # Empty strings disable the respective feature (safe defaults).
  env:
    # Comma-separated allowlist of email domains for JIT provisioning via
    # SSO login. A user logging in via SSO whose email domain is in this
    # list gets auto-provisioned as a local user with role 'system:viewer'.
    # Example: "example.com,partner.com"
    # Empty string = SSO JIT disabled; users must be created manually.
    ssoAutoProvisionDomains: ""

    # Public HTTPS URL where external systems (IdPs, SCIM clients,
    # browsers) reach this orchestrator. Used to construct:
    #   - SCIM meta.location URLs in response bodies
    #   - OIDC redirect_uri when building provider login URLs
    # Example: "https://mcp.example.com"
    # Empty string = orchestrator uses request-relative URLs.
    apiPublicUrl: "http://localhost:8080"   # dev: browser hits localhost via kubectl port-forward to the leader pod

    # ── CORS allowed origins ─────────────────────────────────────────────
    # The browser blocks cross-origin requests unless the server echoes the
    # caller's Origin back in Access-Control-Allow-Origin. The orchestrator
    # ALWAYS allows the apiPublicUrl origin above (the deployment's own
    # front door). List any ADDITIONAL origins that should be permitted here
    # — e.g. the Tauri desktop client's origin, or a customer's internal
    # tool calling the API cross-origin. Comma-separated, exact origin match
    # (scheme://host[:port], no trailing slash/path).
    #   Tauri desktop client origins vary by OS/version — capture the real
    #   Origin header from a built app before adding (e.g. "tauri://localhost").
    # Empty = only apiPublicUrl's origin is allowed.
    corsExtraOrigins: ""

    # ── Rating worker cadence ────────────────────────────────────────────
    # How often the leader rates the current period's settled meter_events
    # into ESTIMATED rated_costs, and the minimum event age before rating
    # (gives Brick 3's ALS true-up time to flip failed calls to 'error'
    # before they're rated). These restate the binary's built-in defaults so
    # prod boots with a valid integer rather than rendering "" (which the
    # orchestrator tolerates by falling back, but logs a warning).
    # A short dev interval removes the ~10-minute wait that makes a rating
    # test impractical:
    #   --set orchestrator.env.ratingIntervalSeconds=5
    ratingIntervalSeconds: 600    # rate every 10 min   (must be > 0)
    ratingSettleSeconds: 60       # only rate events >60s old   (>= 0)

    # ── Leader election (v1.7 multi-replica HA) ──────────────────────────
    # Override the auto-derived setting. By default, the chart enables
    # leader election when orchestrator.replicaCount > 1 and disables it
    # otherwise. Set this to "true" or "false" to force a specific value
    # regardless of replica count — useful for testing single-replica
    # behavior with leader election machinery active, or vice versa.
    #
    # Empty string ("") means "auto" — derive from replicaCount.
    leaderElectionEnabled: ""

    # ── NOTIFY-based xDS fanout (shipped in v1.13.0-dev) ─────────────────
    # When "true", followers run a Postgres LISTEN thread that wakes
    # immediately on leader-issued NOTIFY events instead of waiting for
    # the next 1s polling cycle. Achieves sub-100ms config propagation
    # vs polling's 0-1s typical. Polling continues to run as fallback,
    # so disabling NOTIFY (or NOTIFY connection failures) degrade
    # cleanly to the polling-only behavior.
    #
    # Default: "true" (verified under sustained 3000 rps load with
    # 2 orchestrator + 2 envoy replicas). Set to "false" if you need
    # to fall back to the polling-only path for diagnostic reasons.
    useNotifyFanout: "true"

    # ── Deploy timeout (v1.8) ────────────────────────────────────────────
    # Maximum time (seconds) a server can stay in "Deploying" state before
    # HealthMonitor transitions it to Failed. This catches misconfigured
    # deployments — wrong image, wrong port, container crashloops — that
    # would otherwise sit in Deploying indefinitely waiting for k8s to
    # produce a ready pod that's never coming.
    #
    # Default: 300s (5 min). Long enough that legitimate slow deploys
    # (image pulls on slow registries, slow container init) complete
    # naturally. Short enough that operators aren't left wondering why
    # their broken deploy is still "in progress" 30 minutes later.
    #
    # Tuning guidance:
    #   - Fast local clusters with cached images: "60" - "120"
    #   - Default mixed environments: "300"  (recommended)
    #   - Slow corporate networks / large images: "600"
    #   - "0" disables the timeout (Deploying never auto-fails)
    #
    # The orchestrator reads this as MCP_DEPLOY_TIMEOUT_SECONDS at startup.
    deployTimeoutSeconds: "60"

    # ── 3.1.01: DB connection pool size (MCP_DB_POOL_SIZE) ────────────────
    # Size of DbClient's hot-path connection pool — the pool ext_authz
    # Check() and the registry sync use, isolated from cold-path admin CRUD
    # (conn_mutex_) and the audit drain (audit_conn_mutex_).
    #
    # Was NOT chart-configurable before 3.1.01; the C++ default is 4, so
    # every deploy silently reverted hand-tuned values. Raising 4 → 8 halved
    # p99 at 1500 rps (677ms → 351ms) in 2026-07-14 testing.
    #
    # CEILING: postgres max_connections is 100 with ~63 consumed at idle.
    # 16 detonated the DB (2 replicas x 16 + 63 ≈ 99). Do not exceed 8 per
    # replica without first raising max_connections AND trimming the Splunk
    # DB Connect JDBC pool (16 connections for a probe cadence that needs ~4).
    dbPoolSize: "8"

    # ── 3.1.01: hot-path read cache TTL (MCP_HOT_PATH_CACHE_TTL_SEC) ──────
    # TTL for DbClient's per-namespace server/permission/governance read
    # caches. On expiry one thread loads while others wait on the
    # thundering-herd guard (servers_cache_cv_).
    #
    # Was NOT chart-configurable before 3.1.01; the C++ default is 5.
    #
    # NOTE: 60 was set during load testing on the hypothesis that the 5s
    # sawtooth was the throughput wall. It was NOT — raising it 5 → 60 made
    # no difference (2000 rps: 59% → 51%, i.e. noise). The real cause was the
    # per-request DB call in Check() (fixed in 3.1.01 by carrying the UUID on
    # the registry entry) and the orchestrator's 1-core CPU limit.
    #
    # 60 is kept because cross-replica staleness of the server registry is
    # bounded by sync_registry_from_db() anyway, and fewer cache loads is
    # strictly less DB work. Lower it if you need faster cross-replica
    # visibility of server CRUD.
    hotPathCacheTtlSeconds: "60"

    # ── 3.1.03: ext_authz pipeline sizing ────────────────────────────────
    # (MCP_AUDIT_QUEUE_CAPACITY / MCP_METER_QUEUE_CAPACITY / MCP_DRAIN_BATCH_MAX)
    #
    # TOTAL events buffered per emitter, split evenly between the emit-side
    # queue and the drain-side overflow stash (capacity/2 each). Set 10000 and
    # you get 10000 in flight — not 20000.
    #
    # WHY THIS IS NOW CONFIGURABLE (2026-07-15): the drain-side stash was
    # UNBOUNDED and the emit-side capacity guard was unreachable (the drain
    # swaps the queue empty every cycle, so `size() >= capacity` never fired).
    # The orchestrator leaked 720Mi -> 1523Mi under load with zero drop
    # warnings, degrading a fixed 5000 rps from 100% -> 93% -> 83% across
    # successive runs. Both containers are bounded now; these knobs let you
    # size the result without a rebuild.
    #
    # SIZING: the old code comment claimed "10000 ≈ 30s of buffering at 300
    # rps". The measured clean ceiling is 8000 rps, where 10000 is ~1.2s.
    # There are FOUR emitters (Auditor + MeterEmitter on the internal 9092
    # server, and again on the external 9093 server), so the process-wide
    # budget is ~4x these values. Size against limits.memory (2Gi above), not
    # against one instance.
    #
    # At 9000 rps the METER queue saturates first and drops billing rows
    # ("BILLING DATA LOST" in the log). Watch ext_authz.meter.dropped_total.
    auditQueueCapacity: "10000"
    meterQueueCapacity: "10000"

    # Rows per multi-row INSERT per drain cycle. The cost is the round trip,
    # not the row count, so raise THIS before raising the queues above — a
    # bigger queue just delays the drop, a faster drain prevents it. Was
    # hardcoded at 100, which capped the drain near ~200 events/sec.
    #
    # MEASURED (2026-07-15, 9000 rps sustained):
    #   1000 -> 46.9% success, 3960 rps delivered, 92,301 meter events dropped
    #   5000 -> 56.6% success, 4785 rps delivered, ZERO drops
    # 5000 eliminates billing-data loss entirely at 9000 rps. The residual 403s
    # at that rate are the ext_authz 2s deadline firing from elsewhere in the
    # Check path — NOT the queue pipeline, which now keeps up.
    #
    # Below 8000 rps this makes no observable difference; 8000 is 100% clean at
    # p99 ~8ms either way. Raise only if dropped_total is non-zero.
    drainBatchMax: "5000"

    # ── 3.1.x: gRPC worker thread cap (MCP_GRPC_MAX_THREADS) ─────────────
    # The ext_authz gRPC server runs Check() on a sync thread pool bounded by
    # a grpc::ResourceQuota. Compiled default 256, clamped to [16, 1024].
    #
    # WHY THIS IS THE CEILING: concurrency = rps x Check latency (Little's
    # Law). At 9000 rps with Check at ~5ms that is ~45 threads — fine. But the
    # relationship is circular: when the pool saturates, calls QUEUE, latency
    # climbs, and the required concurrency climbs with it. Measured at 256 on
    # 2026-07-16: p99 888ms → ~8000 concurrent needed → the quota rejected
    # 6,557 of 25,080 Checks.
    #
    # HOW IT FAILS — this is the part worth knowing. A ResourceQuota rejection
    # is NOT a timeout and NOT an error the orchestrator logs. Envoy sees:
    #   upstream_rq_200: 25080     (transport fine, every call answered)
    #   upstream_rq_timeout: 0     (nothing was slow enough to time out)
    #   ext_authz.error: 6557      (...yet a quarter of Checks "errored")
    # while the orchestrator logs NOTHING — the rejection happens below Check,
    # so no handler ever runs to log it. CPU sat at 5473m of an 8000m cap with
    # ~5 idle cores per pod. Every signal said "not busy, not slow, failing".
    #
    # Range is [16, 8192] (raised from a compiled ceiling of 1024 on
    # 2026-07-16 — an arbitrary limit on an operator knob is just a wall that
    # needs a rebuild to move). An out-of-range value silently falls back to
    # the compiled default of 256, which is a documented throughput wall — so
    # a typo here is worse than no value at all.
    #
    # ⚠️ MORE THREADS IS PROBABLY NOT YOUR FIX. Measured 2026-07-16 where
    # success collapses: CPU ~5473m of an 8000m cap (≈5 IDLE cores per pod),
    # the pool oscillating 538 → 1152 → 860 → 1098 (hundreds of threads
    # created and reaped every second), and lowering the cap to 512 made it
    # WORSE, not better. Idle CPU + a growing pool + queued work means threads
    # are WAITING, not working — they pile up because Check blocks on
    # something, and gRPC answers a slow handler by spawning another one.
    # Raising this gives you more threads blocked on the same lock, plus ~8MB
    # of stack reserved each. Get a stack dump first (build with
    # --build-arg MCP_DEBUG_BUILD=1 for gdb + symbols).
    #
    # ⚠️ RAISING THIS REQUIRES RAISING orchestrator.resources.limits.memory.
    # Each thread reserves ~8MB of stack, lazily — so a high cap looks free
    # until sustained load makes it resident and the pod is OOMKilled. See the
    # long note above the resources block. 2048 threads needs 8Gi.
    #
    # ⚠️ THE NUMBERS BELOW WERE MEASURED ON A POD THAT WAS OOMING. Do not trust
    # them. A ladder of 1024 → 2048 → 4096 read as 94.4% → 98.1% → 98.8%
    # success at 7000 rps, which looks like a clean case for more threads. It
    # was measuring how fast each config hit the 2Gi memory cliff and dropped
    # its connections. After raising memory to 8Gi, 2048 measured 98.48% —
    # statistically identical to what it scored at 2Gi. The thread ladder moved
    # nothing that survived the fix.
    #
    # What DID matter, found the same day and only by reading Envoy's stats:
    # the CDS clusters Magertron generates carried Envoy's DEFAULT circuit
    # breakers (1024 max_requests / 1024 max_pending_requests) because
    # cluster_builder.cpp never set them. Every request past that was shed with
    # a 503 by the DATA PLANE, while the PDP answered in 1ms. Two days of
    # tuning this process could not have touched it.
    #
    # Historical, 9000 rps, 2 pods @ 8 cores (pre-sharding, pre-OOM-fix — kept
    # because 256 really is too low, not because 1024 is proven right):
    #   256  → 77.4% success, p99 888ms, 61,074 x 503
    #   1024 → 100%  success, p99  83ms, zero failures
    grpcMaxThreads: "2048"

    # ── ALS true-up queue capacity (MCP_ALS_QUEUE_CAPACITY) ──────────────
    # The v3 ALS sink's MeterUpdater queue. Separate from meterQueueCapacity
    # on purpose: MeterEmitter takes one entry per BILLABLE call, MeterUpdater
    # takes one per REQUEST (every access-log entry Envoy streams). At 9000 rps
    # this is the highest-volume queue in the process, so it sizes differently.
    #
    # What overflow costs here: a dropped outcome means a failed upstream call
    # keeps the provisional 'success' its meter row was written with — the bill
    # overstates what worked. Billing integrity, not a metrics gap.
    #
    # ⚠️ Units differ from auditQueueCapacity/meterQueueCapacity. Those are a
    # TOTAL split capacity/2 across two deques. This one bounds each deque at
    # the full value, so the real ceiling is 2x — 20000 here means up to 40000
    # entries held. Pre-existing asymmetry, documented rather than silently
    # changed. ~100 bytes/entry, so 20000 ≈ 4MB worst case.
    alsQueueCapacity: "20000"

    # ── Queue sharding (MCP_QUEUE_SHARDS) ────────────────────────────────
    # Number of independent {mutex, deque} shards inside each of the four
    # ext_authz event queues (Auditor + MeterEmitter, on both the internal 9092
    # and external 9093 planes).
    #
    # WHY THIS EXISTS. A gdb stack dump taken during a collapse (peppy, 8000
    # rps, 2 pods @ 8 cores, 2026-07-16) found:
    #
    #     567 threads in the process
    #     359 blocked in std::mutex::lock  ← 63% of the process
    #     292   of those inside MeterEmitter::emit
    #      67   of those inside Auditor::emit
    #
    # All on ONE mutex address per object. Every Check() ends in a destructor
    # that enqueues an audit event and (for allowed tools/call) a meter event,
    # and each enqueue took the same single lock. The critical section is a
    # push_back — tens of nanoseconds. It was never slow. It was the only door,
    # and ~16000 enqueues/sec were trying to walk through it.
    #
    # With 1024 gRPC threads on 8 cores, a thread preempted WHILE holding that
    # lock stalls every other thread for a scheduling quantum — so a 50ns
    # critical section produces a multi-millisecond stall. And gRPC's sync
    # server answers a blocked handler by spawning another handler, so
    # contention manufactures threads, which manufactures contention. The pool
    # inflated 130 → 567 and success fell to 57%.
    #
    # This is why NO chart knob fixed it: DB pool, cache TTL, thread cap, Envoy
    # replicas and table size are all upstream or downstream of a lock none of
    # them touch. (Raising the DB pool 8→32 and lowering threads 1024→512 both
    # made it measurably WORSE.)
    #
    # 16 is above the 8 cores a pod gets, so two shards rarely collide, while
    # keeping per-shard capacity sane: 10000/2 = 5000 emit-side budget split 16
    # ways is ~312 per shard, ~40ms of buffering at 8000 rps. Raise it and each
    # shard's drop-oldest threshold falls; the floor is 16 events per shard.
    #
    # Set to 1 to restore the exact pre-2026-07-16 single-lock behaviour — the
    # escape hatch if sharding turns out to be wrong.
    #
    # ⚠️ The drop-oldest bound is now PER SHARD, not global. A hot shard can
    # drop while the emitter as a whole has room. If dropped_total climbs while
    # queue_depth stays low, the thread→shard distribution is uneven and this
    # number is wrong — that is the signature to watch for.
    #
    # Accepted: 1-256.
    queueShards: "16"

    # ── Admission control (MCP_ADMISSION_LATENCY_MS) ─────────────────────
    # Shed load when authorization latency says the PDP is at capacity.
    # 0 = OFF, and off is the default.
    #
    # WHY YOU MIGHT WANT THIS. Past its ceiling the PDP does not degrade, it
    # collapses. Measured on a 20-core box, 2 pods @ 8 cores, 2026-07-16:
    #
    #     7000 rps -> 100%  p99   3.05ms
    #     8000 rps -> 100%  p99   6.75ms
    #     9000 rps ->  57%  p99   6.60s
    #
    # At 9000 the box did the FULL evaluation for 115,199 requests whose
    # answers Envoy had already discarded at its 2s deadline — and that wasted
    # work is what stopped it serving the ~8000 it could handle. Shedding turns
    # a 2-second death into a microsecond refusal (429) and frees capacity for
    # the traffic it admits.
    #
    # WHY LATENCY AND NOT A CONCURRENCY LIMIT. The first implementation counted
    # in-flight Checks with an atomic counter. It was measured and it was worse
    # than useless: at 7000 rps with a limit of 200 it dropped success to 42%
    # and p99 to 4.77s — while shedding only 73 requests. The shedding was
    # fine; the COUNTER was the problem. Two atomic read-modify-writes per
    # request on one cache line, contended by 1024 gRPC threads, is a
    # hardware-level serialization point. The gate meant to prevent
    # serialization was itself the serialization. Latency sampling reads a flag
    # on the hot path and writes only on 1-in-64 requests, on a separate cache
    # line. If you ever consider "just count the requests", that is the story.
    #
    # HOW TO PICK IT. Load-test until success drops, and note Check latency at
    # the last CLEAN rate — 6.75ms at 8000 above. Set this well ABOVE that so
    # normal operation never trips it, but far BELOW Envoy's 2s ext_authz
    # deadline so it fires before requests start dying. Somewhere in 50-200ms
    # is the plausible band for hardware like the above. Too low and you refuse
    # traffic that would have succeeded; too high and it never fires.
    #
    # Hysteresis is automatic: shedding starts above this value and stops below
    # HALF of it, so the gate cannot oscillate.
    #
    # Accepted: 0, or 5-60000. Watch: the gate CLOSED/OPEN log lines and the
    # 429 count in Envoy.
    admissionLatencyMs: "0"

    # Sample 1-in-N Checks for the latency EWMA. Higher = less write traffic,
    # staler signal. 64 at 8000 rps is ~125 samples/sec, which catches a
    # collapse developing over hundreds of ms while keeping sampler writes to
    # ~1.5% of requests. Only touch this if profiling says the sampler itself
    # costs — which is the mistake the counter version made, so measure first.
    admissionSampleEvery: "64"

    # EWMA smoothing, as a percentage. 10 = each sample moves the average 10%
    # (roughly a 10-sample memory). Higher reacts faster but one slow Check can
    # trip the gate; lower is steadier but may react after the deadline has
    # already passed.
    admissionAlphaPct: "10"

# ─── MCP Sync Sidecar ────────────────────────────────────────────────────────
mcpSync:
  image:
    repository: curtismager20/mcp-sync
    # Empty string ("") = use .Chart.AppVersion. Pin only when overriding.
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ─── Chat Daemon (intelligent Dev Portal agent backend) ──────────────────────
# An LLM agent backend: Claude decides which MCP tool to call, the daemon
# executes each call through the governed gateway AS THE LOGGED-IN USER (every
# tool invocation RBAC-checked, metered, attributed to that human). Ships as a
# sidecar in the orchestrator pod; the orchestrator reverse-proxies /chat/* to
# this sidecar on 127.0.0.1:8088.
#
# OPT-IN: disabled by default so existing installs are unaffected. Enable with a
# key for the full agent; enabling WITHOUT a key runs the daemon in
# "plumbing-only" mode (catalog/entitlement works, no LLM loop).
chatDaemon:
  enabled: true

  image:
    repository: curtismager20/mcp-chat-daemon
    # Empty string ("") = use .Chart.AppVersion (version-locked to orchestrator).
    tag: ""
    pullPolicy: IfNotPresent

  # The daemon listens here; the orchestrator proxies /chat/* to it over loopback.
  listenAddr: "127.0.0.1:8088"

  # The daemon uses TWO endpoints, both set by the deployment template from
  # in-cluster service addresses (you normally don't override these):
  #   • control plane (login, catalog) → orchestrator REST over loopback
  #   • data plane (tool calls) → the v3 Envoy gateway service, so ext_authz
  #     governs every call. Routing tool calls through Envoy (not orchestrator
  #     loopback) is deliberate: the agent has no shortcut around enforcement.
  # These are wired in templates/deployment.yaml (MAG_CONTROL_URL /
  # MAG_GATEWAY_URL); the model below is the only knob you typically set here.
  anthropicModel: "claude-sonnet-4-6"

  # Verify TLS toward the gateway. Default false (self-signed dev cert); set true
  # in prod once a real cert is in place.
  verifyTls: false

  # Anthropic API key. Three-tier semantics like the DB passwords:
  #   1. existing secret → reuse
  #   2. this value      → operator-supplied (stored in the chat-daemon secret)
  #   3. empty           → daemon boots in plumbing-only mode (no agent loop)
  # For production, prefer externalSecretName below so the key never lives in
  # values/Helm history.
  anthropicApiKey: ""

  # If set, the daemon reads ANTHROPIC_API_KEY from THIS pre-existing secret
  # (key: ANTHROPIC_API_KEY) instead of the chart-created one. Recommended for
  # prod — keeps the key out of Helm release history entirely. The chart-created
  # secret is intentionally SEPARATE from mcp-orchestrator-secrets so the
  # Anthropic key never co-mingles with the JWT signing key or DB passwords.
  externalSecretName: "chat-daemon-key"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# ─── Advisory Assistant ──────────────────────────────────────────────────────
# Provider selection for the in-app advisory assistant. The handler reads these
# as ASSISTANT_PROVIDER / OLLAMA_BASE_URL / OLLAMA_MODEL (wired in
# templates/deployment.yaml).
assistant:
  # "ollama"    → bundled Ollama model (see ollama: below). No API key, no
  #               per-token cost, no data leaves the cluster. This is the
  #               batteries-included, data-residency default (HIPAA/GDPR).
  # "anthropic" → the Anthropic Messages API (needs chatDaemon's key). Frontier
  #               quality; governed by the LLM cost engine.
  # The handler also AUTO-selects when unset: OLLAMA_BASE_URL present → ollama,
  # else ANTHROPIC_API_KEY present → anthropic, else unconfigured.
  provider: "ollama"

  # The bundled local model tag Ollama serves (passed to the handler as
  # OLLAMA_MODEL). Chosen via bake-off: Qwen 2.5 7B (best read-only character
  # among local models tested, Apache-2.0 licensed for clean commercial
  # bundling). Must match ollama.model so the served model = the requested model.
  localModel: "qwen2.5:7b"

  # Only used if ollama.enabled is false but you still want the ollama provider
  # to reach an Ollama running elsewhere (external/shared). When ollama.enabled
  # is true, the deployment auto-wires OLLAMA_BASE_URL to the bundled service and
  # ignores this. Leave empty for the normal bundled path.
  ollamaUrl: ""

# ─── Ollama (bundled local LLM) ──────────────────────────────────────────────
# Batteries-included local model for the advisory assistant, Probo-style. Ships
# so the assistant works with no API key, no per-token cost, and no data leaving
# the cluster (the data-residency story). GPU-optional — CPU-only by default.
ollama:
  enabled: false          # off by default; flip on to bundle the local assistant

  replicaCount: 1         # single pod: RWO model-cache PVC + Recreate strategy

  # Placement. Control-plane pinned (same rationale as the postgres blocks): the
  # model cache is a node-local RWO PVC, so the pod must stay co-located with it
  # across reschedules to avoid multi-GB re-pulls. If the customer has a GPU
  # worker node, override nodeSelector to schedule Ollama there (Ollama
  # auto-detects + uses the GPU). CPU-only otherwise — no GPU required.
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  tolerations: []
  affinity: {}

  image:
    # DEFAULT: stock upstream Ollama; pulls the model on first boot (needs egress
    # at deploy time — the pod's start command runs `ollama pull`). AIR-GAP /
    # REGULATED: mirror or build a custom image with the model baked in and point
    # this at it, so there's zero egress in a locked-down cluster.
    repository: ollama/ollama
    # Third-party image — does NOT track .Chart.AppVersion. Pin explicitly.
    tag: "latest"
    pullPolicy: IfNotPresent

  # The model the assistant serves (must match assistant.localModel). The pod's
  # start command runs `ollama pull <model>`. Chosen via bake-off: Qwen 2.5 7B
  # (best read-only character among local models tested, Apache-2.0 licensed).
  model: "qwen2.5:7b"

  # In-cluster Service the orchestrator reaches Ollama through. deployment.yaml
  # wires OLLAMA_URL to this service; only the local assistant path uses it.
  service:
    type: ClusterIP
    port: 11434

  # Model-cache storage (node-local PVC). A 7B is ~4.7GB; leave headroom for the
  # KV cache. Kept on a PVC so a restart with a warm cache skips the multi-GB
  # re-pull.
  storage:
    size: "20Gi"
    storageClassName: ""  # "" = cluster default (e.g. local-path on k3s)

  # RAM is the real requirement (no GPU needed). A 7B needs ~6-8GB resident.
  # This "few GB of RAM, not a GPU" spec is what makes on-prem procurable.
  #
  # CPU: inference throughput on CPU scales with cores. A hard cpu *limit*
  # throttles token generation (a 4-core cap on a 12-core node cut generation
  # to ~1/3 speed — a ~100s answer instead of ~35s). On a dedicated appliance
  # node, keep the *request* as the scheduling guarantee and set NO cpu limit,
  # so generation bursts to whatever cores are idle. If Ollama shares a node
  # with other heavy workloads, reinstate a limit (e.g. "10") for predictability.
  resources:
    requests:
      cpu: "6"
      memory: 8Gi
    limits:
      # no cpu limit — let CPU inference burst to idle cores (see note above)
      memory: 10Gi

# ─── Envoy Gateway ───────────────────────────────────────────────────────────
envoy:
  enabled: true
  # ── Multi-replica HA (shipped in v1.13.0-dev) ──────────────────────────────
  # Default 2 replicas. With orchestrator leader-elected xDS push, each
  # Envoy independently consumes the same xDS stream via the headless
  # service so multi-replica Envoy is consistent — there is no flapping
  # config. NodePort/LoadBalancer fronts both pods so client traffic is
  # spread across them at the connection level.
  #
  # Verified empirically: 2-Envoy + 2-orchestrator sustains ~3000 rps
  # end-to-end with 100% success vs ~1500 rps single-replica. The
  # autoscaling block below extends this up to 10 replicas under load.
  replicaCount: 2
  image:
    repository: envoyproxy/envoy
    tag: v1.33-latest
  # ⚠️ limits.cpu: 4 — kept in LOCKSTEP with envoyV3.resources.limits.cpu.
  # (2026-07-17)
  #
  # This was 500m. The v3 Envoy's identical limit of 2 cores was the platform's
  # throughput ceiling at 8000 rps — three replicas all hit ~1900m of a 2000m
  # cap, two got CFS-throttled 15s into every run and stayed there, and the
  # fleet's p90 went to 4.7s while every in-process counter read healthy. Full
  # measurement in the envoyV3 resources block below; read it before touching
  # this.
  #
  # Legacy carries the SAME ext_authz Check() traffic on the same hot path, so
  # it hits the same wall — 500m would hit it four times sooner. routing_mode
  # still defaults to "legacy", which means an install that has never flipped
  # to v3 is running the data plane through THIS block. The parking-lot item
  # "retire legacy xDS" flips that default; until it does, this limit is not
  # dead config, it is the one most installs actually use.
  #
  # If you tune one of these two, tune both. A number that differs between the
  # legacy and v3 data planes is a bug waiting for a routing_mode flip to find
  # it — which is exactly how max_connections: 256 survived in cluster_builder.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "4"
      memory: 512Mi
  # Service ports — these are the PORT numbers exposed on the Envoy
  # Service resource. The Service TYPE is determined by loadBalancer.provider
  # (below), not here. For NodePort mode, also see loadBalancer.nodeport.
  service:
    httpPort: 80
    httpsPort: 443
    # ext_authz-enforced MCP listener (see helm-envoy-service.yaml).
    # Default 93 avoids the 80/443 well-known ports. Override only if
    # it conflicts with your environment.
    httpAuthzPort: 93
  autoscaling:
    enabled: true
    # ── Production HA defaults (shipped in v1.13.0-dev) ───────────────────
    # min=2 keeps a baseline of HA capacity even at idle load — single-pod
    # Envoy is a SPOF and client traffic spikes can outpace HPA reaction
    # time on cold-start.
    # max=10 covers ~15000 rps headroom at observed per-pod throughput
    # of ~1500 rps. Tune up for higher-traffic environments.
    # CPU/memory targets unchanged — Envoy is CPU-light at ext_authz
    # scale (TLS termination is the dominant cost) so 70%/80% triggers
    # scale-up well before saturation.
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70
    targetMemory: 80
  xds:
    listenAddress: "0.0.0.0"
    port: 18000
    nodeId: mcp-gateway

  # ── V3 ADS gRPC server (experimental, slice 3-5) ───────────────────────────
  # Greenfield xDS path on generated Envoy v3 protos. Lives entirely in a
  # parallel C++ subtree (src/gateway/v3/) and a separate gRPC port so it
  # cannot affect the legacy hand-rolled xDS path on envoy.xds.port (18000).
  # Enabling this only starts the v3 ADS gRPC server in the orchestrator;
  # it does NOT affect Envoy's bootstrap or routing — Envoy is unaware of
  # this server until separate bootstrap config is added in a future slice.
  # Safe to enable for testing.
  v3ads:
    enabled: true
    port: 18100
    nodePort: 30100
    clusterName: mcp-gateway-cluster

  # ── V3 Envoy data plane (slice 6e, experimental) ───────────────────────────
  # Standalone Envoy pod consuming from the v3 ADS server (envoy.v3ads above).
  # Runs in parallel with the legacy Envoy (envoy.* settings, port 30443) —
  # both pods exist in the same cluster, with legacy serving routing_mode=
  # "legacy" servers and v3 serving routing_mode="v3" servers. Default
  # disabled; enable for slice 6e validation. Production-default stays off
  # until v3 proves out under load.
  v3:
    enabled: true
    replicaCount: 3
    listenerPort: 10444
    nodePort: 30444
    nodeId: mcp-gateway-v3
    clusterName: mcp-gateway-v3-cluster
    image:
      repository: ""
      tag: ""
    # ── 3.1.01: v3 Envoy gets its OWN resources (was {} = inherited legacy's
    # 500m/512Mi) ──────────────────────────────────────────────────────────
    # At 512Mi the v3 Envoy was OOMKilled (exit 137) under 1500 rps load, with
    # the liveness probe then failing on :9902/ready. Observed wire signature
    # while dying: authz_flags "UO" (upstream overflow) 503s and 12.7s 200s.
    #
    # WHY 512Mi is not enough: Envoy buffers each in-flight request body up to
    # ext_authz's max_request_bytes (10485760 = 10MB, raised 2026-07-12 for
    # Nitro base64 document payloads) BEFORE calling Check(). At ~1500
    # concurrent requests a 10MB per-request ceiling does not fit in 512Mi,
    # even though real MCP tool-call bodies are ~98 bytes.
    #
    # IMPORTANT — the autoscaling block below and this limit are coupled:
    # targetMemory: 80 with a 512Mi limit means the HPA pins to maxReplicas
    # and stays there (observed: memory 92%/80%, cpu 13%/70% → 10 replicas).
    # That memory HPA is a BAND-AID for this undersized limit, not a scaling
    # policy — memory doesn't track demand and doesn't fall when traffic stops.
    # With RING_HASH session affinity every scale event rehashes the ring and
    # mass-403s live sessions. DO NOT remove the memory metric without raising
    # this limit first, or you trade rehash storms for OOM kills.
    #
    # At 2Gi with 64KB buffers, v3 Envoy sits at 121-128Mi (6%), CPU 7-15m.
    # The real fix is per-route buffers (64KB global, 10MB only on
    # nitro-sign/nitro-pdf via typed_per_filter_config / ExtAuthzPerRoute
    # check_settings — the machinery AdsSubscriber already uses to enable the
    # external filter per-route). Until that lands, 2Gi absorbs it.
    #
    # ─────────────────────────────────────────────────────────────────────────
    # ⚠️ limits.cpu: 4 — DO NOT LOWER IT TO 2. (2026-07-17)
    # ─────────────────────────────────────────────────────────────────────────
    # Everything above this line is about MEMORY. The cpu limit sat at "2"
    # underneath it, unexamined, and it was the platform's throughput ceiling
    # for three days of load testing — outlasting six other fixes, a gdb
    # session, and every hypothesis we had.
    #
    # MEASURED at 8000 rps, three replicas, limits.cpu: 2, sampled every 2s
    # with a wall clock alongside the attack:
    #
    #   54:55   1950m  1775m  1711m   ← all three even, ~95% of a 2-core cap
    #   55:10    376m  1775m   485m   ← two collapse. vegeta still has 90s left
    #   55:25    539m  1674m   467m
    #   55:39    539m  1543m   496m
    #
    # That is CFS throttling. A pod that burns its quota inside the 100ms
    # period is stopped until the next one; two of the three spent the rest of
    # the run in that state while the third kept serving. Requests on the
    # throttled pods wait whole CFS periods, which is exactly how a p50 of
    # 1.5ms coexists with a p90 of 4.7s. The distribution went bimodal because
    # the FLEET went bimodal.
    #
    # The one-line change, nothing else touched:
    #   limits.cpu 2 → 4, same replicas, same rate, same everything
    #   BEFORE: 96.85%, p50 4.9ms, p90 4.7s, max 15.1s
    #   AFTER: 100.00%, p50 1.46ms, p90 2.66ms, p99 704ms, max 1.89s
    #   960,000 / 960,000 requests.
    #
    # Why it hid so well: CPU throttling doesn't look like CPU exhaustion.
    # `kubectl top` showed the pods at ~1900m, which reads as "busy, not
    # pinned" unless you know the limit is 2000m. Envoy's own stats were clean
    # — pending_overflow 0, rq_active peaking at 3690 of 8192 available, no
    # circuit breaker anywhere near firing. Every counter said "not
    # constrained" while the latency said otherwise, because the constraint
    # was the kernel refusing to schedule a process that was, by every
    # in-process measure, idle and waiting for work.
    #
    # This is the seventh instance of the same species in three days: a chart
    # default that was correct when it was written and became the constraint
    # once everything upstream got fast. The others: orchestrator memory 2Gi
    # (OOM at 2048 threads), absent circuit breakers in CDS (Envoy's 1024
    # default), the ClusterIP VIP (ROUND_ROBIN across one endpoint),
    # max_connections 256 on HTTP/1.1 upstreams, MCP_GRPC_MAX_THREADS 1024,
    # and postgres cpu: 2. A default is not a decision — it is a decision
    # deferred, and it comes due the moment the thing in front of it gets fast.
    #
    # If you are tempted to lower this: reproduce the 2-core run first, sample
    # `kubectl top pod ... | grep envoy-v3` every 2s WITH a timestamp, and
    # watch for two of three pods falling to a quarter of the others mid-run.
    # That signature is the whole bug.
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "4"
        memory: 2Gi
    # ── V3 production HA defaults (shipped in v2.2.1) ──────────────────────
    # Mirrors legacy envoy autoscaling shape. min=3 floor based on 5/17/26
    # load testing: single-replica v3 envoy saturates at ~500 rps and the
    # crash-restart cycle takes 5+ minutes to recover. 3 replicas at idle
    # gives reliable headroom for transient bursts; HPA scales up beyond
    # that on observed CPU/memory pressure. max=10 matches legacy ceiling.
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCPU: 70
      targetMemory: 80

# ─── Load Balancer ────────────────────────────────────────────────────────────
# Controls how the Envoy gateway is exposed outside the cluster.
#
# provider options:
#   cloud     — AWS ELB / GCP LB / Azure LB (default for cloud deployments)
#               No extra config needed — your cloud controller handles it.
#
#   metallb   — Bare-metal / private DC / kind dev clusters.
#               Installs MetalLB and assigns IPs from the given pool.
#               Use create-cluster.sh for dev — it handles this automatically.
#
#   nodeport  — Expose via NodePort only. No external IP assigned.
#               Access via <node-ip>:<nodePort>. Useful for air-gapped clusters
#               or when an upstream hardware LB handles external routing.
#
#   existing  — You already have an Ingress controller or LB in the cluster
#               (nginx-ingress, Traefik, F5 CIS, etc). MCP will create the
#               Service but NOT install any LB controller. Set annotations
#               below to integrate with your existing infrastructure.
#
loadBalancer:
  provider: cloud       # cloud | metallb | nodeport | existing

  # ── MetalLB (provider: metallb) ───────────────────────────────────────────
  metallb:
    install: true                                   # set false if already installed
    version: v0.14.5
    ipRange: "172.18.0.200-172.18.0.250"            # adjust to your network
    # bgp: false                                    # set true for BGP mode (advanced)

  # ── NodePort (provider: nodeport) ─────────────────────────────────────────
  nodeport:
    httpPort: 30080      # customize to avoid conflicts
    httpsPort: 30443
    httpAuthzPort: 30093 # ext_authz-enforced MCP listener

  # ── Existing LB / Ingress (provider: existing) ────────────────────────────
  existing:
    # Annotations added to the Envoy Service — use to integrate with your LB.
    # Examples:
    #   AWS NLB:      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    #   F5 BIG-IP:    cis.f5.com/ip-type: "cluster"
    #   MetalLB pool: metallb.universe.tf/address-pool: "production-pool"
    serviceAnnotations: {}
    #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

    # Optional: pre-assigned static IP for the LoadBalancer service
    loadBalancerIP: ""

    # Optional: create an Ingress resource instead of relying on LoadBalancer
    ingress:
      enabled: false
      className: nginx          # nginx | traefik | haproxy | istio | etc.
      host: mcp.example.com
      tls: true
      tlsSecretName: mcp-envoy-tls

# ─── PostgreSQL ──────────────────────────────────────────────────────────────
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
  # Postgres pod placement. Pinned to the control-plane node so the local-path
  # PV stays physically co-located with the pod across reschedules (k3s
  # local-path is node-local; an unpinned postgres that reschedules to another
  # node strands its data and flaps — which breaks DB writes the orchestrator
  # depends on for deploy registration and session/auth).
  #
  # The node-role.kubernetes.io/control-plane label is auto-applied by k3s to
  # the master, so this needs no manual labeling on any cluster — including
  # single-node dev clusters (Docker Desktop, kind, k3d, minikube) where the
  # one node is the control plane. To run postgres elsewhere, override via
  # --set postgresql.nodeSelector=null (only safe with a networked
  # StorageClass, not local-path).
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  tolerations: []
  affinity: {}
  # ── 3.1.01: limits raised 500m/512Mi → 2000m/2Gi ───────────────────────────
  # Headroom for the audit + meter write path, which at 3500 rps is taking
  # ~7000 inserts/sec across both pipelines.
  #
  # MEASURED, so nobody "fixes" this by going bigger: postgres uses 77Mi of
  # memory and 77m of CPU at 3500 rps. It is NOT the bottleneck and it is NOT
  # memory-bound — at 4000 rps (where the platform congestion-collapses) the
  # two orchestrator pods drew 8509m between them while postgres sat at 77m.
  # Do NOT raise memory to 4Gi; it will not help and it costs scheduler
  # headroom on a control-plane node already at 95% memory requests.
  #
  # NOT configurable here (chart gap): max_connections, postgres's default 100.
  # 63 are consumed at idle — ~41 orchestrator (pool + meter_conn + audit_conn
  # + inventory + leader), 16 Splunk DB Connect JDBC (over-pooled for its probe
  # cadence; ~4 would do), 5 unlabeled, 1 psql. This is why MCP_DB_POOL_SIZE=16
  # detonated: 2 pods x 16 + 63 ≈ 99 of 100.
  #
  # ── cpu: 2 RE-CONFIRMED at 8000 rps, 2026-07-17 ────────────────────────────
  # Left at 2 deliberately. During a clean 8000 rps run (100% success, p90
  # 2.66ms) this pod sat at 4m of CPU and 19Mi of memory. It is not the
  # bottleneck at 8000 any more than it was at 3500.
  #
  # ⚠️ But that number is from an EMPTY database, and it is the optimistic
  # case. An earlier 8000 run against a database holding several days of
  # accumulated meter_events/audit_events showed postgres pinned at 1995m of
  # this 2000m cap — the same workload, 500x the CPU, purely because every
  # drain INSERT was maintaining indexes on fat tables. We raised the limit to
  # 4 mid-session and it did NOT help, which was the first clue that the real
  # ceiling was elsewhere (it was Envoy's cpu limit — see envoy resources).
  #
  # The honest reading: postgres CPU here is a function of TABLE SIZE, not
  # request rate, so a fresh-install benchmark can never see it. The fix is not
  # a bigger limit, it is the audit_events/meter_events retention work already
  # on the roadmap (PARTITION BY RANGE (ts) + DROP PARTITION — old partitions
  # drop instantly instead of DELETE churning indexes, and inserts only touch
  # the current partition's smaller index). Until that lands, expect this pod
  # to climb toward its cap as the tables grow, and do not mistake that for a
  # tuning problem.
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "2"
      memory: 2Gi
  # ── /dev/shm sizing ────────────────────────────────────────────────────────
  # k8s gives a container a 64MB /dev/shm by default. Postgres allocates
  # parallel-worker shared memory there (dynamic_shared_memory_type=posix), so
  # anything parallel — VACUUM, hash aggregate, parallel seq scan — dies with:
  #   ERROR: could not resize shared memory segment "/PostgreSQL.NNNNNNNN"
  #          to NNNNNNNN bytes: No space left on device
  # Hit live on audit_events at 1.7M rows: parallel VACUUM wanted 67MB.
  #
  # This is emptyDir{medium: Memory}, which is tmpfs and counts against the
  # pod's memory LIMIT (2Gi above). 1Gi is headroom, not a reservation — pages
  # are only charged when actually touched. If you raise this past ~half of
  # limits.memory you are risking an OOMKill instead of a query error.
  shmSize: 1Gi
  storage:
    size: 5Gi
    # storageClassName: longhorn    # Set for your environment
  database: mcp_platform
  username: mcp
  # Password is read from the secret (key: MCP_DB_PASSWORD)

# ─── Inventory (federation/discovery plane, 2.2.4+) ──────────────────────────
# mcp-inventory accepts observations from endpoint agents and writes a
# canonical inventory record set into a dedicated Postgres instance.
# See: services/mcp-inventory/README.md
#
# Default off so existing customer upgrades don't unexpectedly deploy a new
# sidecar + Postgres. Dev clusters opt in via bootstrap.sh's --set or by
# flipping this to true here (single values.yaml — no separate dev-values).
inventory:
  enabled: true
  replicaCount: 1

  image:
    repository: curtismager20/mcp-inventory
    # Empty string ("") = use .Chart.AppVersion (same convention as the
    # orchestrator/sync images). Pin only when overriding.
    tag: ""
    pullPolicy: IfNotPresent

  # Placement for the mcp-inventory pod itself (the Go binary). Stateless,
  # can run anywhere. Defaults to "no preference"; override per cluster if
  # you want it co-located with the inventory DB to minimize SQL latency.
  nodeSelector: {}
  affinity: {}
  tolerations: []

  service:
    type: ClusterIP
    port: 8090

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # DB connection pool size. Inventory's access pattern is bursty writes
  # from agents + occasional reads from admin/CMDB — nothing like ext_authz's
  # sustained read pressure. 4 connections is more than enough.
  dbPoolSize: 4

  # Pipeline tuning (see services/mcp-inventory/internal/config/config.go).
  config:
    queueSize: 1000                # bounded ingest channel; full → 503
    writerBatch: 50                # reserved for batched writes (future)
    maxObservationsPerBatch: 1000  # per-request observation cap
    logLevel: "info"               # "info" or "debug"

  # ── Inventory Postgres ───────────────────────────────────────────────────
  # Physically isolated from the operations DB, but — like the ops postgres —
  # it is stateful on a node-local (k3s local-path) PV, so it MUST stay
  # co-located with its data across reschedules. It pins to the control-plane
  # node via the auto-applied node-role.kubernetes.io/control-plane label, so
  # it needs no manual labeling on any cluster, including single-node dev
  # clusters (Docker Desktop, kind, k3d, minikube) where the one node is the
  # control plane. This also prevents the data-stranding flap an unpinned
  # local-path postgres suffers when it reschedules onto a node without its PV.
  #
  # OPT-IN multi-node split: to run the inventory DB on a dedicated worker
  # (e.g. to keep it off the control-plane node), override with a distinct
  # label key — kept distinct from the ops selector because k8s node labels
  # store one value per key, so a single node can carry both today and a future
  # split becomes a label change rather than a chart edit:
  #
  #   nodeSelector:
  #     workload-inventory: "true"
  # (only safe with a networked StorageClass, not node-local local-path)
  postgresql:
    enabled: true
    image:
      repository: postgres
      tag: 16-alpine
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    tolerations: []
    affinity: {}
    storage:
      size: 5Gi
      # Storage class for the inventory PV. Defaults to empty so the
      # cluster's default StorageClass is used (Docker Desktop, kind,
      # k3d, minikube, EKS gp2, AKS azurefile, GKE standard, etc).
      # For k3s with local-path-provisioner (foxygirl reference setup),
      # set to "local-path".
      storageClassName: ""
    # See the shmSize note on the top-level postgresql block. Same 64MB
    # default-/dev/shm gap; inventory is lower-volume so 256Mi is enough,
    # and it must stay well under limits.memory (1Gi) since tmpfs pages are
    # charged to the pod.
    shmSize: 256Mi
    database: mcp_inventory
    username: mcp
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

# ─── Probo GRC (Governance, Risk & Compliance) ───────────────────────────────
# Probo runs as an INTERNAL Magertron subsystem — deployed alongside the
# orchestrator and registered as a type:internal MCP server so the 270+ Probo
# GRC tools flow through ext_authz / RBAC / rating / audit like any server. It is
# special only in that it CONSUMES Magertron's governance objects (audit trail,
# RBAC state, registry, contracts) as GRC evidence.
#
# Default OFF so existing customer upgrades don't unexpectedly deploy a GRC stack
# + its Postgres (same convention as inventory). Opt in by flipping to true or
# via bootstrap.sh --set.
#
# Probo = probod (GRC daemon + MCP server) + its own Postgres + headless Chrome
# (PDF/evidence). Object storage is NOT bundled — evidence files go to a
# Magertron-designated S3-compatible store (see probo.objectStore). Image source:
# upstream ghcr.io/getprobo/probo; mirror to curtismager20/* for a shipped product.
probo:
  enabled: false
  replicaCount: 1

  # probod placement. Like the orchestrator + its postgres, probod is part of the
  # control plane (it co-locates with its own node-local Postgres), so it pins to
  # the control-plane node. node-role.kubernetes.io/control-plane is auto-applied
  # by k3s — no manual labeling. Override via --set probo.nodeSelector=null only
  # with a networked StorageClass (not local-path).
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  tolerations: []
  affinity: {}

  image:
    # Upstream for eval; mirror to your registry for prod (supply-chain control).
    repository: ghcr.io/getprobo/probo
    # Probo is third-party, so its tag does NOT track .Chart.AppVersion (that's
    # Magertron's version). Pin an explicit upstream probod tag here.
    tag: "latest"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Ports probod serves (from Probo's compose.prod.yaml).
  ports:
    api: 8080        # web console + REST + GraphQL + MCP server
    metrics: 8081    # Prometheus
    tls: 8443

  # External URL probod uses for email/redirect/API generation. Leave EMPTY to
  # auto-derive probod's own in-cluster service URL in the release namespace
  # (probod deploys alongside the orchestrator). Set this to the gateway-facing
  # URL when probod is fronted by the Magertron gateway.
  baseUrl: ""
  # probod rejects a bare "*" as a trusted origin — it requires a scheme
  # (e.g. https://probo.example.com). Set this to the browser-facing origin(s)
  # that will call probod's API. Empty = auto-derive probod's own in-cluster
  # service origin (works for in-cluster/eval; set the gateway origin for prod).
  corsAllowedOrigins: ""
  tracingAddr: ""    # OTel collector addr to enable tracing; empty = off

  # ── Probo's own Postgres (separate from the ops + inventory DBs) ─────────────
  # Same pinning/placement rationale as the main postgresql block: control-plane
  # node so the node-local PV stays co-located across reschedules.
  postgresql:
    enabled: true
    image:
      repository: postgres
      tag: 17.9            # Probo's compose pins 17.x; matches upstream expectations
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    tolerations: []
    affinity: {}
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    # See the shmSize note on the top-level postgresql block. Must stay well
    # under limits.memory (1Gi) — tmpfs pages count against the pod limit.
    shmSize: 256Mi
    storage:
      size: 10Gi
      # storageClassName: longhorn    # Set for your environment
    database: probod
    username: postgres
    # Password is read from the secret (key: PROBO_DB_PASSWORD) — see secrets block.

  # ── Headless Chrome (PDF / evidence-pack generation) ─────────────────────────
  # Heavyweight; disable if this deployment doesn't generate evidence-pack PDFs.
  chrome:
    enabled: true
    image:
      repository: chromedp/headless-shell
      tag: "149.0.7779.3"
    port: 9222
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi

  # ── Bundled MinIO (S3-compatible object store for Probo evidence) ────────────
  # Turnkey default: a MinIO instance runs in-cluster and probod writes evidence
  # (PDFs, screenshots) to it — on-prem, no external S3, satisfies data residency.
  # Set minio.enabled=false to use an EXTERNAL store instead (then set
  # objectStore.endpoint + the proboS3* creds in the secrets block).
  minio:
    enabled: true
    image:
      repository: minio/minio
      tag: "latest"
    mcImage:                 # the mc client, for the bucket-creation Job
      repository: minio/mc
      tag: "latest"
    nodeSelector:
      node-role.kubernetes.io/control-plane: "true"
    tolerations: []
    affinity: {}
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    storage:
      size: 20Gi
      # storageClassName: longhorn    # Set for your environment

  # ── Object storage endpoint for probod evidence ─────────────────────────────
  # Leave endpoint EMPTY to auto-use the bundled MinIO above (the default). Set it
  # to point probod at an EXTERNAL S3-compatible store instead (then also disable
  # minio above and supply proboS3AccessKey/proboS3SecretKey in secrets).
  # Probo writes evidence files (PDFs, screenshots) here.
  objectStore:
    endpoint: ""           # empty = use bundled MinIO; set for external S3
    region: "us-east-1"
    bucket: "probod"
    usePathStyle: "true"   # true for MinIO/SeaweedFS-style endpoints

  # ── SMTP (optional; Probo notifications) ─────────────────────────────────────
  smtp:
    addr: ""               # host:587 ; empty = no mail
    tlsRequired: "false"
    senderName: "Probo"
    senderEmail: "no-reply@magertron.local"

  # ── Magertron MCP registration ───────────────────────────────────────────────
  # Post-install hook registers probod's MCP server as type:internal so Magertron
  # governs the 270+ tools. Bearer token injected by ext_authz from the secret.
  mcpRegistration:
    enabled: true
    serverName: "probo-grc"
    # Registration target namespace + probod's MCP endpoint are auto-derived from
    # the release namespace (probod deploys alongside the orchestrator). Override
    # mcpEndpoint only if probod is reached via a non-default URL (e.g. gateway).
    mcpEndpoint: ""
    # Magertron admin API the registration Job calls. Empty = auto-derive the
    # orchestrator's own service in the release namespace. Override for a custom URL.
    magertronApi: ""

# ─── Image scanning (deploy-time vulnerability scanning) ───────────────────────
# Bundled Trivy client/server + adapter. When enabled, every internal (image)
# deploy is scanned and recorded in image_scans (SOC2 vuln-mgmt evidence). The
# orchestrator's MCP_SCANNER_URL points at the bundled adapter by default; set
# scannerUrlOverride to point at your OWN scanner (Prisma/Snyk/etc.) instead —
# the scan contract is scanner-agnostic.
scanning:
  enabled: true

  # Override to point the orchestrator at an EXTERNAL scanner instead of the
  # bundled adapter. Empty = use the bundled scanner-adapter service.
  scannerUrlOverride: ""

  # nodeSelector applied to both trivy-server and scanner-adapter pods.
  nodeSelector: {}

  trivy:
    image:
      repository: aquasec/trivy
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 4954
    # The vuln DB is ~900MB. emptyDir re-downloads on pod restart; enable
    # persistence to keep the DB cache across restarts.
    persistence:
      enabled: false
      size: 2Gi
      storageClass: ""
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

  adapter:
    image:
      repository: curtismager20/scanner-adapter
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    port: 8080
    replicaCount: 1
    scanTimeoutSeconds: 120
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# ─── API Configuration ──────────────────────────────────────────────────────
api:
  httpPort: 8080
  grpcPort: 9090
  requestTimeout: 30

# ─── JWT Configuration ──────────────────────────────────────────────────────
jwt:
  issuer: "https://auth.acme.internal"
  audience: "mcp-orchestrator"
  clockSkew: 30
  tokenTTL: 3600

# ─── Observability ───────────────────────────────────────────────────────────
observability:
  logLevel: info
  logFormat: json
  metricsPort: 9091
  auditLogPath: /var/log/mcp/audit.log

# ─── Tenant namespaces ───────────────────────────────────────────────────────
# Tenant namespaces (e.g. mcp-prod, mcp-staging) are NOT created by this
# chart. They are created on demand by the orchestrator when the first MCP
# server is deployed into them — orchestrator-created namespaces carry the
# label `app.kubernetes.io/managed-by: mcp-orchestrator` and survive helm
# uninstall (they are not Helm-owned resources).
#
# This list seeds the orchestrator's defaults at first-install time:
#
#   - configmap.yaml:        first entry becomes the orchestrator's
#                            `default_namespace` (used by the admin UI's
#                            deploy form when no namespace is explicitly
#                            chosen).
#   - postgres-init.yaml:    seeds the default `mcp-deployer` role's
#                            allowed_namespaces and the SSO providers'
#                            allowed_namespaces with this list, so a
#                            freshly-installed cluster has working RBAC
#                            for these tenants out of the box.
#
# Deleting this list does NOT prevent operators from creating servers in
# arbitrary namespaces — the orchestrator creates whichever namespace the
# operator picks at deploy time. It only affects which namespaces are
# pre-allowed in the seed RBAC policy.
namespaces:
  - mcp-prod
  - mcp-staging
  - mcp-dev

# ─── Network Policy ─────────────────────────────────────────────────────────
networkPolicy:
  enabled: true

# ─── Secrets ─────────────────────────────────────────────────────────────────
# If createSecrets is true, the chart creates a Secret from these values.
# For production, set createSecrets=false and create the Secret externally.
secrets:
  create: true

  # PostgreSQL password.
  #
  # Default behavior (empty string): the chart generates a random
  # 32-character alphanumeric password at install time and stores it in
  # the Secret. Subsequent upgrades reuse the existing Secret's value
  # (see secrets.yaml lookup logic) so the password persists.
  #
  # To pin a specific password, set this value or pass:
  #   --set secrets.dbPassword=<value>
  #
  # Postgres is internal-only (ClusterIP service), so the auto-generated
  # default is appropriate for most installs.
  #
  # To retrieve the generated password later:
  #   kubectl get secret -n <ns> <release>-secrets \
  #     -o jsonpath='{.data.MCP_DB_PASSWORD}' | base64 -d
  dbPassword: ""

  # Inventory Postgres password (mcp-inventory's DB, separate from ops DB).
  # Same three-tier semantics as dbPassword:
  #   1. existing secret → reuse (upgrade-safe)
  #   2. this value      → operator-supplied
  #   3. empty           → chart generates a random 32-char password
  #
  # Retrieve later via:
  #   kubectl get secret -n <ns> <release>-secrets \
  #     -o jsonpath='{.data.MCP_INVENTORY_DB_PASSWORD}' | base64 -d
  inventoryDbPassword: ""
  # JWT keys — PEM-encoded RSA private and public keys.
  #
  # Leave both empty to have the chart auto-generate a private key at install
  # time. The orchestrator will derive the public key from it at startup.
  # This is the Free-tier / evaluation path.
  #
  # For production (Pro / Enterprise), generate and pass both explicitly so
  # keys survive reinstalls and can be rotated on your schedule:
  #   openssl genpkey -algorithm RSA -out jwt.key -pkeyopt rsa_keygen_bits:2048
  #   openssl rsa -in jwt.key -pubout -out jwt.pub
  #   helm install ... --set-file secrets.jwtPrivateKey=jwt.key \
  #                    --set-file secrets.jwtPublicKey=jwt.pub
  jwtPrivateKey: ""   # PEM-encoded RSA private key (leave empty for auto-gen)
  jwtPublicKey: ""    # PEM-encoded RSA public key (derived from private if empty)

  # ── Probo GRC secrets (only relevant when probo.enabled=true) ───────────────
  # Same three-tier semantics as dbPassword / inventoryDbPassword:
  #   1. existing secret → reuse (upgrade-safe)
  #   2. this value      → operator-supplied
  #   3. empty           → chart generates a random value at install
  #
  # Probo's Postgres password (Probo's DB, separate from ops + inventory DBs).
  # Retrieve later via:
  #   kubectl get secret -n <ns> <release>-secrets \
  #     -o jsonpath='{.data.PROBO_DB_PASSWORD}' | base64 -d
  proboDbPassword: ""

  # probod data-at-rest encryption key (PROBOD_ENCRYPTION_KEY). Probo REQUIRES
  # this for production. Empty = chart generates a random 32-char value.
  proboEncryptionKey: ""

  # probod auth secrets (cookie signing, password pepper, trust-token signing).
  # Empty = auto-generated. Pin for reproducible installs / rotation.
  proboAuthCookieSecret: ""
  proboAuthPasswordPepper: ""
  proboTrustAuthTokenSecret: ""
  # probod's OAuth2 server signing key (OAUTH2_SERVER_SIGNING_KEY). Required by
  # the probod image even though it's absent from the upstream compose example.
  # Empty = auto-generated.
  proboOauth2ServerSigningKey: ""

  # S3 credentials for Probo's evidence object store (probo.objectStore).
  # REQUIRED when probo.enabled=true — these are the STORE's creds (not ours to
  # mint), so they're operator-supplied; no auto-gen.
  proboS3AccessKey: ""
  proboS3SecretKey: ""

  # Bearer token Magertron stores as probod's MCP-server credential (ext_authz
  # injects it on every proxied call to Probo). Empty = chart generates one and
  # wires the SAME value into probod's expected MCP auth.
  proboMcpToken: ""

# ─── License ─────────────────────────────────────────────────────────────────
# License file for Enterprise tier features (SSO, SCIM, custom RBAC,
# governance policies). Free tier does not require a license.
#
# Two ways to apply a license:
#
# 1. At install time:
#    helm install mcp ./chart ... --set-file license.file=license.json
#    (Chart creates the Secret.)
#
# 2. Pre-created externally:
#    kubectl create secret generic mcp-license \
#      --from-file=license.json=license.json -n mcp-system
#    (Chart skips Secret creation; the orchestrator mounts the existing one.)
#
# In either case, the orchestrator reads /etc/mcp-license/license.json at
# startup. Missing file = Free tier.
license:
  # Set at install time via --set-file to make the chart create the Secret.
  # Must be empty in the default values — don't commit license content here.
  file: ""

  # Name of the Secret that contains the license. Both modes above use this
  # same name. Override only if you already have a Secret named differently.
  secretName: mcp-license

# ─── TLS ─────────────────────────────────────────────────────────────────────
tls:
  create: true
  # If you provide cert/key, they'll be used. Otherwise auto-generated.
  cert: ""
  key: ""
  orchestratorSecretName: mcp-orchestrator-tls
  envoySecretName: mcp-envoy-tls

# ─── Seed Data ───────────────────────────────────────────────────────────────
seed:
  # Default admin user password.
  #
  # Default behavior (empty string): the chart generates a random
  # 24-character password at install time, stores it in the orchestrator's
  # Secret as MCP_SEED_ADMIN_PASSWORD, and prints retrieval instructions in
  # the post-install notes. The orchestrator's seed code reads the
  # plaintext from the Secret on first boot, bcrypts it in-process at
  # work factor 12, and stores the hash in the database. Plaintext lives
  # only in the Secret + memory; the database stores only the bcrypt hash.
  #
  # SECURITY: This is a *bootstrap credential*. Log in once with it,
  # change the password via the UI immediately, and rotate the Secret.
  # Retrieve the generated password:
  #   kubectl get secret -n <ns> <release>-secrets \
  #     -o jsonpath='{.data.MCP_SEED_ADMIN_PASSWORD}' | base64 -d
  #
  # To pin a specific password (e.g., for dev convenience), pass:
  #   --set seed.adminPassword=<value>
  # or set it in your overrides values file.
  adminPassword: ""

  # Pre-computed bcrypt hash for the admin password.
  #
  # DEPRECATED: Use seed.adminPassword (plaintext) instead — the
  # orchestrator now bcrypts plaintext in-process at seed time.
  #
  # If both are set, the orchestrator gives priority to the hash for
  # backward compatibility. This field is retained for installs that
  # have an established hash-based workflow (e.g., generated by an
  # external password tool) and want to keep using it.
  #
  # Empty string is the default; do NOT set this unless you have an
  # existing hash workflow.
  adminPasswordHash: ""

  # Email address seeded onto the default admin user (populates users.email).
  # Set at first boot so the admin has a contact address from a fresh install
  # instead of a NULL that has to be patched in by hand post-wipe.
  #
  # Empty string (default) leaves users.email NULL — the seed only writes the
  # column when a non-empty value is provided. Override per-install with
  #   --set seed.adminEmail=<address>
  # or set it in your overrides values file.
  adminEmail: ""
